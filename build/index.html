<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Vireo</title>
  <style>
    body {
      margin: 0;
      background: #0A1F2E;
      color: #E0F0F0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .loader {
      text-align: center;
    }
    .loader h1 {
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 16px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #14374E;
      border-top-color: #24E5CA;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status {
      margin-top: 16px;
      font-size: 13px;
      color: #5A8890;
    }
  </style>
</head>
<body>
  <div class="loader">
    <h1>Vireo</h1>
    <div class="spinner"></div>
    <div class="status">Starting...</div>
  </div>
</body>
</html>
