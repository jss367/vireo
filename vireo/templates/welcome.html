<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/favicon.ico">
<link rel="stylesheet" href="/static/vireo-theme.css">
<link rel="stylesheet" href="/static/vireo-base.css">
<title>Vireo - Setup</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .setup-card {
    max-width: 640px;
    width: 100%;
    background: var(--bg-secondary);
    border: 1px solid var(--border-primary);
    border-radius: 12px;
    padding: 40px;
    text-align: center;
  }
  .setup-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .setup-tagline {
    font-size: 15px;
    color: var(--text-secondary);
    margin-bottom: 32px;
  }
  .features {
    text-align: left;
    max-width: 360px;
    margin: 0 auto 32px;
  }
  .features li {
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.8;
    list-style: none;
    padding-left: 24px;
    position: relative;
  }
  .features li::before {
    content: "\2714";
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 600;
  }

  .btn-primary {
    display: inline-block; padding: 14px 40px; border: none; border-radius: 8px;
    background: var(--accent); color: var(--bg-primary);
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .settings-hint {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 16px;
  }

  .progress-container { display: none; margin-top: 20px; }
  .progress-bar-track {
    height: 6px; background: var(--bg-tertiary); border-radius: 3px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: var(--accent); border-radius: 3px;
    width: 0%; transition: width 0.3s;
  }
  .progress-label { font-size: 12px; color: var(--text-secondary); margin-top: 8px; }

  .error-container {
    display: none;
    margin-top: 20px;
    padding: 14px;
    border-radius: 8px;
    background: color-mix(in srgb, var(--danger) 10%, transparent);
    border: 1px solid var(--danger);
    font-size: 13px;
    color: var(--danger);
  }
  .error-container .error-actions { margin-top: 10px; }
  .error-container .retry-btn {
    background: none; border: 1px solid var(--danger); color: var(--danger);
    padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 12px;
    font-weight: 600; margin-right: 12px;
  }
  .error-container .retry-btn:hover { background: color-mix(in srgb, var(--danger) 10%, transparent); }

  .skip-link {
    display: none; font-size: 12px;
    color: var(--text-dim); text-decoration: none;
  }
  .skip-link:hover { color: var(--text-secondary); }
</style>
</head>
<body>

<div class="setup-card">
  <div class="setup-title">Welcome to Vireo</div>
  <div class="setup-tagline">AI-powered wildlife photo organizer</div>

  <ul class="features">
    <li>Identify species in your photos with AI</li>
    <li>Rate and cull your best shots</li>
    <li>Organize photos into collections</li>
  </ul>

  <div>
    <button class="btn-primary" id="downloadBtn" onclick="getStarted()">
      Get Started
    </button>
  </div>
  <div class="settings-hint">You can change models and settings anytime in Settings.</div>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div class="progress-label" id="progressLabel"></div>
  </div>

  <div class="error-container" id="errorContainer">
    <div id="errorMessage"></div>
    <div class="error-actions">
      <button class="retry-btn" onclick="getStarted()">Retry</button>
      <a href="#" class="skip-link" id="skipLink" onclick="skipSetup(); return false;">Skip for now</a>
    </div>
  </div>
</div>

<script src="/static/vireo-utils.js"></script>
<script>
/* Inline safeFetch/safeEventSource fallback for standalone welcome page.
   Use var assignments (not function declarations) inside if-blocks to avoid
   browser scoping issues (Safari doesn't hoist block-scoped declarations). */
if (typeof safeFetch === 'undefined') {
  var safeFetch = async function(url, opts, cfg) {
    cfg = cfg || {};
    var resp = await fetch(url, opts);
    if (!resp.ok) {
      var body = {};
      try { body = await resp.json(); } catch(e) {}
      throw new Error(body.error || 'Request failed (' + resp.status + ')');
    }
    var text = await resp.text();
    if (!text) return null;
    return JSON.parse(text);
  };
}
if (typeof safeEventSource === 'undefined') {
  var safeEventSource = function(url, callbacks) {
    callbacks = callbacks || {};
    var source = new EventSource(url);
    source.addEventListener('progress', function(e) {
      if (callbacks.onProgress) callbacks.onProgress(JSON.parse(e.data));
    });
    source.addEventListener('complete', function(e) {
      source.close();
      if (callbacks.onComplete) callbacks.onComplete(JSON.parse(e.data));
    });
    source.onerror = function() {
      source.close();
      if (callbacks.onError) callbacks.onError();
    };
    return source;
  };
}

var MODEL_ID = 'bioclip-vit-b-16';
var modelAlreadyDownloaded = false;

async function checkModelStatus() {
  try {
    var data = await safeFetch('/api/models/status', {}, { toast: false });
    var match = (data.available_models || []).find(function(m) { return m.id === MODEL_ID; });
    if (match && match.downloaded) {
      modelAlreadyDownloaded = true;
    }
  } catch(e) {
    /* Ignore — we'll attempt the download when the user clicks */
  }
}

async function getStarted() {
  var btn = document.getElementById('downloadBtn');
  var errorContainer = document.getElementById('errorContainer');
  errorContainer.style.display = 'none';

  if (modelAlreadyDownloaded) {
    btn.disabled = true;
    btn.textContent = 'Redirecting...';
    await safeFetch('/api/setup/complete', { method: 'POST' }, { toast: false });
    window.location.href = '/browse';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Downloading...';

  var progressContainer = document.getElementById('progressContainer');
  var progressBar = document.getElementById('progressBar');
  var progressLabel = document.getElementById('progressLabel');
  progressContainer.style.display = 'block';
  progressBar.style.width = '0%';
  progressLabel.textContent = 'Starting download...';

  try {
    var data = await safeFetch('/api/jobs/download-model', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model_id: MODEL_ID }),
    }, { toast: false });

    if (!data.job_id) {
      showError('Failed to start download. Please try again.');
      return;
    }

    safeEventSource('/api/jobs/' + data.job_id + '/stream', {
      onProgress: function(p) {
        if (p.total > 0) {
          var pct = Math.round((p.current / p.total) * 100);
          progressBar.style.width = pct + '%';
        }
        progressLabel.textContent = p.phase || p.current_file || 'Downloading model...';
      },
      onComplete: function(result) {
        if (result.status === 'completed') {
          progressBar.style.width = '100%';
          progressLabel.textContent = 'Download complete!';
          safeFetch('/api/setup/complete', { method: 'POST' }, { toast: false }).then(function() {
            btn.textContent = 'Setup Complete!';
            setTimeout(function() { window.location.href = '/browse'; }, 800);
          });
        } else {
          var msg = (result.errors && result.errors[0]) || 'Download failed';
          showError(msg);
        }
      },
      onError: function() {
        showError('Connection lost during download. Please check your network and try again.');
      }
    });
  } catch(e) {
    showError(e.message || 'Download failed. Please try again.');
  }
}

function showError(message) {
  var btn = document.getElementById('downloadBtn');
  btn.disabled = false;
  btn.textContent = 'Get Started';

  var progressContainer = document.getElementById('progressContainer');
  progressContainer.style.display = 'none';

  var errorContainer = document.getElementById('errorContainer');
  var errorMessage = document.getElementById('errorMessage');
  var skipLink = document.getElementById('skipLink');
  errorMessage.textContent = message;
  errorContainer.style.display = 'block';
  skipLink.style.display = 'inline';
}

async function skipSetup() {
  await safeFetch('/api/setup/complete', { method: 'POST' }, { toast: false });
  window.location.href = '/browse';
}

checkModelStatus();
</script>
</body>
</html>
