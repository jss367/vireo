<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/favicon.ico">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<title>Vireo - Classify</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-primary, #0A1F2E);
  color: var(--text-primary, #E0F0F0);
  min-height: 100vh;
  padding-bottom: 36px;
}
.content { max-width: 800px; margin: 0 auto; padding: 32px 24px; }
.section {
  background: var(--bg-secondary, #0E2A3D); border: 1px solid var(--border-primary, #14374E);
  border-radius: 8px; padding: 24px; margin-bottom: 24px;
}
.section-title {
  font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text-primary, #fff);
  padding-bottom: 8px; border-bottom: 1px solid var(--border-primary, #14374E);
}
.config-row {
  display: flex; align-items: flex-start; gap: 24px; flex-wrap: wrap; margin-bottom: 16px;
}
.config-item { flex: 1; min-width: 200px; }
.config-label {
  font-size: 11px; color: var(--text-faint, #666); text-transform: uppercase; margin-bottom: 6px;
}
.config-value { font-size: 13px; color: var(--text-primary, #E0F0F0); margin-bottom: 4px; }
.config-detail { font-size: 11px; color: var(--text-ghost, #555); }

select.picker {
  background: var(--bg-input, #14374E); color: var(--text-primary, #E0F0F0);
  border: 1px solid var(--border-secondary, #1A4560);
  border-radius: 4px; padding: 8px 12px; font-size: 13px; width: 100%;
  cursor: pointer; outline: none;
}
select.picker:focus { border-color: var(--accent, #24E5CA); }

.btn {
  border: none; border-radius: 4px; padding: 10px 24px;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s;
}
.btn:disabled { cursor: default; }
.btn-primary { background: var(--accent, #24E5CA); color: var(--bg-primary, #0A1F2E); }
.btn-primary:hover { background: var(--accent-hover, #5AF0DA); }
.btn-primary:disabled { background: var(--accent-dim, #2a5a4a); color: var(--text-ghost, #555); }
.btn-secondary { background: var(--bg-tertiary, #14374E); color: var(--text-secondary, #B0CCCC); }
.btn-secondary:hover { background: var(--border-secondary, #1A4560); }

.status-msg { font-size: 13px; color: var(--text-dim, #888); margin-top: 12px; }
.status-msg.ok { color: var(--accent, #24E5CA); }

/* Past runs */
.run-table {
  width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px;
}
.run-table th {
  text-align: left; padding: 6px 10px; color: var(--text-faint, #666);
  font-weight: 500; border-bottom: 1px solid var(--border-primary, #14374E);
}
.run-table td {
  padding: 6px 10px; border-bottom: 1px solid var(--border-subtle, #0E2A3D);
  color: var(--text-dim, #999);
}
.run-table .status-completed { color: var(--accent, #24E5CA); }
.run-table .status-failed { color: var(--danger, #e74c3c); }

.pending-banner {
  background: var(--bg-tertiary, #14374E); border-radius: 6px; padding: 14px 20px;
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
}
.pending-count {
  font-size: 24px; font-weight: 700; color: var(--warning, #f0c040); font-variant-numeric: tabular-nums;
}
.pending-text { font-size: 13px; color: var(--text-secondary, #B0CCCC); flex: 1; }

/* Photo preview grid */
.preview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 6px;
  margin-top: 12px;
  max-height: calc(100vh - 380px);
  overflow-y: auto;
}
.preview-thumb {
  aspect-ratio: 3/2;
  object-fit: cover;
  width: 100%;
  border-radius: 4px;
  background: #14374E;
}
.preview-summary {
  font-size: 12px; color: #888; margin-top: 8px;
}
</style>
</head>
<body>

{% set active_page = 'classify' %}
{% include '_navbar.html' %}

<div class="content">
  <h2 style="margin-bottom:20px;font-size:20px;">Classify</h2>

  <!-- Pending predictions banner -->
  <div class="pending-banner" id="pendingBanner" style="display:none;">
    <span class="pending-count" id="pendingCount">0</span>
    <span class="pending-text" id="pendingText">predictions waiting for review</span>
    <a href="/review" class="btn btn-primary" style="text-decoration:none;">Review Predictions</a>
  </div>

  <!-- Configure -->
  <div class="section">
    <div class="section-title">Classify & Score</div>

    <div class="config-row">
      <div class="config-item">
        <div class="config-label">Collection</div>
        <select class="picker" id="collectionPicker" onchange="updateRunButton()">
          <option value="">Select a collection...</option>
        </select>
      </div>
    </div>

    <div class="config-row">
      <div class="config-item">
        <div class="config-label">Model</div>
        <select class="picker" id="modelPicker" onchange="updateReadiness()">
          <option value="">Loading models...</option>
        </select>
      </div>
      <div class="config-item">
        <div class="config-label">Labels</div>
        <div id="labelsPicker" style="font-size:12px;max-height:120px;overflow-y:auto;padding:4px 0;"></div>
      </div>
      <div class="config-item">
        <div class="config-label" title="Minimum confidence to include a prediction. Photos below this threshold are skipped.">Threshold</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <input type="range" id="cfgThreshold" min="10" max="90" step="5" value="40"
                 style="width:120px;accent-color:#24E5CA;"
                 oninput="document.getElementById('cfgThresholdVal').textContent = this.value + '%'">
          <span style="font-size:13px;color:#E0F0F0;" id="cfgThresholdVal">40%</span>
        </div>
      </div>
    </div>

    <!-- Readiness checklist -->
    <div id="readinessPanel" style="margin-bottom:12px;padding:10px 14px;background:var(--bg-primary,#0A1F2E);border-radius:6px;border:1px solid var(--border-primary,#14374E);font-size:12px;display:none;"></div>

    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
      <button class="btn btn-primary" id="runBtn" onclick="runClassification(false)" disabled>Classify & Score</button>
      <button class="btn btn-secondary" id="reclassifyBtn" onclick="runClassification(true)" disabled>Re-classify (clear old)</button>
      <button class="btn btn-secondary" id="sharpnessBtn" onclick="runSharpness()" disabled>Score Sharpness</button>
      <span class="status-msg" id="runStatus"></span>
    </div>

    <!-- Collection photo preview -->
    <div id="collectionPreview" style="display:none;">
      <div class="preview-summary" id="previewSummary"></div>
      <div class="preview-grid" id="previewGrid"></div>
    </div>
  </div>

  <!-- Past classification runs -->
  <div class="section">
    <div class="section-title">Past Runs</div>
    <div id="pastRuns"><span style="color:#555;font-size:13px;">Loading...</span></div>
  </div>
</div>

<script>
loadCollections();
loadConfig();
loadPendingCount();
loadPastRuns();

async function loadCollections() {
  try {
    var resp = await fetch('/api/collections');
    var collections = await resp.json();
    var sel = document.getElementById('collectionPicker');
    collections.forEach(function(c) {
      sel.innerHTML += '<option value="' + c.id + '">' + escapeHtml(c.name) + '</option>';
    });
  } catch(e) {}
}

async function loadConfig() {
  try {
    // Load models
    var modelsResp = await fetch('/api/models');
    var modelsData = await modelsResp.json();
    var modelSel = document.getElementById('modelPicker');
    modelSel.innerHTML = '';
    var downloadedModels = modelsData.models.filter(function(m) { return m.downloaded; });
    if (downloadedModels.length === 0) {
      modelSel.innerHTML = '<option value="">No models downloaded — go to Settings</option>';
    } else {
      downloadedModels.forEach(function(m) {
        var opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.name + ' (' + m.model_str + ')';
        if (m.id === modelsData.active_id) opt.selected = true;
        modelSel.appendChild(opt);
      });
    }

    // Load labels
    var labelsResp = await fetch('/api/labels');
    var labelsData = await labelsResp.json();
    var labelsDiv = document.getElementById('labelsPicker');
    var active = labelsData.active || [];
    var activePaths = new Set(active.map(function(a) { return a.labels_file; }));

    if (!labelsData.labels || labelsData.labels.length === 0) {
      labelsDiv.innerHTML = '<span style="color:#888;font-size:12px;">(Tree of Life — all species)</span>';
    } else {
      var html = '';
      labelsData.labels.forEach(function(l) {
        var isActive = activePaths.has(l.labels_file);
        html += '<label style="display:flex;align-items:center;gap:4px;color:#B0CCCC;cursor:pointer;padding:2px 0;">' +
          '<input type="checkbox" class="labels-run-cb" value="' + l.labels_file.replace(/"/g, '&quot;') + '"' +
          (isActive ? ' checked' : '') + ' onchange="updateReadiness()" style="accent-color:#24E5CA;"> ' +
          l.name + ' (' + (l.species_count || 0) + ')</label>';
      });
      labelsDiv.innerHTML = html;
    }

    // Load threshold
    var cfgResp = await fetch('/api/classify/config');
    var cfg = await cfgResp.json();
    if (cfg.default_threshold) {
      var pct = Math.round(cfg.default_threshold * 100);
      document.getElementById('cfgThreshold').value = pct;
      document.getElementById('cfgThresholdVal').textContent = pct + '%';
    }
    updateReadiness();
  } catch(e) { console.error('loadConfig error:', e); }
}

async function updateReadiness() {
  var panel = document.getElementById('readinessPanel');
  var modelId = document.getElementById('modelPicker').value;
  var labelsFiles = [];
  document.querySelectorAll('.labels-run-cb:checked').forEach(function(cb) {
    labelsFiles.push(cb.value);
  });

  try {
    var params = [];
    if (modelId) params.push('model_id=' + encodeURIComponent(modelId));
    if (labelsFiles.length > 0) params.push('labels_files=' + encodeURIComponent(labelsFiles.join(',')));
    var resp = await fetch('/api/classify/readiness' + (params.length ? '?' + params.join('&') : ''));
    var r = await resp.json();

    var items = [];

    // Model status
    if (r.model_ready) {
      items.push('<span style="color:var(--accent,#24E5CA);">&#10003;</span> Model: <b>' + r.model_name + '</b> — ready');
    } else if (r.needs_download) {
      items.push('<span style="color:var(--warning,#f0c040);">&#9679;</span> Model: <b>' + r.model_name + '</b> — will download <b>' + (r.model_size_mb >= 1000 ? (r.model_size_mb / 1000).toFixed(1) + ' GB' : r.model_size_mb + ' MB') + '</b> on first run');
    } else {
      items.push('<span style="color:var(--danger,#e74c3c);">&#10007;</span> No model available — download one in Settings');
    }

    // Labels status
    if (r.use_tol) {
      items.push('<span style="color:var(--info,#7ec8e3);">&#9679;</span> Labels: <b>Tree of Life</b> — classifying against all species (slower, less accurate than regional labels)');
    } else if (r.labels_count > 0) {
      var labelDisplay = r.labels_name.length > 60 ? r.labels_name.substring(0, 57) + '...' : r.labels_name;
      items.push('<span style="color:var(--accent,#24E5CA);">&#10003;</span> Labels: <b>' + labelDisplay + '</b> — ' + r.labels_count.toLocaleString() + ' species');
    }

    // Embeddings status
    if (!r.use_tol) {
      if (r.embeddings_cached) {
        items.push('<span style="color:var(--accent,#24E5CA);">&#10003;</span> Embeddings: precomputed — classification will start immediately');
      } else if (r.labels_count > 0) {
        items.push('<span style="color:var(--warning,#f0c040);">&#9679;</span> Embeddings: not cached — will compute for ' + r.labels_count.toLocaleString() + ' labels on first run (~1-3 min)');
      }
    }

    panel.innerHTML = items.join('<br>');
    panel.style.display = items.length > 0 ? '' : 'none';
  } catch(e) {
    panel.style.display = 'none';
  }
}

async function loadPendingCount() {
  try {
    var resp = await fetch('/api/predictions?status=pending');
    var preds = await resp.json();
    if (preds.length > 0) {
      document.getElementById('pendingBanner').style.display = 'flex';
      document.getElementById('pendingCount').textContent = preds.length;
      document.getElementById('pendingText').textContent =
        preds.length === 1 ? 'prediction waiting for review' : 'predictions waiting for review';
    }
  } catch(e) {}
}

async function loadPastRuns() {
  try {
    var resp = await fetch('/api/jobs/history?limit=10');
    var rows = await resp.json();
    var classifyRuns = rows.filter(function(r) { return r.type === 'classify'; });
    if (classifyRuns.length === 0) {
      document.getElementById('pastRuns').innerHTML = '<span style="color:#555;font-size:13px;">No classification runs yet.</span>';
      return;
    }
    var html = '<table class="run-table"><thead><tr><th>Date</th><th>Status</th><th>Duration</th><th>Result</th></tr></thead><tbody>';
    classifyRuns.forEach(function(r) {
      var cls = r.status === 'completed' ? 'status-completed' : r.status === 'failed' ? 'status-failed' : '';
      var started = r.started_at ? new Date(r.started_at).toLocaleString() : '-';
      var duration = r.duration != null ? formatDuration(r.duration) : '-';
      var result = '-';
      if (r.result) {
        try {
          var parsed = typeof r.result === 'string' ? JSON.parse(r.result) : r.result;
          if (parsed.error) { result = parsed.error.split('\n')[0]; }
          else {
            var parts = [];
            for (var k in parsed) parts.push(k + ': ' + parsed[k]);
            result = parts.join(', ');
          }
        } catch(e) {}
      }
      html += '<tr><td>' + started + '</td><td class="' + cls + '">' + r.status + '</td>' +
        '<td>' + duration + '</td><td>' + escapeHtml(result) + '</td></tr>';
    });
    html += '</tbody></table>';
    document.getElementById('pastRuns').innerHTML = html;
  } catch(e) {}
}

function updateRunButton() {
  var collId = document.getElementById('collectionPicker').value;
  document.getElementById('runBtn').disabled = !collId;
  document.getElementById('reclassifyBtn').disabled = !collId;
  document.getElementById('sharpnessBtn').disabled = !collId;
  if (collId) {
    loadCollectionPreview(collId);
  } else {
    document.getElementById('collectionPreview').style.display = 'none';
  }
}

async function loadCollectionPreview(collId) {
  try {
    var resp = await fetch('/api/collections/' + collId + '/photos?per_page=999');
    var data = await resp.json();
    var photos = data.photos || [];
    var preview = document.getElementById('collectionPreview');
    var grid = document.getElementById('previewGrid');
    var summary = document.getElementById('previewSummary');

    if (photos.length === 0) {
      preview.style.display = 'none';
      return;
    }

    summary.textContent = photos.length + (photos.length >= 200 ? '+' : '') + ' photos in this collection';
    var html = '';
    photos.forEach(function(p) {
      html += '<img class="preview-thumb" src="/thumbnails/' + p.id + '.jpg" loading="lazy" title="' + escapeHtml(p.filename) + '" style="cursor:pointer;" onclick="openLightbox(' + p.id + ',\'' + escapeHtml(p.filename).replace(/'/g, "\\'") + '\')">';
    });
    grid.innerHTML = html;
    preview.style.display = '';
  } catch(e) {}
}

async function runClassification(reclassify) {
  var collId = document.getElementById('collectionPicker').value;
  if (!collId) return;

  if (reclassify && !confirm('This will clear all existing predictions for this collection and re-classify from scratch. Continue?')) {
    return;
  }

  var btn = document.getElementById('runBtn');
  var status = document.getElementById('runStatus');
  var threshold = parseInt(document.getElementById('cfgThreshold').value, 10) / 100;

  btn.disabled = true;
  document.getElementById('reclassifyBtn').disabled = true;
  status.textContent = reclassify ? 'Clearing old predictions...' : 'Starting...';
  status.className = 'status-msg';

  try {
    var resp = await fetch('/api/jobs/classify', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        collection_id: parseInt(collId),
        threshold: threshold,
        model_id: document.getElementById('modelPicker').value || undefined,
        labels_files: (function() {
          var files = [];
          document.querySelectorAll('.labels-run-cb:checked').forEach(function(cb) { files.push(cb.value); });
          return files.length > 0 ? files : undefined;
        })(),
        reclassify: !!reclassify,
      }),
    });
    if (!resp.ok) {
      var err = await resp.json();
      status.textContent = 'Error: ' + (err.error || 'failed');
      btn.disabled = false;
      return;
    }
    var data = await resp.json();
    status.textContent = 'Classifying...';

    var source = new EventSource('/api/jobs/' + data.job_id + '/stream');
    source.addEventListener('progress', function(e) {
      var p = JSON.parse(e.data);
      var parts = [];
      if (p.phase) parts.push(p.phase);
      if (p.total > 0 && p.current > 0) {
        parts.push(p.current + '/' + p.total);
      }
      if (p.current_file) parts.push(p.current_file);
      status.textContent = parts.join(' — ');
    });
    source.addEventListener('complete', function(e) {
      source.close();
      var result = JSON.parse(e.data);
      if (result.status === 'completed' && result.result) {
        var r = result.result;
        var parts = ['Done! ' + r.total + ' photos processed'];
        if (r.predictions_stored) parts.push(r.predictions_stored + ' predictions');
        if (r.burst_groups) parts.push(r.burst_groups + ' burst groups');
        if (r.already_classified) parts.push(r.already_classified + ' already classified (skipped)');
        if (r.already_labeled) parts.push(r.already_labeled + ' already labeled');
        if (r.failed) parts.push(r.failed + ' failed');
        if (result.duration) parts.push(formatDuration(result.duration));
        status.textContent = parts.join(', ');
        status.className = 'status-msg ok';
        // Show the review banner
        loadPendingCount();
        loadPastRuns();
      } else {
        status.textContent = 'Failed: ' + (result.errors || []).join(', ');
      }
      btn.disabled = false;
    });
    source.onerror = function() { source.close(); status.textContent = 'Connection lost'; btn.disabled = false; };
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
    btn.disabled = false;
  }
}

async function runSharpness() {
  var collId = document.getElementById('collectionPicker').value;
  if (!collId) return;

  var btn = document.getElementById('sharpnessBtn');
  var status = document.getElementById('runStatus');
  btn.disabled = true;
  status.textContent = 'Scoring sharpness...';
  status.className = 'status-msg';

  try {
    var resp = await fetch('/api/jobs/sharpness', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({collection_id: parseInt(collId)}),
    });
    if (!resp.ok) {
      var err = await resp.json();
      status.textContent = 'Error: ' + (err.error || 'failed');
      btn.disabled = false;
      return;
    }
    var data = await resp.json();

    var source = new EventSource('/api/jobs/' + data.job_id + '/stream');
    source.addEventListener('progress', function(e) {
      var p = JSON.parse(e.data);
      var parts = [];
      if (p.phase) parts.push(p.phase);
      if (p.total > 0 && p.current > 0) {
        parts.push(p.current + '/' + p.total);
      }
      if (p.current_file) parts.push(p.current_file);
      status.textContent = parts.join(' — ');
    });
    source.addEventListener('complete', function(e) {
      source.close();
      var result = JSON.parse(e.data);
      if (result.status === 'completed' && result.result) {
        var r = result.result;
        status.textContent = 'Done! ' + r.scored_count + ' scored, ' +
          r.group_count + ' burst groups, ' + (r.auto_flagged || 0) + ' best shots auto-flagged' +
          (result.duration ? ' (' + result.duration + 's)' : '');
        status.className = 'status-msg ok';
        loadPastRuns();
      } else {
        status.textContent = 'Failed: ' + (result.errors || []).join(', ');
      }
      btn.disabled = false;
    });
    source.onerror = function() { source.close(); status.textContent = 'Connection lost'; btn.disabled = false; };
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
    btn.disabled = false;
  }
}

function escapeHtml(str) {
  if (str == null) return '';
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(String(str)));
  return div.innerHTML;
}
</script>
</body>
</html>
