<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/favicon.ico">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="stylesheet" href="/static/vireo-base.css">
<title>Vireo - Duplicates</title>
<style>
  body { padding-bottom: 36px; }
  .content { max-width: 1200px; }

  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .page-header h1 { margin: 0; font-size: 20px; font-weight: 600; color: var(--text-primary); }
  .page-header .sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  .btn-primary {
    background: var(--accent); color: var(--accent-text); border: none;
    border-radius: 4px; padding: 8px 16px; font-size: 13px; cursor: pointer;
    font-weight: 500;
  }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-secondary {
    background: var(--bg-tertiary); color: var(--text-secondary);
    border: 1px solid var(--border-secondary); border-radius: 4px;
    padding: 6px 14px; font-size: 12px; cursor: pointer;
  }
  .btn-secondary:hover { background: var(--border-secondary); }

  .empty-state, .no-results {
    text-align: center; padding: 48px 20px; color: var(--text-dim);
    border: 1px dashed var(--border-primary); border-radius: 8px;
  }
  .empty-state .label { margin-bottom: 16px; font-size: 14px; }

  .progress-box {
    padding: 16px; border: 1px solid var(--border-primary); border-radius: 8px;
    background: var(--bg-secondary); margin-bottom: 16px;
  }
  .progress-box .status { font-size: 13px; color: var(--text-secondary); }
  .progress-box .spinner {
    display: inline-block; width: 10px; height: 10px; margin-right: 8px;
    border: 2px solid var(--border-secondary); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 1s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .summary-bar {
    display: flex; gap: 24px; padding: 12px 16px; margin-bottom: 16px;
    background: var(--bg-secondary); border: 1px solid var(--border-primary);
    border-radius: 6px; align-items: center;
  }
  .summary-stat .num {
    font-size: 20px; font-weight: 600; color: var(--text-primary);
  }
  .summary-stat .label {
    font-size: 11px; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .dup-group {
    border: 1px solid var(--border-primary); border-radius: 8px;
    padding: 12px; margin-bottom: 12px; background: var(--bg-secondary);
  }
  .dup-group-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border-primary);
  }
  .dup-group-header label {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-secondary); cursor: pointer;
    user-select: none;
  }
  .dup-group-header .hash {
    font-family: monospace; font-size: 11px; color: var(--text-ghost);
    margin-left: auto;
  }

  .dup-row { display: flex; flex-wrap: wrap; gap: 12px; }

  .dup-card {
    width: 180px; display: flex; flex-direction: column;
    border: 2px solid transparent; border-radius: 6px;
    padding: 6px; background: var(--bg-tertiary);
  }
  .dup-card.winner { border-color: var(--accent); }
  .dup-card.loser { opacity: 0.65; }
  .dup-card .thumb {
    width: 100%; aspect-ratio: 4/3; object-fit: cover;
    border-radius: 4px; background: var(--bg-primary);
    display: block;
  }
  .dup-card .thumb-placeholder {
    width: 100%; aspect-ratio: 4/3; border-radius: 4px;
    background: var(--bg-primary); display: flex;
    align-items: center; justify-content: center;
    color: var(--text-ghost); font-size: 11px;
  }
  .dup-card .badge {
    display: inline-block; margin-top: 6px;
    padding: 2px 8px; border-radius: 3px;
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    align-self: flex-start;
  }
  .dup-card.winner .badge {
    background: var(--accent); color: var(--accent-text);
  }
  .dup-card.loser .badge {
    background: var(--danger); color: var(--text-primary);
  }
  .dup-card .filename {
    margin-top: 4px; font-size: 12px; color: var(--text-primary);
    word-break: break-all; font-weight: 500;
  }
  .dup-card .path {
    font-size: 10px; color: var(--text-dim); word-break: break-all;
    margin-top: 2px;
  }
  .dup-card .reason {
    font-size: 11px; color: var(--danger); margin-top: 4px;
    font-style: italic;
  }
  .dup-card .meta {
    font-size: 10px; color: var(--text-ghost); margin-top: 4px;
  }

  .apply-bar {
    position: sticky; bottom: 0; background: var(--bg-primary);
    padding: 12px 0; border-top: 1px solid var(--border-primary);
    margin-top: 16px; display: flex; gap: 12px; align-items: center;
  }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin: 24px 0 8px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border-primary);
  }
  .section-header h2 {
    margin: 0; font-size: 14px; font-weight: 600;
    color: var(--text-primary);
  }
  .section-header .section-sub {
    font-size: 11px; color: var(--text-dim); margin-top: 2px;
  }
  .section-header .section-actions {
    display: flex; gap: 8px; align-items: center;
  }

  .resolved-toggle {
    cursor: pointer; user-select: none; color: var(--text-secondary);
    font-size: 13px; display: flex; align-items: center; gap: 6px;
  }
  .resolved-toggle:hover { color: var(--text-primary); }
  .resolved-toggle .chev { display: inline-block; transition: transform 0.15s; }
  .resolved-toggle.expanded .chev { transform: rotate(90deg); }

  .resolved-list { display: none; }
  .resolved-list.expanded { display: block; }

  .dup-card .trash-btn {
    margin-top: 6px; padding: 4px 8px;
    background: var(--bg-primary); color: var(--danger);
    border: 1px solid var(--danger); border-radius: 3px;
    font-size: 11px; cursor: pointer;
  }
  .dup-card .trash-btn:hover {
    background: var(--danger); color: var(--text-primary);
  }
  .dup-card .trash-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .dup-card.trashed { opacity: 0.4; }
  .dup-card.trashed .trash-btn { display: none; }
  .dup-card .trash-status {
    margin-top: 4px; font-size: 10px; color: var(--text-dim);
    font-style: italic;
  }

  /* Missing-file warning. Cards for rows whose file was deleted/moved on
     disk get a yellow border + "MISSING" tag so the user doesn't trash
     surviving twins based on a ghost row. */
  .dup-card.missing { border-color: var(--warning, #d69e2e); }
  .dup-card .missing-tag {
    margin-top: 4px; padding: 2px 6px;
    background: var(--warning, #d69e2e); color: var(--text-primary);
    border-radius: 3px;
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    align-self: flex-start;
  }
  .group-warning {
    margin-bottom: 8px; padding: 8px 12px; border-radius: 4px;
    background: var(--warning-bg, rgba(214, 158, 46, 0.15));
    border-left: 3px solid var(--warning, #d69e2e);
    font-size: 12px; color: var(--text-primary);
  }
  .group-warning.severe {
    background: var(--danger-bg, rgba(220, 38, 38, 0.15));
    border-left-color: var(--danger);
  }

  /* Bulk-decide bucket cards. When the same dedup question repeats many
     times across the same folder set, we surface one card per bucket so
     the user can resolve all of them with one click. */
  .bucket-card {
    border: 1px solid var(--border-primary); border-radius: 8px;
    padding: 12px 14px; margin-bottom: 10px; background: var(--bg-secondary);
  }
  .bucket-card .bucket-headline {
    font-size: 13px; color: var(--text-primary); margin-bottom: 6px;
  }
  .bucket-card .bucket-headline b { color: var(--text-primary); }
  .bucket-card .bucket-headline .count { color: var(--accent); font-weight: 600; }
  .bucket-card .bucket-meta {
    font-size: 11px; color: var(--text-dim); margin-bottom: 10px;
  }
  .bucket-card .bucket-actions {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .bucket-card .bucket-actions .keep-btn {
    background: var(--bg-tertiary); color: var(--text-primary);
    border: 1px solid var(--border-secondary); border-radius: 4px;
    padding: 6px 12px; font-size: 12px; cursor: pointer;
  }
  .bucket-card .bucket-actions .keep-btn:hover {
    background: var(--accent); color: var(--accent-text);
    border-color: var(--accent);
  }
  .bucket-card .bucket-actions .keep-btn:disabled {
    opacity: 0.5; cursor: not-allowed;
  }
  .bucket-card .delete-toggle {
    margin-left: auto; font-size: 11px; color: var(--text-secondary);
    display: flex; align-items: center; gap: 6px; cursor: pointer;
    user-select: none;
  }
  .bucket-card .bucket-status {
    margin-top: 8px; font-size: 11px; color: var(--text-dim);
    font-style: italic;
  }
  .bucket-card.applying { opacity: 0.6; }

  .trash-progress {
    margin: -6px 0 14px; padding: 12px 14px;
    border: 1px solid var(--border-primary); border-radius: 6px;
    background: var(--bg-secondary); color: var(--text-secondary);
  }
  .trash-progress[hidden] { display: none; }
  .trash-progress.compact {
    margin: 10px 0 0; padding: 10px 12px; background: var(--bg-primary);
  }
  .trash-progress.error { border-color: var(--danger); }
  .trash-progress .trash-progress-head {
    display: flex; justify-content: space-between; gap: 12px;
    margin-bottom: 7px; font-size: 12px; font-style: normal;
  }
  .trash-progress .trash-progress-head b {
    color: var(--text-primary); font-weight: 500;
  }
  .trash-progress .trash-progress-percent {
    color: var(--text-dim); font-variant-numeric: tabular-nums;
  }
  .trash-progress .trash-progress-track {
    height: 8px; overflow: hidden; border-radius: 999px;
    background: var(--bg-tertiary); border: 1px solid var(--border-primary);
  }
  .trash-progress .trash-progress-fill {
    width: 0; height: 100%; border-radius: inherit;
    background: var(--accent); transition: width 0.2s ease;
  }
  .trash-progress.error .trash-progress-fill { background: var(--danger); }
  .trash-progress .trash-progress-detail {
    margin-top: 7px; font-size: 11px; color: var(--text-dim);
    font-style: normal; font-variant-numeric: tabular-nums;
  }
  .trash-progress .trash-progress-note {
    margin-top: 3px; font-size: 10px; color: var(--text-ghost);
    font-style: normal;
  }
</style>
</head>
<body>

{% include '_navbar.html' %}

<div class="content">

  <div class="page-header">
    <div>
      <h1>Duplicate Files</h1>
      <div class="sub">Find exact-byte duplicate photos and remove the extra copies.</div>
    </div>
    <div>
      <button id="scanBtn" class="btn-primary" onclick="startScan()">Scan for duplicate files</button>
    </div>
  </div>

  <div id="progress" class="progress-box" style="display:none;">
    <span class="spinner"></span>
    <span class="status" id="progressStatus">Starting scan...</span>
  </div>

  <div id="restoredBanner" class="group-warning" style="display:none;">
    Showing results from your last scan (<span id="restoredAgo"></span>).
    Click <b>Scan for duplicate files</b> above for a fresh scan.
  </div>

  <div id="summary" style="display:none;"></div>

  <div id="results"></div>

  <div id="emptyState" class="empty-state">
    <div class="label">Click <b>Scan for duplicate files</b> to find exact-byte duplicates in your library.</div>
  </div>

  <div id="applyBar" class="apply-bar" style="display:none;">
    <button id="applyBtn" class="btn-primary" onclick="applyRejections()">Reject 0 extra copies</button>
    <button class="btn-secondary" onclick="clearResults()">Clear results</button>
    <span id="applyStatus" style="font-size:12px;color:var(--text-dim);"></span>
  </div>

</div>

<script>
  var _proposals = [];
  var _currentJobId = null;
  // Set synchronously at the top of startScan() so the async tryRestoreLastScan
  // can detect that a fresh scan is already underway and skip its render.
  var _scanInProgress = false;

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function showProgress(msg) {
    var pg = document.getElementById('progress');
    pg.style.display = '';
    document.getElementById('progressStatus').textContent = msg || 'Scanning...';
  }

  function hideProgress() {
    document.getElementById('progress').style.display = 'none';
  }

  function setEmptyVisible(visible) {
    document.getElementById('emptyState').style.display = visible ? '' : 'none';
  }

  function hideRestoredBanner() {
    document.getElementById('restoredBanner').style.display = 'none';
  }

  function formatTimeAgo(isoStr) {
    if (!isoStr) return '';
    // job_history timestamps are naive local-time ISO strings written by
    // datetime.now().isoformat() in vireo/jobs.py. Pass them through as-is so
    // JS parses them as local time; appending 'Z' would shift the displayed
    // age by the local UTC offset (e.g. a fresh scan appearing hours old).
    var d = new Date(isoStr);
    var sec = Math.floor((new Date() - d) / 1000);
    if (sec < 60) return 'just now';
    if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
    if (sec < 86400) return Math.floor(sec / 3600) + 'h ago';
    return d.toLocaleString();
  }

  async function tryRestoreLastScan() {
    if (_scanInProgress) return;
    try {
      var data = await safeFetch('/api/duplicates/last-scan', undefined, { toast: false });
      // The user may have clicked Scan while we were awaiting the response.
      // Don't clobber the in-progress scan's UI with stale results — that
      // would re-enable the scan button and risk overlapping scan jobs.
      if (_scanInProgress) return;
      if (!data || !data.found) return;
      renderResults(data.result || {});
      var banner = document.getElementById('restoredBanner');
      document.getElementById('restoredAgo').textContent =
        formatTimeAgo(data.finished_at);
      banner.style.display = '';
    } catch (e) {
      // best-effort; fall through to the normal empty-state UI
    }
  }

  async function startScan() {
    var scanBtn = document.getElementById('scanBtn');
    _scanInProgress = true;
    scanBtn.disabled = true;
    hideRestoredBanner();
    setEmptyVisible(false);
    document.getElementById('results').innerHTML = '';
    document.getElementById('summary').style.display = 'none';
    document.getElementById('applyBar').style.display = 'none';
    showProgress('Starting scan...');

    try {
      var data = await safeFetch('/api/duplicates/scan', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: '{}',
      }, { toast: false });
      _currentJobId = data.job_id;

      safeEventSource('/api/jobs/' + data.job_id + '/stream', {
        onProgress: function(p) {
          var msg = p.phase || p.current_file || 'Scanning...';
          if (p.total && p.current != null) {
            msg += ' (' + p.current + '/' + p.total + ')';
          }
          showProgress(msg);
        },
        onComplete: function(evt) {
          // Clear the in-progress flag at every terminal scan state.
          // Without this, a later bulk-resolve's renderResults guard
          // (``if (!_scanInProgress)``) would block forever after the
          // first scan, and the just-resolved bucket card never
          // disappears from the page.
          _scanInProgress = false;
          if (evt.status === 'completed') {
            renderResults(evt.result || {});
          } else if (evt.status === 'cancelled') {
            hideProgress();
            scanBtn.disabled = false;
            setEmptyVisible(true);
            showToast('Scan cancelled', 'error');
          } else {
            hideProgress();
            scanBtn.disabled = false;
            setEmptyVisible(true);
            var err = (evt.errors || []).join(', ') || 'Scan failed';
            showToast(err, 'error');
          }
        },
        onError: function() {
          _scanInProgress = false;
          hideProgress();
          scanBtn.disabled = false;
          setEmptyVisible(true);
        },
      });
    } catch (e) {
      _scanInProgress = false;
      hideProgress();
      scanBtn.disabled = false;
      setEmptyVisible(true);
      showToast(e.message || 'Failed to start scan', 'error');
    }
  }

  // Latest scan-result snapshot. Used for client-side bucket pruning
  // after a successful bulk-resolve so we don't have to round-trip a
  // full re-scan to refresh the UI.
  var _lastScanResult = null;

  function renderResults(result) {
    hideProgress();
    document.getElementById('scanBtn').disabled = false;

    _lastScanResult = result;
    _proposals = result.proposals || [];

    // Split proposals so the two sections render independently. Unresolved
    // groups still need a user decision (the apply flow); resolved groups
    // are already auto-handled and just need on-disk cleanup. Mixing them
    // would mislead the apply count and confuse the action affordances.
    var unresolved = [];
    var resolved = [];
    _proposals.forEach(function(p, gi) {
      p._gi = gi;  // stable index back into _proposals for checkbox lookup
      if (p.status === 'resolved') resolved.push(p);
      else unresolved.push(p);
    });

    if (_proposals.length === 0) {
      setEmptyVisible(false);
      document.getElementById('results').innerHTML =
        '<div class="no-results">No duplicates found. Your library is clean.</div>';
      return;
    }

    setEmptyVisible(false);

    // Summary
    var unresolvedGroupCount = unresolved.length;
    var unresolvedLoserCount = result.loser_count || 0;
    var resolvedGroupCount = result.resolved_group_count || resolved.length;
    var resolvedLoserCount = result.resolved_loser_count ||
      resolved.reduce(function(n, p) { return n + (p.losers || []).length; }, 0);
    var emptyFileGroupCount = resolved.reduce(function(n, p) {
      return n + (p.empty_file_group ? 1 : 0);
    }, 0);
    var resolvedBytes = 0;
    resolved.forEach(function(p) {
      (p.losers || []).forEach(function(l) {
        if (l.file_size) resolvedBytes += l.file_size;
      });
    });
    // Bulk-trashable count must mirror ``isBulkTrashProtected`` so the button
    // label never advertises files the action would skip. Without this the
    // button claims N losers but ``trashAllLoserFiles`` returns "Nothing to
    // trash" when every remaining group is protected.
    var bulkTrashableLoserCount = resolved.reduce(function(n, p) {
      if (isBulkTrashProtected(p)) return n;
      return n + (p.losers || []).length;
    }, 0);

    var summary = document.getElementById('summary');
    summary.style.display = '';
    var summaryHtml = '<div class="summary-bar">' +
      '<div class="summary-stat"><div class="num">' + unresolvedGroupCount + '</div>' +
        '<div class="label">Need review</div></div>' +
      '<div class="summary-stat"><div class="num" style="color:var(--danger);">' + unresolvedLoserCount + '</div>' +
        '<div class="label">Extras to reject</div></div>';
    if (resolvedGroupCount > 0) {
      summaryHtml +=
        '<div class="summary-stat"><div class="num">' + resolvedGroupCount + '</div>' +
          '<div class="label">Cleanup pending</div></div>' +
        '<div class="summary-stat"><div class="num">' + formatBytes(resolvedBytes) + '</div>' +
          '<div class="label">Extra files on disk</div></div>';
      if (emptyFileGroupCount > 0) {
        summaryHtml +=
          '<div class="summary-stat"><div class="num" style="color:var(--warning, #d69e2e);">' +
            emptyFileGroupCount + '</div>' +
            '<div class="label">Empty-file groups</div></div>';
      }
    }
    summaryHtml += '</div>';
    summary.innerHTML = summaryHtml;

    // Render each section.
    var html = '';
    // Iterate over the unfiltered bucket list so `bi` stays a stable index
    // into ``_lastScanResult.buckets``. Filtering with ``.filter`` first and
    // re-indexing the result would let a partial bulk-resolve (which can drop
    // a bucket to ``group_count === 1`` without removing it from the array)
    // shift later indexes, so subsequent button clicks would resolve the
    // wrong bucket — and with delete enabled, potentially trash the wrong
    // files. Skip 1-group buckets inline instead — the per-group UI handles
    // them more expressively (per-photo cards, ratings, etc.).
    var allBuckets = result.buckets || [];
    var hasVisibleBuckets = allBuckets.some(function(b) {
      return b.group_count >= 2;
    });
    if (hasVisibleBuckets) {
      html += '<div class="section-header"><div>' +
        '<h2>Bulk decide</h2>' +
        '<div class="section-sub">' +
        'The same dedup question repeats across multiple groups. Decide ' +
        'once per bucket to clear them all at once.</div></div></div>';
      allBuckets.forEach(function(bucket, bi) {
        if (bucket.group_count < 2) return;
        html += renderBucket(bucket, bi);
      });
    }
    if (unresolvedGroupCount > 0) {
      html += '<div class="section-header"><div>' +
        '<h2>Needs review</h2>' +
        '<div class="section-sub">' + unresolvedGroupCount +
        ' duplicate group' + (unresolvedGroupCount === 1 ? '' : 's') +
        ' awaiting your decision.</div></div></div>';
      unresolved.forEach(function(group) {
        html += renderUnresolvedGroup(group);
      });
    }

    if (resolvedGroupCount > 0) {
      // Auto-expand if the user came from the disk-cleanup banner. Detection
      // is intentionally simple \u2014 query string is the most direct way to
      // pass intent through a hard navigation without needing storage state.
      var autoExpand = window.location.search.indexOf('show=resolved') !== -1;
      var listClass = 'resolved-list' + (autoExpand ? ' expanded' : '');
      var toggleClass = 'resolved-toggle' + (autoExpand ? ' expanded' : '');
      html += '<div class="section-header">' +
        '<div>' +
          '<h2 class="' + toggleClass + '" id="resolvedToggle" onclick="toggleResolvedSection()">' +
            '<span class="chev">&#9656;</span> Resolved — cleanup pending' +
          '</h2>' +
          '<div class="section-sub">' +
          (emptyFileGroupCount === resolvedGroupCount
            ? 'These groups are zero-byte files, usually from an interrupted copy or storage problem. Check the original source or backup before deleting anything.'
            : 'Vireo already picked which copy to keep for ' +
              resolvedGroupCount + ' group' + (resolvedGroupCount === 1 ? '' : 's') +
              ', but the extra copies (' + formatBytes(resolvedBytes) +
              ') are still on disk. Empty-file groups need source or backup checks before cleanup.') +
          '</div>' +
        '</div>';
      // Hide the bulk button entirely when every remaining resolved group is
      // protected — otherwise it sticks around as a no-op that always toasts
      // "Nothing to trash" and confuses users about what cleanup is left.
      html += '<div class="section-actions">';
      if (bulkTrashableLoserCount > 0) {
        html += '<button class="btn-secondary" onclick="trashAllLoserFiles()" id="trashAllBtn">' +
            'Move ' + bulkTrashableLoserCount + ' extra ' +
            (bulkTrashableLoserCount === 1 ? 'copy' : 'copies') + ' to Trash' +
          '</button>';
      }
      html += '</div></div>';
      html += '<div class="trash-progress" id="trashAllProgress" hidden ' +
        'aria-live="polite"></div>';
      html += '<div class="' + listClass + '" id="resolvedList">';
      resolved.forEach(function(group) {
        html += renderResolvedGroup(group);
      });
      html += '</div>';
    }

    document.getElementById('results').innerHTML = html;

    if (unresolvedGroupCount > 0) {
      document.getElementById('applyBar').style.display = '';
      updateApplyCount();
    } else {
      document.getElementById('applyBar').style.display = 'none';
    }
  }

  function renderGroupWarning(group) {
    // Three levels of severity:
    //  - all_missing: every file in the group is gone — nothing to keep.
    //  - winner missing (status-dependent):
    //      • unresolved: Rule 0 promoted a surviving twin into the KEEP slot.
    //      • resolved: the kept row in the DB is fixed; if a loser file still
    //        exists it's the only surviving copy. Trashing it = data loss.
    //  - any loser missing: informational; trash actions will be no-ops for it.
    var allMissing = group.all_missing === true;
    var winner = group.winner || {};
    var losers = group.losers || [];
    var winnerMissing = winner.exists === false;
    var anyLoserMissing = losers.some(function(l) { return l.exists === false; });
    if (group.empty_file_group) {
      return '<div class="group-warning severe">' +
        '<b>Zero-byte image files detected.</b> These are not real duplicate photos; ' +
        'they are empty placeholders, usually from an interrupted copy, failed import, ' +
        'or storage issue. Check the camera card, original source, or backup before ' +
        'moving files to Trash. After restoring or deleting them, rescan this folder.' +
        '</div>';
    }
    if (allMissing) {
      return '<div class="group-warning severe">' +
        '<b>All files in this group are missing on disk.</b> ' +
        'Nothing to delete — Vireo just needs to clean up the orphaned DB rows. ' +
        'Re-scanning the affected folders will mark these as missing.' +
        '</div>';
    }
    if (winnerMissing) {
      if (group.status === 'resolved') {
        return '<div class="group-warning severe">' +
          '<b>Heads up:</b> the kept file in this resolved group is missing on disk. ' +
          'Any surviving extra copy below may be the only remaining copy — ' +
          'trash actions on those extras are disabled to prevent data loss. ' +
          'Restore the kept file, or rescan the folder so Vireo can re-resolve.' +
          '</div>';
      }
      // status === 'unresolved': Rule 0 promotes a present candidate, so the
      // KEEP card here is genuinely a surviving copy that's been swapped in.
      return '<div class="group-warning severe">' +
        '<b>Heads up:</b> the file Vireo originally picked to keep is missing on disk. ' +
        'A surviving copy was promoted instead — check the KEEP card before applying.' +
        '</div>';
    }
    if (anyLoserMissing) {
      return '<div class="group-warning">' +
        'One or more extra copies are already missing on disk. They’ll be ' +
        'rejected in the DB; trash actions will skip them.' +
        '</div>';
    }
    return '';
  }

  function renderBucket(bucket, bi) {
    var folders = bucket.folders || [];
    var folderListHtml = folders.map(function(f) {
      return '<code>' + escapeHtml(f) + '</code>';
    }).join(' &middot; ');
    var examples = (bucket.example_filenames || []).map(escapeHtml).join(', ');
    var sizeStr = formatBytes(bucket.total_size || 0);
    var html = '<div class="bucket-card" data-bi="' + bi + '">';
    html += '<div class="bucket-headline">' +
      '<span class="count">' + bucket.group_count + '</span> ' +
      'duplicate group' + (bucket.group_count === 1 ? '' : 's') +
      ' shared between: ' + folderListHtml + '</div>';
    var metaParts = [];
    if (examples) metaParts.push('Examples: ' + examples);
    if (bucket.total_size) metaParts.push(sizeStr + ' recoverable');
    if (metaParts.length) {
      html += '<div class="bucket-meta">' + metaParts.join(' &middot; ') + '</div>';
    }
    html += '<div class="bucket-actions">';
    folders.forEach(function(folder, fi) {
      var label = folder.split('/').filter(Boolean).pop() || folder;
      html += '<button class="keep-btn" onclick="bulkResolveByFolderIdx(' +
              bi + ', ' + fi + ')">' +
        'Keep ' + escapeHtml(label) + ' for all ' + bucket.group_count +
        '</button>';
    });
    html += '<button class="keep-btn reveal-btn" onclick="revealBucketFolders(' + bi + ')" ' +
      'title="Open all bucket folders in your OS file manager">' +
      escapeHtml(window.VIREO_REVEAL_LABEL) + '</button>';
    html += '<label class="delete-toggle">' +
      '<input type="checkbox" data-bi="' + bi + '" data-delete-toggle> ' +
      'Also move extras to Trash</label>';
    html += '</div>';
    html += '<div class="bucket-status" data-bi="' + bi + '" data-bucket-status></div>';
    html += '</div>';
    return html;
  }

  async function revealBucketFolders(bi) {
    var bucket = (_lastScanResult && _lastScanResult.buckets || [])[bi];
    if (!bucket || !bucket.folders || bucket.folders.length === 0) return;
    try {
      var data = await safeFetch('/api/folders/reveal', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ paths: bucket.folders }),
      });
      var revealed = (data.revealed || []).length;
      var skipped = (data.skipped || []).length;
      var failed = (data.failed || []).length;
      if (failed > 0) {
        showToast('Revealed ' + revealed + ', ' + failed + ' failed', 'error');
      } else if (skipped > 0) {
        showToast('Revealed ' + revealed + ', ' + skipped + ' unknown to Vireo', 'success');
      }
      // Silent on full success — Finder windows opening is feedback enough.
    } catch (e) {
      showToast('Reveal failed: ' + (e.message || 'error'), 'error');
    }
  }

  function bulkResolveByFolderIdx(bi, fi) {
    var bucket = (_lastScanResult && _lastScanResult.buckets || [])[bi];
    if (!bucket) return;
    // After a partial prune a bucket can drop to ``group_count < 2`` and be
    // filtered out of the next render. A button left in the DOM from a stale
    // render must not be allowed to act on it.
    if (!bucket.file_hashes || bucket.file_hashes.length < 2) return;
    var folder = (bucket.folders || [])[fi];
    if (folder == null) return;
    return bulkResolveByFolder(bi, folder);
  }

  async function bulkResolveByFolder(bi, keepFolder) {
    var card = document.querySelector('.bucket-card[data-bi="' + bi + '"]');
    if (!card) return;
    var bucket = (_lastScanResult && _lastScanResult.buckets || [])[bi];
    if (!bucket) return;

    var deleteToggle = card.querySelector('input[data-delete-toggle]');
    var deleteFiles = !!(deleteToggle && deleteToggle.checked);
    var status = card.querySelector('[data-bucket-status]');
    var btns = card.querySelectorAll('.keep-btn');

    var n = bucket.group_count;
    var label = keepFolder.split('/').filter(Boolean).pop() || keepFolder;
    var confirmMsg = 'Keep all ' + n + ' photo' + (n === 1 ? '' : 's') +
      ' in ' + label + ' and reject the duplicates' +
      (deleteFiles ? ', then move the duplicate files to Trash' : '') + '?';
    if (!confirm(confirmMsg)) return;

    card.classList.add('applying');
    btns.forEach(function(b) { b.disabled = true; });
    if (status) status.textContent = 'Resolving ' + n + ' group' + (n === 1 ? '' : 's') + '...';

    try {
      var data = await safeFetch('/api/duplicates/bulk-resolve', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          file_hashes: bucket.file_hashes,
          keep_folder: keepFolder,
        }),
      });
      var resolved = data.resolved || [];
      var skippedCount = (data.skipped || []).length;
      var loserIds = [];
      resolved.forEach(function(r) {
        (r.loser_ids || []).forEach(function(id) { loserIds.push(id); });
      });

      var trashCallFailed = false;
      if (deleteFiles && loserIds.length > 0) {
        if (status) {
          status.classList.add('trash-progress', 'compact');
          status.hidden = false;
        }
        try {
          var trashData = await trashLoserFilesInBatches(
            loserIds,
            function(progress) { updateTrashProgress(status, progress); }
          );
          var trashed = trashData.trashed || 0;
          var trashFailed = (trashData.failed || []).length;
          var msg = 'Resolved ' + resolved.length + ', moved ' + trashed + ' to Trash';
          if (trashFailed) msg += ', ' + trashFailed + ' trash failed — rescan to retry';
          if (skippedCount) msg += ', ' + skippedCount + ' skipped';
          showToast(msg, trashFailed ? 'error' : 'success');
          // Partial trash failure: some files are still on disk while their
          // DB rows have been rejected. Skip the local prune so the bucket
          // card stays visible — otherwise the user has no in-page signal
          // that those files still need cleanup.
          if (trashFailed) trashCallFailed = true;
        } catch (e) {
          // Trash call failed entirely — DB is resolved but the duplicate
          // files are still on disk. Surface this and skip the local prune
          // so the bucket card stays visible; otherwise the user thinks
          // cleanup completed and has no path to retry without a rescan.
          trashCallFailed = true;
          showToast('Duplicates were resolved, but moving files to Trash failed: ' +
                    (e.message || 'error') + ' — rescan to retry', 'error');
        }
      } else {
        var msg = 'Resolved ' + resolved.length + ' group' +
          (resolved.length === 1 ? '' : 's');
        if (skippedCount) msg += ', ' + skippedCount + ' skipped';
        showToast(msg, 'success');
      }

      if (trashCallFailed) {
        // Restore the card UI so the failure is visible and not stuck in
        // the spinner state. We deliberately do not prune _lastScanResult
        // here: a rescan is required to reconcile DB-rejected rows with
        // the on-disk files that still need trashing.
        card.classList.remove('applying');
        btns.forEach(function(b) { b.disabled = false; });
        return;
      }

      // Locally prune the resolved hashes from _lastScanResult so the next
      // render drops this bucket and the matching unresolved groups. Avoids
      // an expensive re-scan round-trip on libraries with thousands of dups.
      var resolvedHashes = new Set(resolved.map(function(r) { return r.file_hash; }));
      _lastScanResult.proposals = (_lastScanResult.proposals || []).filter(
        function(p) { return !resolvedHashes.has(p.file_hash); }
      );
      // Recompute total_size and example_filenames from the surviving
      // proposals so a partially-pruned bucket card doesn't keep
      // advertising the pre-resolution recoverable size or stale sample
      // filenames. Mirrors bucket_unresolved_proposals in Python.
      var proposalsByHash = {};
      (_lastScanResult.proposals || []).forEach(function(p) {
        proposalsByHash[p.file_hash] = p;
      });
      _lastScanResult.buckets = (_lastScanResult.buckets || []).map(function(b) {
        var keptHashes = (b.file_hashes || []).filter(
          function(h) { return !resolvedHashes.has(h); }
        );
        if (keptHashes.length === b.file_hashes.length) return b;
        var keptProposals = keptHashes
          .map(function(h) { return proposalsByHash[h]; })
          .filter(function(p) { return p != null; });
        var newTotalSize = keptProposals.reduce(function(n, p) {
          return n + ((p.losers || []).length * ((p.winner || {}).file_size || 0));
        }, 0);
        var newExamples = keptProposals.slice(0, 3).map(function(p) {
          return (p.winner || {}).filename || '';
        });
        return Object.assign({}, b, {
          file_hashes: keptHashes,
          group_count: keptHashes.length,
          total_size: newTotalSize,
          example_filenames: newExamples,
        });
      });
      // renderResults reads stored aggregate counters in preference to
      // counting from proposals, so recompute them here. Without this the
      // summary bar still reports the pre-bulk-resolve totals (e.g. "Extras
      // to reject" stays at the original count even after groups are gone).
      // Mirrors the sums in vireo/duplicate_scan.py.
      var prunedProposals = _lastScanResult.proposals;
      _lastScanResult.group_count = prunedProposals.length;
      _lastScanResult.loser_count = prunedProposals.reduce(function(n, p) {
        return p.status === 'unresolved' ? n + (p.losers || []).length : n;
      }, 0);
      _lastScanResult.resolved_group_count = prunedProposals.reduce(function(n, p) {
        return p.status === 'resolved' ? n + 1 : n;
      }, 0);
      _lastScanResult.resolved_loser_count = prunedProposals.reduce(function(n, p) {
        return p.status === 'resolved' ? n + (p.losers || []).length : n;
      }, 0);
      // Don't clobber an in-flight scan's UI: if the user clicked Scan
      // while bulk-resolve was awaiting, ``renderResults`` would hide the
      // progress spinner, re-enable the scan button, and paint stale
      // pre-scan results — risking overlapping scan jobs. Same guard
      // tryRestoreLastScan uses.
      if (!_scanInProgress) {
        renderResults(_lastScanResult);
      }
    } catch (e) {
      card.classList.remove('applying');
      btns.forEach(function(b) { b.disabled = false; });
      if (status) status.textContent = '';
      showToast('Bulk resolve failed: ' + (e.message || 'error'), 'error');
    }
  }

  function renderUnresolvedGroup(group) {
    var winner = group.winner || {};
    var losers = group.losers || [];
    var hash = group.file_hash || '';
    var gi = group._gi;

    var html = '<div class="dup-group" data-hash="' + escapeHtml(hash) + '">';
    html += '<div class="dup-group-header">';
    html += '<label><input type="checkbox" class="group-check" data-gi="' + gi + '" checked onchange="updateApplyCount()"> ' +
            'Include this group (' + losers.length + ' to reject)</label>';
    html += '<span class="hash">' + escapeHtml(hash.substring(0, 16)) + '...</span>';
    html += '</div>';
    html += renderGroupWarning(group);
    html += '<div class="dup-row">';
    html += renderCard(winner, true, null, false);
    losers.forEach(function(loser) {
      html += renderCard(loser, false, loser.reason, false);
    });
    html += '</div></div>';
    return html;
  }

  function renderResolvedGroup(group) {
    var winner = group.winner || {};
    var losers = group.losers || [];
    var hash = group.file_hash || '';
    // When the kept-file is missing, any surviving loser file is the only
    // remaining copy. Drop trash affordances for that group entirely so the
    // bulk and per-card paths stay consistent — both check ``data-protected``.
    var winnerMissing = winner.exists === false;

    var html = '<div class="dup-group" data-hash="' + escapeHtml(hash) + '"' +
               (winnerMissing ? ' data-protected="winner-missing"' : '') + '>';
    html += '<div class="dup-group-header">';
    if (group.empty_file_group) {
      html += '<label style="cursor:default;">' +
              (losers.length + 1) + ' zero-byte files detected</label>';
    } else {
      html += '<label style="cursor:default;">' +
              losers.length + ' extra ' +
              (losers.length === 1 ? 'copy' : 'copies') +
              ' rejected during scan</label>';
    }
    html += '<span class="hash">' + escapeHtml(hash.substring(0, 16)) + '...</span>';
    html += '</div>';
    html += renderGroupWarning(group);
    html += '<div class="dup-row">';
    html += renderCard(winner, true, null, false);
    losers.forEach(function(loser) {
      html += renderCard(loser, false, loser.reason, true, winnerMissing);
    });
    html += '</div></div>';
    return html;
  }

  function renderCard(photo, isWinner, reason, isResolvedLoser, winnerMissingProtect) {
    var cls = isWinner ? 'winner' : 'loser';
    var missing = photo.exists === false;
    if (missing) cls += ' missing';
    var badge = isWinner ? 'KEEP' : (isResolvedLoser ? 'REJECTED' : 'WILL REJECT');
    var thumbUrl = photo.id != null
      ? (window.vireoThumbnailUrl ? window.vireoThumbnailUrl(photo) : '/thumbnails/' + photo.id + '.jpg')
      : null;
    var html = '<div class="dup-card ' + cls + '" data-photo-id="' +
               (photo.id != null ? photo.id : '') + '">';
    if (thumbUrl) {
      html += '<img class="thumb" src="' + escapeHtml(thumbUrl) +
              '" alt="' + escapeHtml(photo.filename || '') +
              '" onerror="this.outerHTML=\'<div class=\\\'thumb-placeholder\\\'>No thumbnail</div>\'">';
    } else {
      html += '<div class="thumb-placeholder">No thumbnail</div>';
    }
    html += '<span class="badge">' + badge + '</span>';
    if (missing) html += '<span class="missing-tag" title="File is no longer at this path on disk">Missing on disk</span>';
    html += '<div class="filename">' + escapeHtml(photo.filename || '') + '</div>';
    html += '<div class="path">' + escapeHtml(photo.path || '') + '</div>';
    var meta = [];
    if (photo.rating != null && photo.rating > 0) meta.push(photo.rating + '\u2605');
    if (photo.file_size != null) meta.push(formatBytes(photo.file_size));
    if (meta.length) html += '<div class="meta">' + meta.join(' \u00b7 ') + '</div>';
    if (reason) html += '<div class="reason">' + escapeHtml(reason) + '</div>';
    if (isResolvedLoser && photo.id != null && !missing && !winnerMissingProtect) {
      html += '<button type="button" class="trash-btn" onclick="trashOneLoserFile(' +
              photo.id + ')">Move file to Trash</button>';
      html += '<div class="trash-status" data-trash-status></div>';
    } else if (isResolvedLoser && !missing && winnerMissingProtect) {
      // The kept-file is gone, so this loser file may be the only remaining
      // copy. Suppress the trash button and explain why.
      html += '<div class="trash-status" data-trash-status>' +
              'Trash disabled \u2014 kept file is missing, this may be the only copy.' +
              '</div>';
    }
    html += '</div>';
    return html;
  }

  function toggleResolvedSection() {
    var toggle = document.getElementById('resolvedToggle');
    var list = document.getElementById('resolvedList');
    if (!toggle || !list) return;
    var expanded = list.classList.toggle('expanded');
    if (expanded) toggle.classList.add('expanded');
    else toggle.classList.remove('expanded');
  }

  async function trashOneLoserFile(photoId) {
    var card = document.querySelector('.dup-card[data-photo-id="' + photoId + '"]');
    if (!card) return;
    var btn = card.querySelector('.trash-btn');
    var status = card.querySelector('[data-trash-status]');
    if (btn) btn.disabled = true;
    if (status) status.textContent = 'Moving to Trash...';

    try {
      var data = await safeFetch('/api/duplicates/delete-loser-files', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ photo_ids: [photoId] }),
      });
      if (data.trashed === 1) {
        card.classList.add('trashed');
        if (status) status.textContent = 'Moved to Trash';
        showToast('Moved 1 file to Trash', 'success');
      } else if ((data.skipped || []).length) {
        var reason = data.skipped[0].reason || 'skipped';
        // "file already missing" still drops the orphan DB row server-side,
        // so the row + on-disk file are both gone — treat as terminal-done
        // rather than re-offering the button.
        if (reason === 'file already missing') {
          card.classList.add('trashed');
          if (status) status.textContent = 'Cleaned up (file was already gone)';
        } else {
          if (status) status.textContent = 'Skipped: ' + reason;
          if (btn) btn.disabled = false;
        }
      } else if ((data.failed || []).length) {
        var err = data.failed[0].error || 'failed';
        if (status) status.textContent = 'Failed: ' + err;
        if (btn) btn.disabled = false;
        showToast('Trash failed: ' + err, 'error');
      }
    } catch (e) {
      if (status) status.textContent = 'Failed';
      if (btn) btn.disabled = false;
    }
  }

  // Protected: kept-file is missing on disk for this group, so any surviving
  // loser file may be the only remaining copy. The bulk-button label and the
  // bulk action share this predicate so the count never advertises files
  // ``trashAllLoserFiles`` would skip.
  function isBulkTrashProtected(p) {
    return !!(p && p.winner && p.winner.exists === false);
  }

  // Keep each request small enough that the UI can report real progress even
  // for libraries with thousands of duplicate files. Each completed request
  // is also a durable checkpoint: a retry only includes cards that have not
  // already been cleaned up in this browser session.
  var TRASH_BATCH_SIZE = 25;

  function formatCount(n) {
    return Number(n || 0).toLocaleString();
  }

  function updateTrashProgress(container, progress) {
    if (!container) return;
    var total = progress.total || 0;
    var completed = Math.min(progress.completed || 0, total);
    var percent = total > 0 ? Math.round(completed / total * 100) : 0;
    var phase = progress.phase || 'moving';
    var headline;
    if (phase === 'complete') {
      headline = 'Cleanup complete';
    } else if (phase === 'complete_with_errors') {
      headline = 'Cleanup finished with problems';
    } else if (phase === 'error') {
      headline = 'Cleanup paused after ' + formatCount(completed) + ' of ' +
        formatCount(total) + ' files';
    } else {
      headline = 'Moving files ' + formatCount(progress.batchStart || 1) +
        '\u2013' + formatCount(progress.batchEnd || total) + ' of ' +
        formatCount(total) + ' to Trash\u2026';
    }

    container.hidden = false;
    container.classList.toggle(
      'error', phase === 'error' || phase === 'complete_with_errors');
    container.innerHTML =
      '<div class="trash-progress-head"><b>' + headline + '</b>' +
        '<span class="trash-progress-percent">' + percent + '%</span></div>' +
      '<div class="trash-progress-track" role="progressbar" ' +
        'aria-label="Moving duplicate files to Trash" aria-valuemin="0" ' +
        'aria-valuemax="' + total + '" aria-valuenow="' + completed + '">' +
        '<div class="trash-progress-fill" style="width:' + percent + '%"></div>' +
      '</div>' +
      '<div class="trash-progress-detail">' + formatCount(completed) + ' processed' +
        ' &middot; ' + formatCount(progress.trashed) + ' moved' +
        ' &middot; ' + formatCount(progress.skipped) + ' skipped' +
        ' &middot; ' + formatCount(progress.failed) + ' failed</div>' +
      '<div class="trash-progress-note">Files are processed in small batches. ' +
        'External and network drives may take longer; moved files remain recoverable ' +
        'from your operating system\u2019s Trash.</div>';
  }

  async function trashLoserFilesInBatches(photoIds, onProgress, onBatch) {
    var summary = {trashed: 0, skipped: [], failed: [], completed: 0,
                   total: photoIds.length};
    for (var offset = 0; offset < photoIds.length; offset += TRASH_BATCH_SIZE) {
      var batch = photoIds.slice(offset, offset + TRASH_BATCH_SIZE);
      var progress = {
        phase: 'moving', total: photoIds.length, completed: offset,
        batchStart: offset + 1, batchEnd: offset + batch.length,
        trashed: summary.trashed, skipped: summary.skipped.length,
        failed: summary.failed.length,
      };
      if (onProgress) onProgress(progress);

      var data;
      try {
        data = await safeFetch('/api/duplicates/delete-loser-files', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ photo_ids: batch }),
        }, {toast: false});
      } catch (e) {
        progress.phase = 'error';
        progress.completed = summary.completed;
        if (onProgress) onProgress(progress);
        e.trashSummary = summary;
        throw e;
      }

      summary.trashed += data.trashed || 0;
      summary.skipped = summary.skipped.concat(data.skipped || []);
      summary.failed = summary.failed.concat(data.failed || []);
      summary.completed += batch.length;
      if (onBatch) onBatch(data, batch);

      var hasActionableSkips = summary.skipped.some(function(s) {
        return s.reason !== 'file already missing';
      });
      if (onProgress) onProgress({
        phase: summary.completed === photoIds.length
          ? (summary.failed.length || hasActionableSkips
              ? 'complete_with_errors' : 'complete')
          : 'moving',
        total: photoIds.length, completed: summary.completed,
        batchStart: summary.completed === photoIds.length ? summary.completed : summary.completed + 1,
        batchEnd: Math.min(summary.completed + TRASH_BATCH_SIZE, photoIds.length),
        trashed: summary.trashed, skipped: summary.skipped.length,
        failed: summary.failed.length,
      });
    }
    return summary;
  }

  function applyTrashBatchToCards(data, requestedIds) {
    // "file already missing" still deletes the orphan DB row, so it is a
    // terminal completion even though no file needed to be moved.
    var terminalSkips = new Set(['file already missing']);
    var completedSet = new Set(requestedIds);
    (data.skipped || []).forEach(function(s) {
      if (!terminalSkips.has(s.reason)) completedSet.delete(s.id);
    });
    (data.failed || []).forEach(function(f) { completedSet.delete(f.id); });
    completedSet.forEach(function(pid) {
      var card = document.querySelector('.dup-card[data-photo-id="' + pid + '"]');
      if (card) {
        card.classList.add('trashed');
        var status = card.querySelector('[data-trash-status]');
        if (status) status.textContent = 'Cleaned up';
      }
    });
    (data.skipped || []).forEach(function(s) {
      if (terminalSkips.has(s.reason)) return;
      var card = document.querySelector('.dup-card[data-photo-id="' + s.id + '"]');
      if (card) {
        var status = card.querySelector('[data-trash-status]');
        if (status) status.textContent = 'Skipped: ' + (s.reason || '');
      }
    });
    (data.failed || []).forEach(function(f) {
      var card = document.querySelector('.dup-card[data-photo-id="' + f.id + '"]');
      if (card) {
        var status = card.querySelector('[data-trash-status]');
        if (status) status.textContent = 'Failed: ' + (f.error || '');
      }
    });
  }

  function refreshTrashAllButton(btn) {
    if (!btn) return;
    var remaining = 0;
    _proposals.forEach(function(p) {
      if (p.status !== 'resolved' || isBulkTrashProtected(p)) return;
      (p.losers || []).forEach(function(l) {
        var card = document.querySelector('.dup-card[data-photo-id="' + l.id + '"]');
        if (card && !card.classList.contains('trashed')) remaining++;
      });
    });
    if (remaining > 0) {
      btn.disabled = false;
      btn.textContent = 'Move ' + remaining + ' extra ' +
                        (remaining === 1 ? 'copy' : 'copies') + ' to Trash';
    } else {
      btn.remove();
    }
  }

  async function trashAllLoserFiles() {
    var resolved = _proposals.filter(function(p) { return p.status === 'resolved'; });
    var ids = [];
    resolved.forEach(function(p) {
      if (isBulkTrashProtected(p)) return;
      (p.losers || []).forEach(function(l) {
        // Skip ones already trashed in this session.
        var card = document.querySelector('.dup-card[data-photo-id="' + l.id + '"]');
        if (card && card.classList.contains('trashed')) return;
        if (l.id != null) ids.push(l.id);
      });
    });
    if (ids.length === 0) {
      showToast('Nothing to trash', 'success');
      return;
    }
    if (!confirm('Move ' + ids.length + ' file' + (ids.length === 1 ? '' : 's') +
                 ' to Trash and remove their entries from Vireo?\n\n' +
                 'Files go to your OS Trash (recoverable from there). The ' +
                 'corresponding extra-copy records (and their thumbnails/previews) ' +
                 'are deleted from Vireo. Kept copies retain all merged keywords ' +
                 'and ratings.')) {
      return;
    }

    var btn = document.getElementById('trashAllBtn');
    var progressEl = document.getElementById('trashAllProgress');
    if (btn) { btn.disabled = true; btn.textContent = 'Moving to Trash...'; }

    try {
      var data = await trashLoserFilesInBatches(
        ids,
        function(progress) { updateTrashProgress(progressEl, progress); },
        applyTrashBatchToCards
      );
      var trashed = data.trashed || 0;
      var failed = (data.failed || []).length;

      var actionableSkips = (data.skipped || []).filter(function(s) {
        return s.reason !== 'file already missing';
      }).length;
      var msg = 'Moved ' + trashed + ' file' + (trashed === 1 ? '' : 's') + ' to Trash';
      if (actionableSkips) msg += ', ' + actionableSkips + ' skipped';
      if (failed) msg += ', ' + failed + ' failed';
      showToast(msg, failed ? 'error' : 'success');

      refreshTrashAllButton(btn);
    } catch (e) {
      var completed = e.trashSummary ? e.trashSummary.completed : 0;
      showToast('Trash cleanup paused after ' + completed + ' of ' + ids.length +
                ' files: ' + (e.message || 'request failed') +
                '. Use the button to retry the remaining files.', 'error');
      refreshTrashAllButton(btn);
    }
  }

  function formatBytes(n) {
    if (n == null) return '';
    if (n < 1024) return n + ' B';
    if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
    if (n < 1024 * 1024 * 1024) return (n / 1024 / 1024).toFixed(1) + ' MB';
    return (n / 1024 / 1024 / 1024).toFixed(2) + ' GB';
  }

  function getCheckedGroups() {
    var checked = [];
    document.querySelectorAll('.group-check').forEach(function(cb) {
      if (cb.checked) {
        var gi = parseInt(cb.getAttribute('data-gi'), 10);
        if (!isNaN(gi) && _proposals[gi]) checked.push(_proposals[gi]);
      }
    });
    return checked;
  }

  function updateApplyCount() {
    var checked = getCheckedGroups();
    var loserCount = 0;
    checked.forEach(function(g) { loserCount += (g.losers || []).length; });
    var btn = document.getElementById('applyBtn');
    btn.textContent = 'Reject ' + loserCount + ' extra ' + (loserCount === 1 ? 'copy' : 'copies');
    btn.disabled = loserCount === 0;
  }

  async function applyRejections() {
    var checked = getCheckedGroups();
    if (checked.length === 0) return;
    var hashes = checked.map(function(g) { return g.file_hash; }).filter(Boolean);
    if (hashes.length === 0) return;

    var btn = document.getElementById('applyBtn');
    var status = document.getElementById('applyStatus');
    btn.disabled = true;
    status.textContent = 'Applying...';

    try {
      var data = await safeFetch('/api/duplicates/apply', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ hashes: hashes }),
      });
      var n = data.rejected_count || 0;
      showToast('Rejected ' + n + ' duplicate' + (n === 1 ? '' : 's'), 'success');
      clearResults();
    } catch (e) {
      showToast(e.message || 'Apply failed', 'error');
      status.textContent = '';
      btn.disabled = false;
      // safeFetch already shows a toast on failure.
    }
  }

  function clearResults() {
    _proposals = [];
    _currentJobId = null;
    document.getElementById('results').innerHTML = '';
    document.getElementById('summary').style.display = 'none';
    document.getElementById('applyBar').style.display = 'none';
    document.getElementById('applyStatus').textContent = '';
    hideRestoredBanner();
    setEmptyVisible(true);
  }

  document.addEventListener('DOMContentLoaded', tryRestoreLastScan);
</script>
</body>
</html>
