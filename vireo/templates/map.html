<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/favicon.ico">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="stylesheet" href="/static/vireo-base.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<title>Vireo - Map</title>
<style>
body { padding-bottom: 36px; }

.map-wrapper {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 44px);
}

.map-body {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* Sidebar */
.map-sidebar {
  width: 280px;
  min-width: 280px;
  background: var(--bg-secondary, #0a2a3a);
  border-right: 1px solid var(--border, #1a4a5a);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 8px 10px;
  font-size: 11px;
  color: var(--text-dim, #888);
  border-bottom: 1px solid var(--border, #1a4a5a);
  flex-shrink: 0;
}

.sidebar-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}

.sidebar-card {
  display: flex;
  gap: 8px;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border, #1a4a5a);
  cursor: pointer;
  transition: background 0.15s;
}

.sidebar-card:hover {
  background: var(--bg-tertiary, #14374E);
}

.sidebar-card.active {
  background: var(--bg-tertiary, #14374E);
  border-left: 3px solid var(--accent, #24E5CA);
  padding-left: 7px;
}

.sidebar-card img {
  width: 56px;
  height: 56px;
  object-fit: cover;
  border-radius: 4px;
  background: var(--bg-tertiary, #14374E);
  flex-shrink: 0;
}

.sidebar-card .card-info {
  min-width: 0;
  flex: 1;
}

.sidebar-card .card-filename {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-primary, #E0F0F0);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.sidebar-card .card-species {
  font-size: 10px;
  color: var(--accent);
  font-style: italic;
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 2px;
}

.sidebar-card .card-meta {
  font-size: 10px;
  color: var(--text-dim, #888);
  margin-top: 2px;
}

.species-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

#map {
  flex: 1;
  min-height: 0;
}

.map-status {
  padding: 4px 12px;
  font-size: 11px;
  color: var(--text-dim, #888);
  background: var(--bg-secondary, #0a2a3a);
  border-top: 1px solid var(--border, #1a4a5a);
}

.map-status a {
  color: var(--info);
  text-decoration: none;
}
.map-status a:hover { text-decoration: underline; }

/* Popup styling */
.photo-popup { width: 220px; }
.photo-popup img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 4px;
  margin-bottom: 6px;
  background: var(--bg-tertiary, #14374E);
}
.photo-popup .popup-title {
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.photo-popup .popup-meta {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 2px;
}
.photo-popup .popup-species {
  font-size: 11px;
  color: var(--accent);
  font-style: italic;
  margin-bottom: 4px;
}
.photo-popup .popup-link {
  font-size: 11px;
  color: var(--info);
  text-decoration: none;
}
.photo-popup .popup-link:hover { text-decoration: underline; }

.photo-popup .popup-provenance {
  font-size: 10px;
  color: var(--text-dim, #888);
  margin-top: 4px;
  border-top: 1px solid var(--border, #1a4a5a);
  padding-top: 4px;
}

.popup-stars { color: var(--warning); font-size: 11px; }

/* Species legend control */
.species-legend {
  background: var(--bg-secondary, rgba(10, 42, 58, 0.92));
  padding: 8px 10px;
  border-radius: 6px;
  border: 1px solid var(--border, #1a4a5a);
  font-size: 11px;
  color: var(--text-primary, #E0F0F0);
  max-height: 240px;
  overflow-y: auto;
}

.species-legend .legend-title {
  font-weight: 600;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}

.species-legend .legend-items { line-height: 1.8; }

.species-legend .legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.species-legend.collapsed .legend-items { display: none; }

/* Cluster preview tooltip */
.cluster-preview {
  background: var(--bg-secondary, rgba(10, 42, 58, 0.95));
  border: 1px solid var(--border, #1a4a5a);
  border-radius: 6px;
  padding: 6px;
  pointer-events: none;
  z-index: 1000;
}

.cluster-preview .preview-grid {
  display: grid;
  grid-template-columns: repeat(3, 56px);
  gap: 3px;
}

.cluster-preview .preview-grid img {
  width: 56px;
  height: 56px;
  object-fit: cover;
  border-radius: 3px;
  background: var(--bg-tertiary, #14374E);
}

.cluster-preview .preview-more {
  font-size: 10px;
  color: var(--text-dim, #888);
  text-align: center;
  margin-top: 4px;
}

/* Leaflet layer control dark theme */
.leaflet-control-layers {
  background: var(--bg-secondary, rgba(10, 42, 58, 0.92)) !important;
  border: 1px solid var(--border, #1a4a5a) !important;
  color: var(--text-primary, #E0F0F0) !important;
  border-radius: 6px !important;
}
.leaflet-control-layers label {
  color: var(--text-primary, #E0F0F0) !important;
}
</style>
</head>
<body>
{% include '_navbar.html' %}

<div class="map-wrapper">
  <div class="map-filterbar">
    {% include '_filterbar.html' %}
  </div>

  <div class="map-body">
    <div class="map-sidebar">
      <div class="sidebar-header" id="sidebarHeader">0 photos</div>
      <div class="sidebar-list" id="sidebarList"></div>
    </div>
    <div id="map"></div>
  </div>

  <div class="map-status" id="mapStatus">Loading...</div>
</div>

<div class="cluster-preview" id="clusterPreview" style="display:none; position:absolute;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
/* ── Tile layers ── */
var streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19,
});
var satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: '&copy; Esri',
  maxZoom: 19,
});
var terrainLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenTopoMap',
  maxZoom: 17,
});

var map = L.map('map', { layers: [streetLayer] }).setView([20, 0], 2);
L.control.layers({ 'Street': streetLayer, 'Satellite': satelliteLayer, 'Terrain': terrainLayer }).addTo(map);

/* ── Marker cluster group ── */
var markers = L.markerClusterGroup();
map.addLayer(markers);

/* ── Species color palette ── */
var SPECIES_COLORS = [
  '#e6194b', '#3cb44b', '#ffe119', '#4363d8',
  '#f58231', '#911eb4', '#42d4f4', '#f032e6'
];
var NO_SPECIES_COLOR = '#5b8fa8';
var OTHER_SPECIES_COLOR = '#888888';
var speciesColorMap = {};

function assignSpeciesColors(photos) {
  var counts = {};
  photos.forEach(function(p) {
    if (p.species) counts[p.species] = (counts[p.species] || 0) + 1;
  });
  var sorted = Object.keys(counts).sort(function(a, b) { return counts[b] - counts[a]; });
  speciesColorMap = {};
  sorted.slice(0, SPECIES_COLORS.length).forEach(function(sp, i) {
    speciesColorMap[sp] = SPECIES_COLORS[i];
  });
}

function getSpeciesColor(species) {
  if (!species) return NO_SPECIES_COLOR;
  return speciesColorMap[species] || OTHER_SPECIES_COLOR;
}

function makeCircleIcon(color) {
  return L.divIcon({
    className: '',
    html: '<div style="width:14px;height:14px;border-radius:50%;background:' + color
      + ';border:2px solid var(--text-primary);box-shadow:0 1px 3px rgba(0,0,0,.4);"></div>',
    iconSize: [14, 14],
    iconAnchor: [7, 7],
    popupAnchor: [0, -8],
  });
}

/* ── Species legend control ── */
var LegendControl = L.Control.extend({
  options: { position: 'bottomleft' },
  onAdd: function() {
    this._div = L.DomUtil.create('div', 'species-legend');
    this._div.innerHTML = '<div class="legend-title">Species</div><div class="legend-items"></div>';
    this._div.querySelector('.legend-title').addEventListener('click', function() {
      this._div.classList.toggle('collapsed');
    }.bind(this));
    L.DomEvent.disableClickPropagation(this._div);
    L.DomEvent.disableScrollPropagation(this._div);
    return this._div;
  },
  update: function(colorMap) {
    var items = this._div.querySelector('.legend-items');
    var html = '';
    var entries = Object.keys(colorMap).sort();
    entries.forEach(function(sp) {
      html += '<div class="legend-item"><span class="species-dot" style="background:'
        + colorMap[sp] + '"></span>' + escapeHtml(sp) + '</div>';
    });
    if (entries.length > 0) {
      html += '<div class="legend-item"><span class="species-dot" style="background:'
        + OTHER_SPECIES_COLOR + '"></span>Other</div>';
    }
    html += '<div class="legend-item"><span class="species-dot" style="background:'
      + NO_SPECIES_COLOR + '"></span>No species</div>';
    items.innerHTML = html;
    this._div.style.display = entries.length > 0 || true ? '' : 'none';
  },
});
var legendControl = new LegendControl();
legendControl.addTo(map);

/* ── Helpers ── */
function buildStars(rating) {
  if (!rating) return '';
  var s = '';
  for (var i = 0; i < 5; i++) s += i < rating ? '\u2605' : '\u2606';
  return '<span class="popup-stars">' + s + '</span>';
}

function formatDate(ts) {
  if (!ts) return '';
  return ts.replace('T', ' ').substring(0, 16);
}

/* ── State for bi-directional sync ── */
var photoMarkers = {};  /* photo id -> marker */
var activePhotoId = null;
var requestedPhotoId = (function() {
  var raw = new URLSearchParams(window.location.search).get('photo_id');
  if (!raw) return null;
  var parsed = parseInt(raw, 10);
  return isNaN(parsed) ? null : parsed;
})();

function setActiveCard(photoId) {
  if (activePhotoId !== null) {
    var prev = document.querySelector('.sidebar-card[data-id="' + activePhotoId + '"]');
    if (prev) prev.classList.remove('active');
  }
  activePhotoId = photoId;
  if (photoId !== null) {
    var card = document.querySelector('.sidebar-card[data-id="' + photoId + '"]');
    if (card) {
      card.classList.add('active');
      card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }
}

function openPhotoMarker(photoId) {
  var marker = photoMarkers[photoId];
  if (!marker) return false;
  setActiveCard(photoId);
  markers.zoomToShowLayer(marker, function() {
    map.setView(marker.getLatLng(), Math.max(map.getZoom(), 14));
    marker.openPopup();
  });
  return true;
}

function photoThumbnailUrl(p) {
  if (!p || p.id == null) return '';
  return window.vireoThumbnailUrl
    ? window.vireoThumbnailUrl(p)
    : '/thumbnails/' + p.id + '.jpg';
}

/* ── Sidebar rendering ── */
function renderSidebar(photos) {
  var list = document.getElementById('sidebarList');
  list.innerHTML = '';
  document.getElementById('sidebarHeader').textContent = photos.length + ' photo' + (photos.length !== 1 ? 's' : '');

  photos.forEach(function(p) {
    var card = document.createElement('div');
    card.className = 'sidebar-card';
    card.setAttribute('data-id', p.id);

    var thumbSrc = photoThumbnailUrl(p);
    var color = getSpeciesColor(p.species);
    var speciesHtml = p.species
      ? '<div class="card-species"><span class="species-dot" style="background:' + color + '"></span>'
        + escapeHtml(p.species) + '</div>'
      : '';

    card.innerHTML =
      (thumbSrc ? '<img src="' + escapeAttr(thumbSrc) + '" alt="" onerror="this.style.visibility=\'hidden\'">' : '<div style="width:56px;height:56px;background:var(--bg-tertiary,#14374E);border-radius:4px;flex-shrink:0"></div>')
      + '<div class="card-info">'
      + '<div class="card-filename">' + escapeHtml(p.filename) + '</div>'
      + speciesHtml
      + '<div class="card-meta">' + escapeHtml(formatDate(p.timestamp)) + '</div>'
      + '</div>';

    card.addEventListener('click', function() {
      openPhotoMarker(p.id);
    });

    list.appendChild(card);
  });
}

/* ── Cluster preview ── */
var clusterPreviewEl = document.getElementById('clusterPreview');

function showClusterPreview(e) {
  var cluster = e.layer;
  var childMarkers = cluster.getAllChildMarkers();
  var previewCount = Math.min(childMarkers.length, 6);

  var gridHtml = '<div class="preview-grid">';
  for (var i = 0; i < previewCount; i++) {
    var p = childMarkers[i]._photoData;
    if (p && p.id != null) {
      gridHtml += '<img src="' + escapeAttr(photoThumbnailUrl(p)) + '"'
        + ' alt="" onerror="this.style.visibility=\'hidden\'">';
    } else {
      gridHtml += '<div style="width:56px;height:56px;background:var(--bg-tertiary,#14374E);border-radius:3px"></div>';
    }
  }
  gridHtml += '</div>';
  if (childMarkers.length > 6) {
    gridHtml += '<div class="preview-more">+' + (childMarkers.length - 6) + ' more</div>';
  }

  clusterPreviewEl.innerHTML = gridHtml;
  clusterPreviewEl.style.display = 'block';

  var pt = map.latLngToContainerPoint(cluster.getLatLng());
  var mapRect = document.getElementById('map').getBoundingClientRect();
  clusterPreviewEl.style.left = (mapRect.left + pt.x + 20) + 'px';
  clusterPreviewEl.style.top = (mapRect.top + pt.y - 30) + 'px';
}

function hideClusterPreview() {
  clusterPreviewEl.style.display = 'none';
}

markers.on('clustermouseover', showClusterPreview);
markers.on('clustermouseout', hideClusterPreview);
markers.on('clusterclick', hideClusterPreview);

/* Bumped by every loadPhotos() invocation; responses whose epoch is no
 * longer current are dropped. Fast rule edits or a slow visual query
 * followed by another filter change can otherwise let an earlier
 * ``/api/photos/geo`` resolve after a newer one and overwrite the
 * markers/sidebar/total with stale data while the filter chips show the
 * current rules. */
var _loadPhotosEpoch = 0;

/* ── Load photos ── */
async function loadPhotos() {
  var myEpoch = ++_loadPhotosEpoch;
  var focusPhotoId = requestedPhotoId;
  requestedPhotoId = null;
  var params = new URLSearchParams();
  // When the user follows a Browse "View on Map" deep link (``?photo_id=``),
  // skip any restored/persisted filter rules for this one load — otherwise a
  // saved rule that excludes the requested photo silently hides its marker
  // and the page reports "No map location found" even though the photo is
  // plottable. The filter chips stay on-screen and reapply on the next
  // filter-driven reload; only this focus-triggered request is unfiltered.
  if (focusPhotoId === null && window.VireoFilter && VireoFilter.getRules) {
    var rules = VireoFilter.getRules();
    var count = Array.isArray(rules) ? rules.length : (rules.rules || []).length;
    if (count) params.set('rules', JSON.stringify(rules));
    var visual = VireoFilter.getVisual ? VireoFilter.getVisual() : null;
    if (visual) params.set('visual', JSON.stringify(visual));
  }

  var qs = params.toString();
  var url = '/api/photos/geo' + (qs ? '?' + qs : '');

  try {
    var data = await safeFetch(url);
    if (myEpoch !== _loadPhotosEpoch) return;  // superseded — drop
    if (window.VireoFilter && VireoFilter.setResultTotal) {
      VireoFilter.setResultTotal(data.total_filtered);
    }
    // Surface the visual clause's status so the filter bar can warn on
    // fallback (no model / no embeddings / encoding failed). Without
    // this, choosing "Visually similar…" on a map without a usable
    // visual index would silently show every metadata-matching photo.
    if (window.VireoFilter && VireoFilter.setVisualInfo) {
      VireoFilter.setVisualInfo(data.visual || null);
    }
    markers.clearLayers();
    photoMarkers = {};
    activePhotoId = null;

    if (data.photos.length === 0) {
      renderSidebar([]);
      var emptyStatus = document.getElementById('mapStatus');
      if (focusPhotoId !== null) {
        emptyStatus.textContent = 'No map location found for this photo.';
      } else {
        var emptyMessage = 'No geolocated photos found. Photos with EXIF GPS or an assigned map location will appear here.';
        if (data.total_without_coordinates > 0) {
          emptyMessage += ' <a href="/browse?location_status=none">Browse ' +
            data.total_without_coordinates + ' without coordinates</a>.';
        }
        emptyStatus.innerHTML = emptyMessage;
      }
      legendControl.update({});
      return;
    }

    assignSpeciesColors(data.photos);
    legendControl.update(speciesColorMap);

    data.photos.forEach(function(p) {
      var thumbSrc = photoThumbnailUrl(p);
      var imgTag = thumbSrc
        ? '<img src="' + escapeAttr(thumbSrc) + '" alt="" onerror="this.style.display=\'none\'">'
        : '';
      var speciesLine = p.species
        ? '<div class="popup-species">' + escapeHtml(p.species) + '</div>'
        : '';

      var provenanceLine = '';
      if (p.coord_source === 'keyword' && p.keyword_location_name) {
        provenanceLine = '<div class="popup-provenance">\u{1F4CD} from assigned location: '
          + escapeHtml(p.keyword_location_name) + '</div>';
      } else if (p.coord_source === 'exif') {
        provenanceLine = '<div class="popup-provenance">\u{1F4CD} from EXIF GPS</div>';
      }

      var popup = '<div class="photo-popup">'
        + imgTag
        + '<div class="popup-title">' + escapeHtml(p.filename) + '</div>'
        + '<div class="popup-meta">' + escapeHtml(formatDate(p.timestamp)) + ' ' + buildStars(p.rating) + '</div>'
        + speciesLine
        + '<a class="popup-link" href="/browse?photo_id=' + p.id + '">View in Browse &rarr;</a>'
        + provenanceLine
        + '</div>';

      var color = getSpeciesColor(p.species);
      var marker = L.marker([p.latitude, p.longitude], { icon: makeCircleIcon(color) });
      marker.bindPopup(popup);
      marker._photoData = p;

      marker.on('click', function() {
        setActiveCard(p.id);
      });

      photoMarkers[p.id] = marker;
      markers.addLayer(marker);
    });

    map.fitBounds(markers.getBounds(), { padding: [30, 30] });
    renderSidebar(data.photos);
    if (focusPhotoId !== null) {
      if (!openPhotoMarker(focusPhotoId)) {
        document.getElementById('mapStatus').textContent =
          'No map location found for this photo.';
      }
    }

    /* Map-coordinate coverage stats — global (unfiltered) for consistency */
    var totalFiltered = data.total_filtered;
    var totalGeolocated = data.total_geolocated;
    var totalPhotos = data.total_photos;
    var missingCoordinates = data.total_without_coordinates;
    var pct = totalPhotos > 0 ? Math.round((totalGeolocated / totalPhotos) * 100) : 0;

    var statusEl = document.getElementById('mapStatus');
    var parts = ['Showing ' + totalFiltered + ' of ' + totalGeolocated + ' geolocated photos'];
    parts.push(pct + '% map coverage');
    if (missingCoordinates > 0) {
      parts.push('<a href="/browse?location_status=none">' + missingCoordinates + ' without coordinates</a>');
    }
    if (focusPhotoId === null || photoMarkers[focusPhotoId]) {
      statusEl.innerHTML = parts.join(' &mdash; ');
    }
  } catch (e) {
    if (myEpoch !== _loadPhotosEpoch) return;  // superseded — drop
    document.getElementById('mapStatus').textContent = 'Failed to load photos.';
  }
}

/* ── Universal filter bar ── */
VireoFilter.init({
  page: 'map',
  root: document.getElementById('vireoFilterBar'),
  scopeLabel: 'Map \u00b7 Plottable locations',
  onChange: loadPhotos,
}).then(loadPhotos).catch(function() { loadPhotos(); });
</script>
</body>
</html>
