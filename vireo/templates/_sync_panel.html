<!-- Sync banner: pending changes indicator -->
<div id="syncBanner" style="display:none;background:var(--bg-tertiary);padding:10px 20px;border-bottom:1px solid var(--border-primary);font-size:13px;align-items:center;gap:12px;">
  <span id="syncBannerText" style="color:var(--warning);"></span>
  <button onclick="openSyncPreview()" style="background:var(--bg-secondary);color:var(--text-primary);border:1px solid var(--border-secondary);border-radius:4px;padding:5px 14px;font-size:12px;cursor:pointer;">Review Changes</button>
  <button onclick="runSync()" style="background:var(--accent);color:var(--accent-text);border:none;border-radius:4px;padding:5px 14px;font-size:12px;cursor:pointer;font-weight:500;">Sync to XMP</button>
  <span id="syncStatus" style="font-size:12px;color:var(--text-dim);"></span>
</div>

<!-- Sync Preview Modal -->
<div id="syncPreviewOverlay" style="display:none;position:fixed;inset:0;z-index:9996;background:rgba(0,0,0,0.85);overflow-y:auto;">
  <div style="max-width:850px;margin:40px auto;background:var(--bg-secondary);border-radius:8px;padding:24px;position:relative;">
    <button onclick="closeSyncPreview()" style="position:absolute;top:12px;right:16px;background:none;border:none;color:var(--text-muted);font-size:24px;cursor:pointer;">&times;</button>
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;">
      <h2 style="font-size:16px;color:var(--accent);margin:0;">Review Pending Changes</h2>
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);margin-left:auto;">
        <input type="range" id="syncThumbSize" min="60" max="600" value="120" step="20"
               style="width:80px;accent-color:var(--accent);"
               oninput="updateSyncThumbSize(this.value)">
        <span id="syncThumbSizeVal" style="min-width:32px;">120px</span>
      </label>
    </div>
    <div id="syncPreviewContent">Loading...</div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;">
      <button onclick="discardAllChanges()" style="background:none;color:var(--danger);border:1px solid var(--danger);border-radius:4px;padding:6px 14px;font-size:12px;cursor:pointer;">Discard All</button>
      <button onclick="runVisibleSync()" style="background:var(--accent);color:var(--accent-text);border:none;border-radius:4px;padding:6px 14px;font-size:12px;cursor:pointer;font-weight:500;">Sync to XMP</button>
    </div>
  </div>
</div>

<style>
  .sync-review-note {
    margin: 0 0 14px;
    padding: 10px 12px;
    border: 1px solid var(--border-secondary);
    border-radius: 6px;
    background: var(--bg-tertiary);
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.45;
  }
  .sync-review-groups { display: flex; flex-direction: column; gap: 12px; }
  .sync-review-group {
    padding: 14px;
    border: 1px solid var(--border-subtle);
    border-radius: 7px;
    background: var(--bg-primary);
  }
  .sync-review-group-header { display: flex; align-items: flex-start; gap: 10px; }
  .sync-review-group-title { color: var(--text-primary); font-size: 14px; font-weight: 650; }
  .sync-review-delta {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 7px;
    color: var(--text-primary);
    font-size: 13px;
  }
  .sync-review-before { color: var(--text-dim); }
  .sync-review-arrow { color: var(--text-ghost); }
  .sync-review-after { color: var(--text-primary); font-weight: 600; }
  .sync-review-detail { margin-top: 4px; color: var(--text-dim); font-size: 11px; }
  .sync-review-photos { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .sync-preview-photo { position: relative; min-width: 0; max-width: 100%; }
  .sync-preview-photo img { max-width: 100%; }
  .sync-preview-filename {
    margin-top: 5px;
    padding-right: 20px;
    overflow: hidden;
    color: var(--text-ghost);
    font-size: 11px;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .sync-preview-discard {
    position: absolute;
    right: 0;
    bottom: -2px;
    border: 0;
    background: none;
    color: var(--text-ghost);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
  }
  .sync-preview-discard:hover { color: var(--danger); }
</style>

<script>
/* ---------- Sync Panel ---------- */

var _syncPreviewData = null;
var _syncThumbSize = 120;
var _syncActiveFilters = null;
var _syncModalOpen = false;
var _syncEscToken = null;
var _syncLightboxPanelEl = null;

async function checkPendingSync() {
  try {
    var data = await safeFetch('/api/sync/status', {}, { toast: false });
    var banner = document.getElementById('syncBanner');
    if (data.pending_count > 0) {
      document.getElementById('syncBannerText').textContent =
        data.pending_count + ' change' + (data.pending_count !== 1 ? 's' : '') +
        ' pending \u2014 metadata changes have been saved in Vireo but not written to XMP sidecar files yet.';
      banner.style.display = 'flex';
    } else {
      banner.style.display = 'none';
    }
  } catch(e) {}
}

async function runSync(changeIds) {
  var status = document.getElementById('syncStatus');
  status.textContent = 'Syncing...';
  status.style.color = 'var(--text-dim)';
  try {
    var requestOptions = {method: 'POST'};
    if (Array.isArray(changeIds)) {
      if (changeIds.length === 0) {
        status.textContent = 'No checked changes to sync.';
        status.style.color = 'var(--text-dim)';
        return;
      }
      requestOptions.headers = {'Content-Type': 'application/json'};
      requestOptions.body = JSON.stringify({change_ids: changeIds});
    }
    var data = await safeFetch('/api/jobs/sync', requestOptions, { toast: false });

    safeEventSource('/api/jobs/' + data.job_id + '/stream', {
      onProgress: function(p) {
        if (p.total > 0) {
          status.textContent = 'Writing XMP: ' + p.current + '/' + p.total;
        } else if (p.current_file || p.phase) {
          status.textContent = p.current_file || p.phase;
        }
      },
      onComplete: function(result) {
        if (result.status === 'completed') {
          status.textContent = 'Synced!';
          status.style.color = 'var(--accent)';
          setTimeout(checkPendingSync, 1000);
        } else {
          status.textContent = 'Failed';
          status.style.color = 'var(--danger)';
        }
      },
      onError: function() {
        status.textContent = 'Connection lost';
        status.style.color = 'var(--danger)';
      }
    });
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
  }
}

function updateSyncThumbSize(val) {
  _syncThumbSize = parseInt(val);
  document.getElementById('syncThumbSizeVal').textContent = val + 'px';
  document.querySelectorAll('.sync-preview-photo').forEach(function(photo) {
    photo.style.width = _syncThumbSize + 'px';
  });
  document.querySelectorAll('.sync-preview-thumb').forEach(function(img) {
    img.style.width = _syncThumbSize + 'px';
    img.style.height = Math.round(_syncThumbSize * 2 / 3) + 'px';
  });
}

async function openSyncPreview() {
  var alreadyOpen = _syncModalOpen;
  if (_syncEscToken !== null) Keymap.popEsc(_syncEscToken);
  _syncEscToken = Keymap.pushEsc(function() { closeSyncPreview(); });
  if (!alreadyOpen) Keymap.lockBodyScroll();
  _syncActiveFilters = null;
  _syncModalOpen = true;
  var overlay = document.getElementById('syncPreviewOverlay');
  var content = document.getElementById('syncPreviewContent');
  overlay.style.display = 'block';
  content.innerHTML = '<p style="color:var(--text-dim);padding:20px;">Loading changes...</p>';

  try {
    _syncPreviewData = await safeFetch('/api/sync/preview', {}, { toast: false });
    renderSyncPreview();
  } catch(e) {
    content.innerHTML = '<p style="color:var(--danger);padding:20px;">Failed to load: ' + escapeHtml(e.message) + '</p>';
  }
}

function _syncTypeLabel(type) {
  return {
    keyword_add: 'Keyword additions',
    keyword_remove: 'Keyword removals',
    keyword_remove_flat: 'Keyword removals',
    rating: 'Ratings',
    flag: 'Flags',
    location: 'Locations',
    edit_recipe: 'Photo edits'
  }[type] || type.replace(/_/g, ' ');
}

function _syncChangeStyle(change) {
  if (change.type === 'keyword_add') return { icon: '+', color: 'var(--accent)' };
  if (change.type === 'keyword_remove' || change.type === 'keyword_remove_flat') {
    return { icon: '\u2212', color: 'var(--danger)' };
  }
  return { icon: '~', color: 'var(--warning)' };
}

function _syncChangePresentation(change, photo, activeFilters) {
  if (change.rating_requires_sidecar && photo) {
    var sidecarWillExist = photo.changes.some(function(other) {
      return other.id !== change.id &&
        other.creates_xmp_sidecar &&
        (!activeFilters || activeFilters.has(other.type));
    });
    if (sidecarWillExist && change.presentation_with_sidecar) {
      return change.presentation_with_sidecar;
    }
    if (!sidecarWillExist && change.presentation_without_sidecar) {
      return change.presentation_without_sidecar;
    }
  }
  if (change.presentation) return change.presentation;
  return {
    field: change.type.replace(/_/g, ' '),
    action: 'updated',
    before: 'Current XMP value',
    after: change.value || 'Cleared'
  };
}

function _syncGroupedChanges(data, activeFilters) {
  var groups = [];
  var groupsByKey = {};
  data.photos.forEach(function(photo) {
    photo.changes.forEach(function(change) {
      if (!activeFilters.has(change.type)) return;
      var presentation = _syncChangePresentation(change, photo, activeFilters);
      var key = JSON.stringify([
        change.type,
        presentation.field,
        presentation.action,
        presentation.before,
        presentation.after,
        presentation.before_detail || '',
        presentation.after_detail || ''
      ]);
      var group = groupsByKey[key];
      if (!group) {
        group = {
          type: change.type,
          presentation: presentation,
          entries: []
        };
        groupsByKey[key] = group;
        groups.push(group);
      }
      group.entries.push({ photo: photo, change: change });
    });
  });
  return groups;
}

function _syncGroupTitle(group) {
  var count = group.entries.length;
  var photoWord = count === 1 ? 'photo' : 'photos';
  var presentation = group.presentation;
  var connector = {
    added: 'added to',
    removed: 'removed from',
    updated: 'updated on',
    cleared: 'cleared from',
    checked: 'checked on',
    unchanged: 'unchanged on'
  }[presentation.action] || presentation.action + ' on';
  return presentation.field + ' ' + connector + ' ' + count + ' ' + photoWord;
}

function renderSyncPreview() {
  var data = _syncPreviewData;
  var content = document.getElementById('syncPreviewContent');
  if (!data || data.photos.length === 0) {
    content.innerHTML = '<p style="color:var(--text-dim);padding:20px;">No pending changes.</p>';
    return;
  }

  var allTypes = {};
  data.photos.forEach(function(photo) {
    photo.changes.forEach(function(change) { allTypes[change.type] = true; });
  });
  var typeList = Object.keys(allTypes).sort();
  if (_syncActiveFilters === null) _syncActiveFilters = new Set(typeList);

  var html = '<div style="display:flex;gap:12px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">';
  html += '<span style="font-size:12px;color:var(--text-dim);">Include:</span>';
  typeList.forEach(function(type) {
    var style = _syncChangeStyle({ type: type });
    var checked = _syncActiveFilters.has(type) ? ' checked' : '';
    html += '<label style="display:flex;align-items:center;gap:4px;font-size:12px;color:' + style.color + ';cursor:pointer;">' +
      '<input type="checkbox"' + checked + ' onchange="toggleSyncFilter(\'' + type + '\')" style="accent-color:' + style.color + ';"> ' +
      escapeHtml(_syncTypeLabel(type)) + '</label>';
  });
  html += '</div>';

  var visibleCount = 0;
  var visiblePhotos = 0;
  data.photos.forEach(function(photo) {
    var visible = photo.changes.filter(function(change) {
      return _syncActiveFilters.has(change.type);
    });
    if (visible.length > 0) visiblePhotos++;
    visibleCount += visible.length;
  });

  var changeWord = visibleCount === 1 ? 'change' : 'changes';
  var photoWord = visiblePhotos === 1 ? 'photo' : 'photos';
  html += '<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;">' +
    '<span style="font-size:12px;color:var(--text-dim);flex:1;">' + visibleCount + ' ' + changeWord + ' across ' + visiblePhotos + ' ' + photoWord + '</span>' +
    '<button onclick="discardAllChanges()" style="background:none;color:var(--danger);border:1px solid var(--danger);border-radius:4px;padding:4px 12px;font-size:11px;cursor:pointer;">Discard All</button>' +
    '<button onclick="runVisibleSync()" style="background:var(--accent);color:var(--accent-text);border:none;border-radius:4px;padding:4px 12px;font-size:11px;cursor:pointer;font-weight:500;">Sync to XMP</button>' +
  '</div>';

  if (_syncActiveFilters.has('location') && allTypes.location) {
    if (data.location_sync_enabled) {
      html += '<div class="sync-review-note"><strong style="color:var(--text-primary);">About location sync:</strong> Location keywords with coordinates are written to XMP as GPS metadata. Their names and hierarchy remain in Vireo.</div>';
    } else {
      html += '<div class="sync-review-note"><strong style="color:var(--text-primary);">About location sync:</strong> Location assignments are kept in Vireo. Writing their GPS coordinates to XMP is turned off in Settings; sync only removes GPS previously written by Vireo.</div>';
    }
  }

  var groups = _syncGroupedChanges(data, _syncActiveFilters);
  html += '<div class="sync-review-groups">';
  groups.forEach(function(group) {
    var presentation = group.presentation;
    var style = _syncChangeStyle({ type: group.type });
    var ids = group.entries.map(function(entry) { return entry.change.id; });
    html += '<section class="sync-review-group">';
    html += '<div class="sync-review-group-header">';
    html += '<span style="color:' + style.color + ';font-weight:700;font-size:17px;width:16px;text-align:center;">' + style.icon + '</span>';
    html += '<div style="flex:1;min-width:0;">';
    html += '<div class="sync-review-group-title">' + escapeHtml(_syncGroupTitle(group)) + '</div>';
    html += '<div class="sync-review-delta"><span class="sync-review-before">' + escapeHtml(presentation.before) + '</span><span class="sync-review-arrow">\u2192</span><span class="sync-review-after">' + escapeHtml(presentation.after) + '</span></div>';
    if (presentation.before_detail) {
      html += '<div class="sync-review-detail">Before: ' + escapeHtml(presentation.before_detail) + '</div>';
    }
    if (presentation.after_detail) {
      html += '<div class="sync-review-detail">' + escapeHtml(presentation.after_detail) + '</div>';
    }
    html += '</div>';
    html += '<button onclick="discardSyncChanges([' + ids.join(',') + '])" style="background:none;border:none;color:var(--text-ghost);font-size:11px;cursor:pointer;white-space:nowrap;" title="Discard this group">Discard group</button>';
    html += '</div>';
    html += '<div class="sync-review-photos">';
    group.entries.forEach(function(entry) {
      var photo = entry.photo;
      var change = entry.change;
      var thumbUrl = window.vireoThumbnailUrl
        ? window.vireoThumbnailUrl(photo)
        : '/thumbnails/' + photo.photo_id + '.jpg';
      html += '<div class="sync-preview-photo" style="width:' + _syncThumbSize + 'px;">';
      html += '<img class="sync-preview-thumb" src="' + escapeAttr(thumbUrl) + '" style="width:' + _syncThumbSize + 'px;height:' + Math.round(_syncThumbSize * 2 / 3) + 'px;object-fit:cover;border-radius:4px;cursor:pointer;display:block;" data-photo-id="' + photo.photo_id + '" data-filename="' + escapeAttr(photo.filename) + '">';
      html += '<div class="sync-preview-filename" title="' + escapeAttr(photo.filename) + '">' + escapeHtml(photo.filename) + '</div>';
      html += '<button class="sync-preview-discard" onclick="event.stopPropagation();discardChange(' + change.id + ')" title="Discard this change" aria-label="Discard change for ' + escapeAttr(photo.filename) + '">&times;</button>';
      html += '</div>';
    });
    html += '</div></section>';
  });
  html += '</div>';

  content.innerHTML = html;
}

/* Delegate sync preview thumb clicks for lightbox (XSS-safe) */
document.getElementById('syncPreviewContent').addEventListener('click', function(e) {
  var thumb = e.target.closest('img[data-photo-id]');
  if (!thumb) return;
  // Pass the list of currently-visible photos so the lightbox arrows can navigate
  // between pending-change items. Without this, _lightboxPhotoList stays empty
  // and lightboxNav() bails out immediately.
  var photoList = [];
  if (_syncPreviewData && _syncPreviewData.photos && _syncActiveFilters) {
    _syncPreviewData.photos.forEach(function(p) {
      var hasVisible = p.changes.some(function(c) { return _syncActiveFilters.has(c.type); });
      if (hasVisible) photoList.push({ id: p.photo_id, filename: p.filename });
    });
  }
  openLightbox(parseInt(thumb.dataset.photoId, 10), thumb.dataset.filename || '', photoList);
});

function closeSyncPreview() {
  var wasOpen = _syncModalOpen;
  if (_syncEscToken !== null) {
    Keymap.popEsc(_syncEscToken);
    _syncEscToken = null;
  }
  document.getElementById('syncPreviewOverlay').style.display = 'none';
  _syncModalOpen = false;
  _syncDestroyLightboxPanel();
  if (wasOpen) Keymap.unlockBodyScroll();
  checkPendingSync();
}

function getVisibleSyncChangeIds() {
  var ids = [];
  if (!_syncPreviewData || !_syncPreviewData.photos || !_syncActiveFilters) return ids;
  _syncPreviewData.photos.forEach(function(p) {
    p.changes.forEach(function(c) {
      if (_syncActiveFilters.has(c.type)) ids.push(c.id);
    });
  });
  return ids;
}

function runVisibleSync() {
  var changeIds = getVisibleSyncChangeIds();
  if (changeIds.length === 0) {
    var status = document.getElementById('syncStatus');
    status.textContent = 'No checked changes to sync.';
    status.style.color = 'var(--text-dim)';
    return;
  }
  closeSyncPreview();
  runSync(changeIds);
}

function _syncFindPhotoData(photoId) {
  if (!_syncPreviewData || !_syncPreviewData.photos) return null;
  return _syncPreviewData.photos.find(function(p) { return p.photo_id === photoId; }) || null;
}

function _syncVisibleChangesFor(photo) {
  if (!photo) return [];
  if (!_syncActiveFilters) return photo.changes.slice();
  return photo.changes.filter(function(c) { return _syncActiveFilters.has(c.type); });
}

function _syncEnsureLightboxPanel() {
  if (_syncLightboxPanelEl && _syncLightboxPanelEl.parentNode) return _syncLightboxPanelEl;
  var overlay = document.getElementById('lightboxOverlay');
  if (!overlay) return null;
  var panel = document.createElement('div');
  panel.id = 'syncLightboxPanel';
  panel.style.cssText = 'position:absolute;top:56px;right:16px;max-width:340px;background:rgba(0,0,0,0.7);color:var(--text-primary);border:1px solid var(--border-secondary);border-radius:6px;padding:10px 12px;font-size:12px;z-index:10002;box-shadow:0 4px 16px rgba(0,0,0,0.5);';
  // Handle discard clicks on the panel itself: we stopPropagation() so the
  // lightbox overlay's onclick doesn't close the lightbox out from under the
  // user, which means a document-level delegate would never see these events.
  panel.addEventListener('click', function(e) {
    var changeBtn = e.target.closest('button[data-sync-discard-change]');
    if (changeBtn) {
      var changeId = parseInt(changeBtn.getAttribute('data-sync-discard-change'), 10);
      if (!isNaN(changeId)) _syncDiscardFromLightbox([changeId], _lightboxCurrentId);
    } else {
      var photoBtn = e.target.closest('button[data-sync-discard-photo]');
      if (photoBtn) {
        var pid = parseInt(photoBtn.getAttribute('data-sync-discard-photo'), 10);
        var photo = _syncFindPhotoData(pid);
        if (photo) {
          var ids = _syncVisibleChangesFor(photo).map(function(c) { return c.id; });
          _syncDiscardFromLightbox(ids, pid);
        }
      }
    }
    e.stopPropagation();
  });
  overlay.appendChild(panel);
  _syncLightboxPanelEl = panel;
  return panel;
}

function _syncDestroyLightboxPanel() {
  if (_syncLightboxPanelEl && _syncLightboxPanelEl.parentNode) {
    _syncLightboxPanelEl.parentNode.removeChild(_syncLightboxPanelEl);
  }
  _syncLightboxPanelEl = null;
}

function _syncRenderLightboxPanel(photoId) {
  if (!_syncModalOpen) { _syncDestroyLightboxPanel(); return; }
  var photo = _syncFindPhotoData(photoId);
  var visible = _syncVisibleChangesFor(photo);
  if (!photo || visible.length === 0) {
    _syncDestroyLightboxPanel();
    return;
  }
  var panel = _syncEnsureLightboxPanel();
  if (!panel) return;
  var html = '<div style="font-weight:600;margin-bottom:6px;color:var(--accent);">Pending changes</div>';
  visible.forEach(function(c) {
    var style = _syncChangeStyle(c);
    var presentation = _syncChangePresentation(c, photo, _syncActiveFilters);
    html += '<div style="display:flex;align-items:flex-start;gap:6px;padding:5px 0;">' +
      '<span style="color:' + style.color + ';font-weight:700;width:12px;text-align:center;">' + style.icon + '</span>' +
      '<div style="flex:1;min-width:0;">' +
        '<div style="color:var(--text-primary);font-weight:600;">' + escapeHtml(presentation.field) + '</div>' +
        '<div style="margin-top:2px;color:var(--text-dim);">' + escapeHtml(presentation.before) + ' \u2192 <span style="color:var(--text-primary);">' + escapeHtml(presentation.after) + '</span></div>' +
        (presentation.after_detail ? '<div style="margin-top:2px;color:var(--text-ghost);font-size:10px;">' + escapeHtml(presentation.after_detail) + '</div>' : '') +
      '</div>' +
      '<button data-sync-discard-change="' + c.id + '" style="background:none;border:none;color:var(--text-ghost);cursor:pointer;padding:0 4px;font-size:16px;line-height:1;" title="Discard this change">&times;</button>' +
      '</div>';
  });
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:8px;">' +
    '<span style="font-size:11px;color:var(--text-dim);">Use ← → to navigate</span>' +
    '<button data-sync-discard-photo="' + photoId + '" style="background:none;border:1px solid var(--danger);color:var(--danger);border-radius:4px;font-size:11px;cursor:pointer;padding:3px 8px;">Discard all</button>' +
    '</div>';
  panel.innerHTML = html;
}

async function _syncDiscardFromLightbox(changeIds, photoId) {
  if (!changeIds || changeIds.length === 0) return;
  try {
    await safeFetch('/api/sync/discard', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ change_ids: changeIds }),
    });
  } catch(e) { return; }

  await _syncRefreshPreviewAfterDiscard(changeIds);

  var photoAfter = _syncFindPhotoData(photoId);
  var visibleAfter = _syncVisibleChangesFor(photoAfter);

  renderSyncPreview();

  if (visibleAfter.length > 0) {
    _syncRenderLightboxPanel(photoId);
    return;
  }

  // No more visible changes for this photo — advance the lightbox to the next
  // photo with visible changes, or close if none remain.
  var newList = [];
  if (_syncPreviewData && _syncPreviewData.photos) {
    _syncPreviewData.photos.forEach(function(p) {
      if (_syncVisibleChangesFor(p).length > 0) {
        newList.push({ id: p.photo_id, filename: p.filename });
      }
    });
  }
  var prevList = window._lightboxPhotoList || [];
  var prevIdx = prevList.findIndex(function(p) { return p.id === photoId; });
  if (newList.length === 0) {
    closeLightbox();
    return;
  }
  var nextIdx = prevIdx >= 0 ? Math.min(prevIdx, newList.length - 1) : 0;
  var next = newList[nextIdx];
  openLightbox(next.id, next.filename, newList);
}

document.addEventListener('lightbox:photochanged', function(e) {
  if (!_syncModalOpen) return;
  _syncRenderLightboxPanel(e.detail && e.detail.photoId);
});

document.addEventListener('lightbox:closed', function() {
  _syncDestroyLightboxPanel();
});

function _syncForgetChanges(changeIds) {
  if (!_syncPreviewData || !_syncPreviewData.photos || !changeIds || changeIds.length === 0) return;
  var drop = {};
  changeIds.forEach(function(id) { drop[id] = true; });
  _syncPreviewData.photos.forEach(function(p) {
    p.changes = p.changes.filter(function(c) { return !drop[c.id]; });
  });
  _syncPreviewData.photos = _syncPreviewData.photos.filter(function(p) { return p.changes.length > 0; });
}

// Refetch the preview after a discard so derived flags (creates_xmp_sidecar,
// paired_keyword_rename) and per-change presentations reflect the new state.
// Discarding one half of a same-key keyword_add/keyword_remove pair
// invalidates the surviving remove's rename-pairing flags, and rating
// previews rely on those flags to decide whether a sidecar will be
// created; without the refetch, a rating queued alongside such a pair
// can look like it will be written and then be silently dropped by
// sync_to_xmp. If the refetch fails, fall back to a local removal so the
// UI still reflects the discard.
async function _syncRefreshPreviewAfterDiscard(changeIds) {
  try {
    _syncPreviewData = await safeFetch('/api/sync/preview', {}, { toast: false });
  } catch(e) {
    _syncForgetChanges(changeIds);
  }
}

async function discardSyncChanges(changeIds) {
  if (!changeIds || changeIds.length === 0) return;
  try {
    await safeFetch('/api/sync/discard', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({change_ids: changeIds}),
    });
    await _syncRefreshPreviewAfterDiscard(changeIds);
    renderSyncPreview();
  } catch(e) {}
}

function discardChange(changeId) {
  return discardSyncChanges([changeId]);
}

function discardPhotoChanges(changeIds) {
  return discardSyncChanges(changeIds);
}

async function discardAllChanges() {
  if (!confirm('Discard ALL pending changes? Nothing will be written to XMP.')) return;
  try {
    var data = await safeFetch('/api/sync/preview', {}, { toast: false });
    var allIds = [];
    data.photos.forEach(function(p) {
      p.changes.forEach(function(c) { allIds.push(c.id); });
    });
    await safeFetch('/api/sync/discard', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({change_ids: allIds}),
    });
    closeSyncPreview();
  } catch(e) {}
}

function toggleSyncFilter(type) {
  if (_syncActiveFilters.has(type)) {
    _syncActiveFilters.delete(type);
  } else {
    _syncActiveFilters.add(type);
  }
  renderSyncPreview();
}
</script>
