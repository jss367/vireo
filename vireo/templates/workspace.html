<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/favicon.ico">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="stylesheet" href="/static/vireo-base.css">
<title>Vireo - Workspace</title>
<style>
  body { padding-bottom: 36px; }
  .content { max-width: 800px; }
</style>
</head>
<body>

{% include '_navbar.html' %}

<div class="content">

  <!-- Active Workspace -->
  <div class="section">
    <div class="section-title" style="display:flex;align-items:center;justify-content:space-between;">
      <span id="wsPageName">Default</span>
    </div>
  </div>

  <!-- Folders -->
  <div class="section">
    <div class="section-title">Folders</div>
    <div id="wsFoldersContent"><span style="color:var(--text-ghost);font-size:13px;">Loading...</span></div>
    <div style="margin-top:12px;border-top:1px solid var(--border-primary);padding-top:12px;">
      <a href="/pipeline" class="btn btn-secondary" style="text-decoration:none;display:inline-block;">+ Add Folder</a>
      <div style="font-size:11px;color:var(--text-dim);margin-top:4px;">Opens Pipeline to add and scan a folder</div>
    </div>
  </div>

  <!-- Recent Jobs -->
  <div class="section">
    <div class="section-title">Recent Jobs</div>
    <div id="historyContent"><span style="color:var(--text-ghost);font-size:13px;">Loading...</span></div>
  </div>

  <!-- All Workspaces -->
  <div class="section">
    <div class="section-title">All Workspaces</div>
    <div id="workspacesContent"><span style="color:var(--text-ghost);font-size:13px;">Loading...</span></div>
    <div style="margin-top:12px; border-top:1px solid var(--border-primary); padding-top:12px;">
      <button onclick="showCreateWorkspaceModal()" style="background:var(--accent);color:var(--accent-text);border:none;border-radius:4px;padding:6px 14px;font-size:12px;cursor:pointer;font-weight:500;">+ New Workspace</button>
    </div>
  </div>

</div>

<script>
loadWsFolders();
loadHistory();
loadWorkspaces();

/* Set workspace name in page heading */
safeFetch('/api/workspaces/active', {}, { toast: false }).then(function(ws) {
  if (ws && ws.name) {
    var el = document.getElementById('wsPageName');
    if (el) el.textContent = ws.name;
  }
}).catch(function() {});

/* ---------- Folders ---------- */
async function loadWsFolders() {
  try {
    var ws = await safeFetch('/api/workspaces/active', {}, { toast: false });
    var container = document.getElementById('wsFoldersContent');
    if (!ws.folders || ws.folders.length === 0) {
      container.innerHTML = '<span style="color:var(--text-ghost);font-size:13px;">No folders in this workspace.</span>';
    } else {
      var html = '';
      ws.folders.forEach(function(f) {
        html += '<div class="setting-row">';
        html += '<div class="setting-label" style="font-family:monospace;font-size:13px;">' + escapeHtml(f.path) + '</div>';
        html += '<button onclick="removeFolderFromWs(' + ws.id + ', ' + f.id + ')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;" title="Remove from workspace">&times;</button>';
        html += '</div>';
      });
      container.innerHTML = html;
    }
  } catch(e) {}
}

async function removeFolderFromWs(wsId, folderId) {
  try { await safeFetch('/api/workspaces/' + wsId + '/folders/' + folderId, { method: 'DELETE' }); } catch(e) {}
  loadWsFolders();
}

/* ---------- Recent Jobs ---------- */
async function loadHistory() {
  try {
    var rows = await safeFetch('/api/jobs/history?limit=10', {}, { toast: false });
    if (rows.length === 0) {
      document.getElementById('historyContent').innerHTML = '<span style="color:var(--text-ghost);font-size:13px;">No jobs have run yet.</span>';
      return;
    }
    var html = '<table class="data-table-sm"><thead><tr><th>Type</th><th>Status</th><th>Started</th><th>Duration</th><th>Result</th></tr></thead><tbody>';
    rows.forEach(function(r) {
      var cls = r.status === 'completed' ? 'status-completed' : r.status === 'failed' ? 'status-failed' : '';
      var started = r.started_at ? new Date(r.started_at).toLocaleString() : '-';
      var duration = r.duration != null ? formatDuration(r.duration) : '-';
      var result = '-';
      if (r.result) {
        try {
          var parsed = typeof r.result === 'string' ? JSON.parse(r.result) : r.result;
          var parts = [];
          for (var k in parsed) parts.push(k + ': ' + parsed[k]);
          result = parts.join(', ');
        } catch(e) { result = String(r.result); }
      }
      if (r.error_count > 0 && result === '-') result = '';
      // For failed jobs, show the error message
      if (r.result) {
        try {
          var parsed2 = typeof r.result === 'string' ? JSON.parse(r.result) : r.result;
          if (parsed2 && parsed2.error) {
            // Truncate long errors to first line
            var errMsg = String(parsed2.error).split('\n')[0];
            if (errMsg.length > 100) errMsg = errMsg.substring(0, 100) + '...';
            result = errMsg;
          }
        } catch(e2) {}
      }
      html += '<tr><td>' + escapeHtml(r.type) + '</td><td class="' + cls + '">' + r.status + '</td>' +
        '<td>' + started + '</td><td>' + duration + '</td><td style="' + (r.status === 'failed' ? 'color:var(--danger);' : '') + '">' + escapeHtml(result) + '</td></tr>';
    });
    html += '</tbody></table>';
    document.getElementById('historyContent').innerHTML = html;
  } catch(e) {
    document.getElementById('historyContent').innerHTML = '<span style="color:var(--danger);font-size:13px;">Failed to load</span>';
  }
}

/* ---------- All Workspaces ---------- */
async function loadWorkspaces() {
  try {
    var workspaces = await safeFetch('/api/workspaces', {}, { toast: false });
    var active = await safeFetch('/api/workspaces/active', {}, { toast: false });
    var container = document.getElementById('workspacesContent');

    if (workspaces.length === 0) {
      container.innerHTML = '<span style="color:var(--text-ghost);font-size:13px;">No workspaces</span>';
      return;
    }

    var html = '';
    workspaces.forEach(function(ws) {
      var isActive = ws.id === active.id;
      var folderCount = ws.folder_count || 0;
      html += '<div class="setting-row" style="gap:8px;">';
      html += '  <div class="setting-label" style="display:flex;align-items:center;gap:8px;">';
      html += '    <input type="text" value="' + escapeAttr(ws.name) + '" '
            + 'onchange="renameWorkspace(' + ws.id + ', this.value)" '
            + 'style="background:transparent;border:1px solid transparent;color:var(--text-primary);'
            + 'font-size:14px;padding:2px 6px;border-radius:3px;width:200px;" '
            + 'onfocus="this.style.borderColor=\'var(--border-primary)\'" '
            + 'onblur="this.style.borderColor=\'transparent\'">';
      if (isActive) {
        html += '    <span style="font-size:11px;color:var(--accent);background:rgba(36,229,202,0.1);'
              + 'padding:2px 8px;border-radius:3px;">Active</span>';
      }
      html += '  </div>';
      html += '  <div style="display:flex;align-items:center;gap:6px;">';
      if (!isActive) {
        html += '    <button onclick="activateWorkspace(' + ws.id + ')" '
              + 'style="background:none;border:1px solid var(--border-primary);color:var(--text-secondary);'
              + 'border-radius:4px;padding:4px 10px;font-size:11px;cursor:pointer;" '
              + 'title="Switch to this workspace">Switch</button>';
      }
      if (!isActive && workspaces.length > 1) {
        html += '    <button onclick="deleteWorkspaceConfirm(' + ws.id + ', \'' + escapeAttr(ws.name) + '\')" '
              + 'style="background:none;border:1px solid var(--border-primary);color:var(--danger);'
              + 'border-radius:4px;padding:4px 10px;font-size:11px;cursor:pointer;" '
              + 'title="Delete this workspace">Delete</button>';
      }
      html += '  </div>';
      html += '</div>';
    });
    container.innerHTML = html;
  } catch(e) {
    document.getElementById('workspacesContent').innerHTML = '<span style="color:var(--danger);font-size:13px;">Error loading workspaces</span>';
  }
}

async function renameWorkspace(wsId, newName) {
  newName = newName.trim();
  if (!newName) return;
  try {
    await safeFetch('/api/workspaces/' + wsId, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name: newName })
    });
    // Update navbar if this is the active workspace
    var active = await safeFetch('/api/workspaces/active', {}, { toast: false });
    if (wsId === active.id) {
      var btn = document.getElementById('wsCurrentBtn');
      if (btn) btn.firstChild.textContent = newName + ' ';
      var pageName = document.getElementById('wsPageName');
      if (pageName) pageName.textContent = newName;
    }
  } catch(e) {
    loadWorkspaces();
  }
}

async function activateWorkspace(wsId) {
  try {
    var data = await safeFetch('/api/workspaces/' + wsId + '/activate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ current_path: window.location.pathname })
    });
    window.location.href = data.restore_path || window.location.pathname;
  } catch(e) {}
}

async function deleteWorkspaceConfirm(wsId, name) {
  if (!confirm('Delete workspace "' + name + '"? This will remove all its predictions, collections, and pending changes. Photos and keywords are not affected.')) {
    return;
  }
  try {
    await safeFetch('/api/workspaces/' + wsId, { method: 'DELETE' });
    loadWorkspaces();
  } catch(e) {}
}

</script>
</body>
</html>
