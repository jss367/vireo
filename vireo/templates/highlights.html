<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/favicon.ico">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="stylesheet" href="/static/vireo-base.css">
<title>Vireo - Highlights</title>
<style>
  .highlights-controls { display:flex; align-items:center; gap:20px; padding:12px 24px; background:var(--bg-secondary); border-bottom:1px solid var(--border-primary); flex-wrap:wrap; }
  .control-group { display:flex; align-items:center; gap:8px; }
  .control-group label { font-size:13px; color:var(--text-secondary); white-space:nowrap; }
  .control-group input[type=range] { width:120px; }
  .control-group input[type=search], .control-group select { font-size:13px; padding:4px 8px; background:var(--bg-input); color:var(--text-primary); border:1px solid var(--border-secondary); border-radius:4px; }
  .control-group input[type=search] { width:180px; }
  .control-value { font-size:13px; color:var(--text-primary); min-width:36px; }
  .save-btn { margin-left:auto; padding:6px 16px; background:var(--accent); color:var(--accent-text); border:none; border-radius:4px; cursor:pointer; font-size:13px; }
  .save-btn:hover { opacity:0.9; }

  .bucket { padding:16px 24px; border-bottom:1px solid var(--border-primary); }
  .bucket-header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px; }
  .bucket-heading { display:flex; align-items:baseline; gap:8px; min-width:0; flex-wrap:wrap; }
  .bucket-title { font-size:16px; color:var(--text-primary); font-weight:600; }
  .bucket-meta { font-size:13px; color:var(--text-secondary); }
  .bucket-badge { display:inline-block; margin-left:8px; font-size:10px; padding:2px 6px; border-radius:8px; background:var(--bg-tertiary); color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px; }
  .bucket-badge.predicted { background:var(--bg-tertiary); color:var(--text-secondary); }
  .bucket-badge.likely { background:rgba(34,139,34,0.16); color:var(--success); }
  .bucket-badge.candidate { background:rgba(229,194,51,0.18); color:var(--warning); }
  .bucket-badge.accepted { background:var(--accent); color:var(--accent-text); }
  .bucket-actions { display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
  .bucket-action { padding:4px 10px; border-radius:4px; border:1px solid var(--border-secondary); background:var(--bg-secondary); color:var(--text-primary); cursor:pointer; font-size:12px; }
  .bucket-action.primary { background:var(--accent); color:var(--accent-text); border-color:var(--accent); }
  .bucket-action:hover { border-color:var(--accent); }
  .bucket-action:disabled { opacity:0.55; cursor:default; }
  .bucket-strip { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:10px; }
  .highlights-card { position:relative; border-radius:6px; overflow:hidden; background:var(--bg-secondary); cursor:pointer; border:1px solid var(--border-primary); }
  .highlights-card:hover { border-color:var(--accent); }
  .highlights-card.best-card { border-color:var(--accent); }
  .best-ribbon { position:absolute; top:6px; left:6px; padding:2px 6px; border-radius:999px; background:var(--accent); color:var(--accent-text); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
  .highlights-card img { width:100%; aspect-ratio:3/2; object-fit:cover; display:block; background:var(--bg-tertiary); }
  .card-info { padding:6px 8px; font-size:11px; color:var(--text-secondary); display:flex; flex-wrap:wrap; align-items:center; justify-content:flex-end; gap:4px; min-height:28px; }
  .card-chip { padding:1px 5px; border-radius:999px; background:var(--bg-tertiary); white-space:nowrap; }
  .card-chip.score { color:var(--text-primary); font-weight:600; }
  .card-chip.conf { color:var(--text-secondary); }
  .card-chip.reason { color:var(--text-secondary); max-width:100%; overflow:hidden; text-overflow:ellipsis; }
  .bucket-expand { margin-top:8px; font-size:13px; color:var(--accent); cursor:pointer; background:none; border:none; padding:0; }
  .bucket-expand:hover { text-decoration:underline; }

  .unid-divider { padding:20px 24px 8px; font-size:11px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:1px; border-top:2px solid var(--border-primary); margin-top:8px; }

  .highlights-empty { text-align:center; padding:80px 24px; color:var(--text-secondary); }
  .highlights-empty a { color:var(--accent); }
  .highlights-meta { padding:8px 24px; font-size:12px; color:var(--text-secondary); }

  /* Save modal (unchanged) */
  .save-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:500; align-items:center; justify-content:center; }
  .save-modal-overlay.open { display:flex; }
  .save-modal { background:var(--bg-primary); border:1px solid var(--border-primary); border-radius:8px; padding:24px; min-width:360px; }
  .save-modal h3 { margin:0 0 16px; font-size:16px; color:var(--text-primary); }
  .save-modal input[type=text] { width:100%; padding:8px; font-size:14px; border:1px solid var(--border-secondary); border-radius:4px; box-sizing:border-box; margin-bottom:12px; background:var(--bg-input); color:var(--text-primary); }
  .save-modal-actions { display:flex; gap:8px; justify-content:flex-end; }
  .save-modal-actions button { padding:6px 16px; border-radius:4px; border:none; cursor:pointer; font-size:13px; }

  .species-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:700; align-items:center; justify-content:center; }
  .species-modal-overlay.open { display:flex; }
  .species-modal { width:min(420px, calc(100vw - 32px)); background:var(--bg-primary); border:1px solid var(--border-primary); border-radius:8px; padding:20px; box-shadow:0 16px 48px rgba(0,0,0,0.35); }
  .species-modal h3 { margin:0 0 12px; font-size:16px; color:var(--text-primary); }
  .species-modal p { margin:0 0 12px; color:var(--text-secondary); font-size:13px; }
  .species-modal input[type=text] { width:100%; padding:8px; font-size:14px; border:1px solid var(--border-secondary); border-radius:4px; box-sizing:border-box; background:var(--bg-input); color:var(--text-primary); }
  .species-modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }
  .species-modal-actions button { padding:6px 16px; border-radius:4px; border:1px solid var(--border-secondary); background:var(--bg-secondary); color:var(--text-primary); cursor:pointer; font-size:13px; }
  .species-modal-actions .primary { background:var(--accent); color:var(--accent-text); border-color:var(--accent); }

  .highlight-lb-panel { display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding:5px 8px; border-radius:4px; background:rgba(0,0,0,0.6); border:1px solid var(--text-faint); color:var(--text-secondary); font-size:12px; }
  .highlight-lb-panel button { border:1px solid var(--border-secondary); background:rgba(255,255,255,0.08); color:var(--text-primary); border-radius:4px; padding:4px 9px; cursor:pointer; font-size:12px; }
  .highlight-lb-panel button.primary { border-color:var(--accent); color:var(--accent); }
</style>
</head>
<body>
{% include '_navbar.html' %}

<div class="highlights-controls" id="controlsBar">
  <div class="control-group">
    <label for="folderSelect">Folder</label>
    <select id="folderSelect"></select>
  </div>
  <div class="control-group">
    <label for="speciesSearch">Species</label>
    <input type="search" id="speciesSearch" placeholder="Cardinal">
  </div>
  <div class="control-group">
    <label for="qualitySlider">Min quality</label>
    <input type="range" id="qualitySlider" min="0" max="100" value="0" step="5">
    <span class="control-value" id="qualityValue">0.00</span>
  </div>
  <div class="control-group">
    <label for="confidenceSlider">Auto-ID confidence</label>
    <input type="range" id="confidenceSlider" min="50" max="95" value="70" step="5">
    <span class="control-value" id="confidenceValue">0.70</span>
  </div>
  <div class="control-group">
    <label for="perRowSlider">Per row</label>
    <input type="range" id="perRowSlider" min="1" max="20" value="5">
    <span class="control-value" id="perRowValue">5</span>
  </div>
  <div class="control-group">
    <label for="sortSelect">Sort</label>
    <select id="sortSelect">
      <option value="best">Best photo first</option>
      <option value="fewest">Fewest photos</option>
      <option value="most">Most photos</option>
      <option value="worst">Worst photo first</option>
    </select>
  </div>
  <button class="save-btn" id="saveBtn" onclick="showSaveModal()">Save as Collection</button>
</div>

<div class="highlights-meta" id="meta"></div>

<div id="content"></div>

<div id="emptyState" class="highlights-empty" style="display:none;">
  <p>No highlights available yet.</p>
  <p>Run a pipeline with quality scoring enabled to generate highlights.</p>
  <p><a href="/jobs">Go to Jobs</a></p>
</div>

<!-- Save modal -->
<div class="save-modal-overlay" id="saveModal">
  <div class="save-modal">
    <h3>Save as Collection</h3>
    <input type="text" id="saveNameInput" placeholder="Collection name">
    <div id="saveDuplicateWarning" style="display:none; color:var(--warning); font-size:13px; margin-bottom:12px;"></div>
    <div class="save-modal-actions">
      <button onclick="closeSaveModal()" style="background:var(--bg-secondary); color:var(--text-primary);">Cancel</button>
      <button id="replaceBtn" onclick="doSave('replace')" style="display:none; background:var(--warning); color:#fff;">Replace</button>
      <button onclick="doSave('new')" style="background:var(--accent); color:var(--accent-text);">Save</button>
    </div>
  </div>
</div>

<!-- Species correction modal -->
<div class="species-modal-overlay" id="speciesModal" onclick="if (event.target === this) closeSpeciesModal();">
  <div class="species-modal">
    <h3 id="speciesModalTitle">Set species</h3>
    <p id="speciesModalSummary"></p>
    <input type="text" id="speciesModalInput" list="highlightSpeciesList" placeholder="Species name" autocomplete="off">
    <datalist id="highlightSpeciesList"></datalist>
    <div class="species-modal-actions">
      <button onclick="closeSpeciesModal()">Cancel</button>
      <button class="primary" id="speciesModalSubmit" onclick="submitSpeciesModal()">Apply</button>
    </div>
  </div>
</div>

<script>
var WORKSPACE_SCOPE = '__workspace__';
var currentData = null;          // last API response
var expandedBuckets = new Set(); // species names whose row is expanded
var unidentifiedExpanded = false;
var currentFolderName = '';
var debounceTimer = null;
var existingCollections = [];
var speciesSuggestionsLoaded = false;
var speciesModalPhotoIds = [];
var activeLightboxPhotoId = null;
// Photos the user has rejected from the lightbox this session and not since
// un-rejected. Drives grid removal AND guards reloads: loadHighlights() prunes
// these after applying its response, so a restore/filter reload issued against
// backend state from before a (re-)rejection can't reinsert a rejected photo.
var rejectedFromGrid = new Set();

function escapeAttr(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function formatScore(v) {
  return v == null ? '—' : Number(v).toFixed(2);
}

function formatPercent(v) {
  return v == null ? '' : Math.round(Number(v) * 100) + '%';
}

function requestScopeParams() {
  var params = new URLSearchParams();
  var folderSelect = document.getElementById('folderSelect');
  var firstLoad = folderSelect.options.length === 0;
  if (folderSelect.value === WORKSPACE_SCOPE || firstLoad) {
    params.set('scope', 'workspace');
  } else if (folderSelect.value) {
    params.set('folder_id', folderSelect.value);
  }
  params.set('min_quality', (parseInt(document.getElementById('qualitySlider').value) / 100).toFixed(2));
  params.set('confidence_threshold', (parseInt(document.getElementById('confidenceSlider').value) / 100).toFixed(2));
  return params;
}

async function loadHighlights() {
  var params = requestScopeParams();
  var folderSelect = document.getElementById('folderSelect');
  var speciesSearch = document.getElementById('speciesSearch').value.trim();
  params.set('limit_per_bucket', Math.max(20, parseInt(document.getElementById('perRowSlider').value)));
  if (speciesSearch) params.set('species', speciesSearch);

  var data = await safeFetch('/api/highlights?' + params);
  currentData = data;

  // Guard against a reload that was issued against backend state from before a
  // rejection landed (e.g. un-reject starts a restore reload, then the photo is
  // rejected again before it returns): drop any still-rejected photo the
  // response may have reincluded so the grid matches the final flag.
  rejectedFromGrid.forEach(function(id) { removeRejectedPhotoFromModel(id); });

  // Populate folder dropdown on first load.
  if (!folderSelect.options.length) {
    var wsOpt = document.createElement('option');
    wsOpt.value = WORKSPACE_SCOPE;
    wsOpt.textContent = 'All folders in this workspace';
    folderSelect.appendChild(wsOpt);
    data.folders.forEach(function(f) {
      var opt = document.createElement('option');
      opt.value = f.id;
      opt.textContent = f.name + ' (' + f.photo_count + ')';
      folderSelect.appendChild(opt);
    });
  }
  currentFolderName = folderSelect.options[folderSelect.selectedIndex]
    ? folderSelect.options[folderSelect.selectedIndex].textContent.replace(/\s*\(\d+\)$/, '')
    : '';

  render();
}

function sortedBuckets() {
  var sort = document.getElementById('sortSelect').value;
  var buckets = (currentData.buckets || []).slice();
  buckets.sort(function(a, b) {
    if (sort === 'most') return b.photo_count - a.photo_count;
    if (sort === 'best') return (b.best_score || 0) - (a.best_score || 0);
    if (sort === 'worst') return (a.best_score || 0) - (b.best_score || 0);
    return a.photo_count - b.photo_count; // 'fewest' default
  });
  return buckets;
}

function renderCard(p, idx) {
  var thumbSrc = '/thumbnails/' + p.id + '.jpg';
  var conf = p.has_accepted_species
    ? '<span class="card-chip conf">Tagged</span>'
    : (p.predicted_confidence != null ? '<span class="card-chip conf">ID ' + formatPercent(p.predicted_confidence) + '</span>' : '');
  var reasons = (p.reasons || []).slice(0, 2).map(function(r) {
    return '<span class="card-chip reason">' + escapeAttr(r) + '</span>';
  }).join('');
  var title = (p.reasons || []).join(', ');
  return '<div class="highlights-card' + (idx === 0 ? ' best-card' : '') + '" data-photo-id="' + p.id + '" title="' + escapeAttr(title) + '">'
    + (idx === 0 ? '<div class="best-ribbon">Best</div>' : '')
    + '<img src="' + thumbSrc + '" alt="' + escapeAttr(p.filename) + '" loading="lazy">'
    + '<div class="card-info"><span class="card-chip score">' + formatScore(p.highlight_score) + '</span>' + conf + reasons + '</div>'
    + '</div>';
}

function attachCardClicks(container, photoSet) {
  // photoSet is the full list of photos in this bucket — used as the
  // lightbox navigation set so users can flip through every photo of
  // the species, not just the visible ones.
  container.querySelectorAll('.highlights-card').forEach(function(card) {
    card.addEventListener('click', function() {
      var pid = parseInt(card.getAttribute('data-photo-id'));
      var photo = photoSet.find(function(p) { return p.id === pid; });
      if (window.openLightbox && photo) {
        activeLightboxPhotoId = pid;
        openLightbox(pid, photo.filename, photoSet);
      }
    });
  });
}

async function ensureFullBucketLoaded(species, isUnidentified) {
  var target = isUnidentified
    ? (currentData && currentData.unidentified)
    : (currentData && currentData.buckets || []).find(function(b) { return b.species === species; });
  if (!target) return [];
  while (target.has_more) {
    await loadMoreBucket(species, isUnidentified);
  }
  return target.photos || [];
}

async function bucketPhotoIds(bucket) {
  var photos = await ensureFullBucketLoaded(bucket.species, false);
  return photos.map(function(p) { return p.id; });
}

async function unidPhotoIds() {
  var photos = await ensureFullBucketLoaded(null, true);
  return photos
    .map(function(p) { return p.id; });
}

function photoCurrentLabel(photo) {
  if (!photo) return '';
  if (photo.has_accepted_species && photo.species) {
    return 'Confirmed: ' + photo.species;
  }
  if (photo.predicted_species) {
    var conf = photo.predicted_confidence != null
      ? ' (' + Math.round(photo.predicted_confidence * 100) + '%)'
      : '';
    return 'Predicted: ' + photo.predicted_species + conf;
  }
  return 'Unidentified';
}

function photoSpeciesName(photo) {
  if (!photo) return '';
  if (photo.has_accepted_species && photo.species) return photo.species;
  if (photo.predicted_species) return photo.predicted_species;
  return '';
}

async function confirmPhotoIds(photoIds, button) {
  if (!photoIds.length) return;
  if (button) button.disabled = true;
  try {
    await safeFetch('/api/highlights/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ photo_ids: photoIds }),
    });
    await loadHighlights();
    if (typeof showToast === 'function') showToast('Prediction confirmed', 'success');
  } finally {
    if (button) button.disabled = false;
  }
}

async function loadSpeciesSuggestions() {
  if (speciesSuggestionsLoaded) return;
  speciesSuggestionsLoaded = true;
  try {
    var keywords = await safeFetch('/api/keywords/all', {}, { toast: false });
    var list = document.getElementById('highlightSpeciesList');
    list.innerHTML = '';
    (keywords || []).filter(function(k) {
      return k && k.name && (k.type === 'taxonomy' || k.taxon_name || k.taxon_common_name);
    }).forEach(function(k) {
      var opt = document.createElement('option');
      opt.value = k.name;
      list.appendChild(opt);
    });
  } catch (e) {
    speciesSuggestionsLoaded = false;
    // Free typing still works if suggestions cannot be loaded.
  }
}

function showSpeciesModal(title, summary, photoIds, initialSpecies) {
  speciesModalPhotoIds = photoIds.slice();
  document.getElementById('speciesModalTitle').textContent = title;
  document.getElementById('speciesModalSummary').textContent = summary;
  var input = document.getElementById('speciesModalInput');
  input.value = initialSpecies || '';
  document.getElementById('speciesModal').classList.add('open');
  loadSpeciesSuggestions();
  setTimeout(function() { input.focus(); input.select(); }, 0);
}

function closeSpeciesModal() {
  document.getElementById('speciesModal').classList.remove('open');
  speciesModalPhotoIds = [];
}

async function submitSpeciesModal() {
  var input = document.getElementById('speciesModalInput');
  var species = input.value.trim();
  if (!species || !speciesModalPhotoIds.length) return;
  var submit = document.getElementById('speciesModalSubmit');
  submit.disabled = true;
  try {
    await safeFetch('/api/highlights/relabel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ photo_ids: speciesModalPhotoIds, species: species }),
    });
    closeSpeciesModal();
    await loadHighlights();
    updateHighlightsLightboxControls(activeLightboxPhotoId);
    if (typeof showToast === 'function') showToast('Species updated', 'success');
  } finally {
    submit.disabled = false;
  }
}

function renderBucket(bucket) {
  var perRow = parseInt(document.getElementById('perRowSlider').value);
  var expanded = expandedBuckets.has(bucket.species);
  var visible = expanded ? bucket.photos : bucket.photos.slice(0, perRow);
  var remaining = bucket.photo_count - visible.length;
  var badgeClass = bucket.is_accepted ? 'accepted' : (bucket.certainty === 'likely' ? 'likely' : 'candidate');
  var badgeText = bucket.is_accepted ? 'Confirmed' : (bucket.certainty === 'likely' ? 'Likely ID' : 'Top candidates');
  var badge = bucket.is_accepted
    ? '<span class="bucket-badge accepted">Confirmed</span>'
    : '<span class="bucket-badge ' + badgeClass + '">' + badgeText + '</span>';
  var meta = bucket.photo_count + ' photo' + (bucket.photo_count === 1 ? '' : 's')
    + ' · best ' + formatScore(bucket.best_score);
  if (!bucket.is_accepted && bucket.avg_confidence != null) meta += ' · ID ' + formatPercent(bucket.avg_confidence);
  var expandBtn = '';
  // Show the affordance whenever photos are hidden (more loaded than one row)
  // or unloaded (has_more). Gating on photo_count > perRow alone would strand
  // backend rows after a rejection drops photo_count to perRow while has_more
  // is still true — leaving no way to load the rest without a refresh.
  if (bucket.photos.length > perRow || bucket.has_more) {
    expandBtn = '<button class="bucket-expand" data-species="'
      + escapeAttr(bucket.species) + '">'
      + (expanded ? (bucket.has_more ? 'Load more' : 'Show fewer') : '+ ' + remaining + ' more')
      + '</button>';
  }
  var actions = '<div class="bucket-actions">';
  if (!bucket.is_accepted) {
    actions += '<button class="bucket-action primary" data-action="confirm-bucket" data-species="'
      + escapeAttr(bucket.species) + '">Confirm</button>';
  }
  actions += '<button class="bucket-action" data-action="change-bucket" data-species="'
    + escapeAttr(bucket.species) + '">Change</button></div>';
  return '<section class="bucket">'
    + '<div class="bucket-header">'
    + '<div class="bucket-heading"><div class="bucket-title">' + escapeAttr(bucket.species) + badge + '</div>'
    + '<div class="bucket-meta">' + meta + '</div></div>'
    + actions
    + '</div>'
    + '<div class="bucket-strip">' + visible.map(renderCard).join('') + '</div>'
    + expandBtn
    + '</section>';
}

function renderUnidentified() {
  var unid = currentData.unidentified;
  if (!unid || !unid.photo_count) return '';
  var perRow = parseInt(document.getElementById('perRowSlider').value);
  var visible = unidentifiedExpanded ? unid.photos : unid.photos.slice(0, perRow);
  var remaining = unid.photo_count - visible.length;
  var expandBtn = '';
  // Same as renderBucket: keep the load/expand affordance while photos are
  // hidden or unloaded, so a rejection that drops photo_count to perRow with
  // has_more still true doesn't strand the remaining backend rows.
  if (unid.photos.length > perRow || unid.has_more) {
    expandBtn = '<button class="bucket-expand" data-unid="1">'
      + (unidentifiedExpanded ? (unid.has_more ? 'Load more' : 'Show fewer') : '+ ' + remaining + ' more')
      + '</button>';
  }
  return '<div class="unid-divider">Unidentified — Vireo couldn\'t ID these</div>'
    + '<section class="bucket">'
    + '<div class="bucket-header">'
    + '<div class="bucket-heading"><div class="bucket-title">Unidentified</div>'
    + '<div class="bucket-meta">' + unid.photo_count + ' photos</div></div>'
    + '<div class="bucket-actions"><button class="bucket-action" data-action="change-unidentified">Set species</button></div>'
    + '</div>'
    + '<div class="bucket-strip">' + visible.map(renderCard).join('') + '</div>'
    + expandBtn
    + '</section>';
}

async function loadMoreBucket(species, isUnidentified) {
  var params = requestScopeParams();
  var target = isUnidentified ? currentData.unidentified : (currentData.buckets || []).find(function(b) { return b.species === species; });
  if (!target || !target.has_more) return;
  params.set('species', isUnidentified ? '__unidentified__' : species);
  params.set('offset', target.photos.length);
  params.set('limit', 500);
  var data = await safeFetch('/api/highlights/bucket?' + params);
  target.photos = target.photos.concat(data.photos || []);
  target.loaded_count = data.loaded_count;
  target.has_more = data.has_more;
}

function render() {
  var content = document.getElementById('content');
  var empty = document.getElementById('emptyState');
  var meta = document.getElementById('meta');
  var controls = document.getElementById('controlsBar');

  if (!currentData.folders.length) {
    content.innerHTML = '';
    empty.style.display = 'block';
    meta.textContent = '';
    controls.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  controls.style.display = '';

  var buckets = sortedBuckets();
  var speciesSearch = document.getElementById('speciesSearch').value.trim();
  meta.textContent = buckets.length + (speciesSearch ? ' matching' : '') + ' species · '
    + currentData.meta.eligible + ' of '
    + currentData.meta.total_in_scope + ' photos scored';

  var html = buckets.map(renderBucket).join('') + renderUnidentified();
  content.innerHTML = html || '<div class="highlights-empty"><p>Nothing matches these filters.</p></div>';

  // Wire up clicks for cards and expand buttons.
  // Attach card clicks: pick the right photo set per section by walking sections in DOM order.
  var sections = content.querySelectorAll('section.bucket');
  sections.forEach(function(section, idx) {
    var photoSet;
    if (idx < buckets.length) {
      photoSet = buckets[idx].photos;
    } else {
      photoSet = currentData.unidentified.photos;
    }
    attachCardClicks(section, photoSet);
  });

  // Expand buttons
  content.querySelectorAll('.bucket-expand').forEach(function(btn) {
    btn.addEventListener('click', async function() {
      if (btn.hasAttribute('data-unid')) {
        if (!unidentifiedExpanded || currentData.unidentified.has_more) {
          unidentifiedExpanded = true;
          await loadMoreBucket(null, true);
        } else {
          unidentifiedExpanded = false;
        }
      } else {
        var sp = btn.getAttribute('data-species');
        var bucket = (currentData.buckets || []).find(function(b) { return b.species === sp; });
        if (!expandedBuckets.has(sp) || (bucket && bucket.has_more)) {
          expandedBuckets.add(sp);
          await loadMoreBucket(sp, false);
        } else {
          expandedBuckets.delete(sp);
        }
      }
      render();
    });
  });

  content.querySelectorAll('.bucket-action').forEach(function(btn) {
    btn.addEventListener('click', async function() {
      var action = btn.getAttribute('data-action');
      btn.disabled = true;
      try {
        if (action === 'confirm-bucket') {
          var species = btn.getAttribute('data-species');
          var bucket = buckets.find(function(b) { return b.species === species; });
          if (bucket) await confirmPhotoIds(await bucketPhotoIds(bucket), btn);
        } else if (action === 'change-bucket') {
          var changeSpecies = btn.getAttribute('data-species');
          var changeBucket = buckets.find(function(b) { return b.species === changeSpecies; });
          if (changeBucket) {
            var changeIds = await bucketPhotoIds(changeBucket);
            showSpeciesModal(
              'Change species',
              changeIds.length + ' photo' + (changeIds.length === 1 ? '' : 's'),
              changeIds,
              changeBucket.species
            );
          }
        } else if (action === 'change-unidentified') {
          var ids = await unidPhotoIds();
          showSpeciesModal(
            'Set species',
            ids.length + ' unidentified photo' + (ids.length === 1 ? '' : 's'),
            ids,
            ''
          );
        }
      } finally {
        btn.disabled = false;
      }
    });
  });
  updateHighlightsLightboxControls(activeLightboxPhotoId);
}

function findHighlightPhoto(photoId) {
  if (!currentData || photoId == null) return null;
  var buckets = currentData.buckets || [];
  for (var i = 0; i < buckets.length; i++) {
    var match = (buckets[i].photos || []).find(function(p) { return p.id === photoId; });
    if (match) return match;
  }
  var unid = currentData.unidentified && currentData.unidentified.photos || [];
  return unid.find(function(p) { return p.id === photoId; }) || null;
}

function ensureHighlightsLightboxPanel() {
  var actions = document.getElementById('lightboxActions');
  if (!actions) return null;
  var panel = document.getElementById('highlightLightboxPanel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'highlightLightboxPanel';
    panel.className = 'highlight-lb-panel';
    actions.insertBefore(panel, actions.firstChild);
  }
  return panel;
}

function updateHighlightsLightboxControls(photoId) {
  var panel = ensureHighlightsLightboxPanel();
  if (!panel) return;
  var photo = findHighlightPhoto(photoId);
  if (!photo) {
    panel.style.display = 'none';
    panel.innerHTML = '';
    return;
  }
  panel.style.display = '';
  var html = '<span>' + escapeAttr(photoCurrentLabel(photo)) + '</span>';
  if (photo.is_confirmable_prediction) {
    html += '<button class="primary" data-lb-action="confirm">Confirm</button>';
  }
  html += '<button data-lb-action="change">' + (photo.is_confirmable_prediction || photo.has_accepted_species ? 'Change' : 'Set species') + '</button>';
  panel.innerHTML = html;
  panel.querySelectorAll('button').forEach(function(btn) {
    btn.addEventListener('click', function(event) {
      event.stopPropagation();
      if (btn.getAttribute('data-lb-action') === 'confirm') {
        confirmPhotoIds([photo.id], btn);
      } else {
        var modalTitle = (photo.is_confirmable_prediction || photo.has_accepted_species)
          ? 'Change species'
          : 'Set species';
        showSpeciesModal(modalTitle, photo.filename || '', [photo.id], photoSpeciesName(photo));
      }
    });
  });
}

document.addEventListener('lightbox:photochanged', function(event) {
  activeLightboxPhotoId = event.detail ? event.detail.photoId : null;
  updateHighlightsLightboxControls(activeLightboxPhotoId);
});

document.getElementById('speciesModalInput').addEventListener('keydown', function(event) {
  if (event.key === 'Enter') {
    event.preventDefault();
    submitSpeciesModal();
  } else if (event.key === 'Escape') {
    closeSpeciesModal();
  }
});

function debounceLoad() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(loadHighlights, 300);
}

document.getElementById('qualitySlider').addEventListener('input', function() {
  document.getElementById('qualityValue').textContent = (this.value / 100).toFixed(2);
  debounceLoad();
});
document.getElementById('confidenceSlider').addEventListener('input', function() {
  document.getElementById('confidenceValue').textContent = (this.value / 100).toFixed(2);
  debounceLoad();
});
document.getElementById('speciesSearch').addEventListener('input', function() {
  debounceLoad();
});
document.getElementById('perRowSlider').addEventListener('input', function() {
  document.getElementById('perRowValue').textContent = this.value;
  if (currentData) render();
});
document.getElementById('sortSelect').addEventListener('change', function() {
  if (currentData) render();
});
document.getElementById('folderSelect').addEventListener('change', function() {
  // Reset per-row expand state when the user picks a different folder
  // so the new folder's rows don't inherit the previous folder's state.
  expandedBuckets.clear();
  unidentifiedExpanded = false;
  loadHighlights();
});

// Save modal
async function showSaveModal() {
  document.getElementById('saveNameInput').value = 'Highlights - ' + currentFolderName;
  document.getElementById('saveDuplicateWarning').style.display = 'none';
  document.getElementById('replaceBtn').style.display = 'none';
  existingCollections = await safeFetch('/api/collections');
  var proposed = document.getElementById('saveNameInput').value;
  var existing = existingCollections.find(function(c) { return c.name === proposed; });
  if (existing) {
    document.getElementById('saveDuplicateWarning').textContent =
      'A collection named "' + proposed + '" already exists.';
    document.getElementById('saveDuplicateWarning').style.display = 'block';
    document.getElementById('replaceBtn').style.display = '';
  }
  document.getElementById('saveModal').classList.add('open');
}

function closeSaveModal() {
  document.getElementById('saveModal').classList.remove('open');
}

function collectVisiblePhotoIds() {
  // "What's currently visible on the page" = the photos rendered in
  // each bucket (respecting expand state) plus unidentified if shown.
  var ids = [];
  var perRow = parseInt(document.getElementById('perRowSlider').value);
  sortedBuckets().forEach(function(b) {
    var visible = expandedBuckets.has(b.species) ? b.photos : b.photos.slice(0, perRow);
    visible.forEach(function(p) { ids.push(p.id); });
  });
  if (currentData.unidentified && currentData.unidentified.photo_count) {
    var u = currentData.unidentified.photos;
    var v = unidentifiedExpanded ? u : u.slice(0, perRow);
    v.forEach(function(p) { ids.push(p.id); });
  }
  return ids;
}

async function doSave(mode) {
  var name = document.getElementById('saveNameInput').value.trim();
  if (!name) return;
  var photoIds = collectVisiblePhotoIds();

  if (mode === 'replace') {
    var existing = existingCollections.find(function(c) { return c.name === name; });
    if (existing) {
      await safeFetch('/api/collections/' + existing.id, { method: 'DELETE' });
    }
  } else if (mode === 'new') {
    var baseName = name;
    var counter = 2;
    var names = existingCollections.map(function(c) { return c.name; });
    while (names.indexOf(name) >= 0) {
      name = baseName + ' (' + counter + ')';
      counter++;
    }
  }

  await safeFetch('/api/highlights/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ photo_ids: photoIds, name: name }),
  });
  closeSaveModal();
}

// Drop a photo from the in-memory model after it is rejected, so the grid
// matches the backend query (which excludes rejected photos). Returns true if
// anything changed.
function removeRejectedPhotoFromModel(photoId) {
  if (!currentData) return false;
  var changed = false;

  function pruneSection(section) {
    if (!section || !Array.isArray(section.photos)) return;
    var before = section.photos.length;
    // Replace (don't splice) the array so any open lightbox keeps navigating
    // its original, stable photo set.
    var kept = section.photos.filter(function(p) { return p.id !== photoId; });
    if (kept.length !== before) {
      section.photos = kept;
      section.photo_count = Math.max(0, (section.photo_count || before) - 1);
      if (typeof section.loaded_count === 'number') {
        section.loaded_count = Math.max(0, section.loaded_count - 1);
      }
      changed = true;
    }
  }

  (currentData.buckets || []).forEach(pruneSection);
  pruneSection(currentData.unidentified);

  if (changed) {
    // Drop only buckets fully emptied by the rejection. A large bucket may
    // still have eligible photos behind `has_more` even after every loaded
    // card is rejected (photo_count stays positive), so keep it — its expand
    // button is the user's only way to load the rest without a refresh.
    if (currentData.buckets) {
      currentData.buckets = currentData.buckets.filter(function(b) {
        return (b.photo_count || 0) > 0 || (b.photos || []).length > 0;
      });
    }
    if (currentData.meta && typeof currentData.meta.eligible === 'number') {
      currentData.meta.eligible = Math.max(0, currentData.meta.eligible - 1);
    }
  }
  return changed;
}

document.addEventListener('lightbox:flagchanged', function(e) {
  var detail = e && e.detail;
  if (!detail || detail.photoId == null) return;
  if (detail.flag === 'rejected') {
    // Track before mutating: during an in-flight restore reload the photo may
    // not be in currentData yet, so removeRejectedPhotoFromModel returns false
    // — but the id must still be remembered so the reload's prune drops it.
    rejectedFromGrid.add(detail.photoId);
    if (removeRejectedPhotoFromModel(detail.photoId)) render();
  } else if (rejectedFromGrid.has(detail.photoId)) {
    // A previously-rejected photo was un-rejected — it re-qualifies for
    // highlights, so refetch to restore it (and the Save-as-Collection list)
    // in its correct bucket. Tracking the set keeps this scoped to genuine
    // reappearances, not every Pick/Unflag on a photo still in the grid.
    rejectedFromGrid.delete(detail.photoId);
    loadHighlights();
  }
});

loadHighlights();
</script>
