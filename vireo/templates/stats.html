<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/favicon.ico">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<title>Vireo - Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0A1F2E;
  color: #E0F0F0;
  min-height: 100vh;
  padding-bottom: 36px;
}
.content { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }
.section {
  background: #0E2A3D; border: 1px solid #14374E;
  border-radius: 8px; padding: 24px; margin-bottom: 24px;
}
.section-title {
  font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #fff;
  padding-bottom: 8px; border-bottom: 1px solid #14374E;
}
.bar-chart { margin-top: 8px; }
.bar-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 12px;
}
.bar-label {
  width: 180px; text-align: right; color: #B0CCCC; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0;
}
.bar-track {
  flex: 1; height: 18px; background: #14374E; border-radius: 3px; overflow: hidden;
}
.bar-fill {
  height: 100%; border-radius: 3px; transition: width 0.3s;
}
.bar-value { width: 60px; color: #888; font-variant-numeric: tabular-nums; flex-shrink: 0; }
.species-bar .bar-fill { background: #24E5CA; }
.month-bar .bar-fill { background: #7ec8e3; }
.rating-bar .bar-fill { background: #f0c040; }

.grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 768px) { .grid-2col { grid-template-columns: 1fr; } }

.stat-big { text-align: center; padding: 16px; }
.stat-big .number { font-size: 36px; font-weight: 700; color: #24E5CA; }
.stat-big .label { font-size: 12px; color: #888; margin-top: 4px; }
</style>
</head>
<body>

{% set active_page = 'dashboard' %}
{% include '_navbar.html' %}

<div class="content">
  <h2 style="margin-bottom:20px;font-size:20px;">Dashboard</h2>

  <!-- Top Species -->
  <div class="section">
    <div class="section-title">Top Species</div>
    <div class="bar-chart" id="speciesChart"><span style="color:#555;font-size:13px;">Loading...</span></div>
  </div>

  <div class="grid-2col">
    <!-- Rating Distribution -->
    <div class="section">
      <div class="section-title">Ratings</div>
      <div class="bar-chart" id="ratingChart"></div>
    </div>

    <!-- Flag Distribution -->
    <div class="section">
      <div class="section-title">Flags</div>
      <div id="flagStats"></div>
    </div>
  </div>

  <!-- Photos by Month -->
  <div class="section">
    <div class="section-title">Photos by Month</div>
    <div class="bar-chart" id="monthChart"><span style="color:#555;font-size:13px;">Loading...</span></div>
  </div>

  <!-- Storage Management -->
  <div class="section">
    <div class="section-title">Storage</div>
    <div id="storageChart" style="margin-bottom:16px;"></div>
    <div style="font-size:12px;color:var(--text-dim,#888);margin-bottom:16px;">
      Total: <b id="storageTotalSize" style="color:var(--text-primary,#E0F0F0);">-</b>
    </div>
    <div id="storageRows"></div>
  </div>
</div>

<script>
loadStats();
loadStoragePanel();

async function loadStats() {
  try {
    var resp = await fetch('/api/stats');
    var data = await resp.json();
    renderSpecies(data.top_keywords || []);
    renderMonths(data.photos_by_month || []);
    renderRatings(data.rating_distribution || []);
    renderFlags(data.flag_distribution || []);
  } catch(e) {
    document.getElementById('speciesChart').textContent = 'Failed to load statistics.';
  }
}

function renderSpecies(keywords) {
  var species = keywords.filter(function(k) { return k.is_species; });
  var container = document.getElementById('speciesChart');
  if (species.length === 0) {
    container.innerHTML = '<span style="color:#555;font-size:13px;">No species classified yet. Run classification on the Classify page.</span>';
    return;
  }
  var max = species[0].photo_count;
  var html = '';
  species.slice(0, 20).forEach(function(k) {
    var pct = Math.round((k.photo_count / max) * 100);
    html += '<div class="bar-row species-bar">' +
      '<span class="bar-label">' + escapeHtml(k.name) + '</span>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
      '<span class="bar-value">' + k.photo_count.toLocaleString() + '</span>' +
    '</div>';
  });

  // Also show top non-species keywords
  var nonSpecies = keywords.filter(function(k) { return !k.is_species; }).slice(0, 10);
  if (nonSpecies.length > 0) {
    html += '<div style="margin-top:16px;font-size:11px;color:#666;text-transform:uppercase;margin-bottom:8px;">Other Keywords</div>';
    nonSpecies.forEach(function(k) {
      var pct = Math.round((k.photo_count / max) * 100);
      html += '<div class="bar-row">' +
        '<span class="bar-label">' + escapeHtml(k.name) + '</span>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:#555;"></div></div>' +
        '<span class="bar-value">' + k.photo_count.toLocaleString() + '</span>' +
      '</div>';
    });
  }
  container.innerHTML = html;
}

function renderMonths(months) {
  var container = document.getElementById('monthChart');
  if (months.length === 0) {
    container.innerHTML = '<span style="color:#555;font-size:13px;">No timestamp data available.</span>';
    return;
  }
  var max = Math.max.apply(null, months.map(function(m) { return m.count; }));
  var html = '';
  months.forEach(function(m) {
    var pct = Math.round((m.count / max) * 100);
    html += '<div class="bar-row month-bar">' +
      '<span class="bar-label">' + (m.month || 'Unknown') + '</span>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
      '<span class="bar-value">' + m.count.toLocaleString() + '</span>' +
    '</div>';
  });
  container.innerHTML = html;
}

function renderRatings(ratings) {
  var container = document.getElementById('ratingChart');
  var total = ratings.reduce(function(sum, r) { return sum + r.count; }, 0);
  if (total === 0) return;
  var max = Math.max.apply(null, ratings.map(function(r) { return r.count; }));
  var html = '';
  for (var i = 0; i <= 5; i++) {
    var r = ratings.find(function(x) { return x.rating === i; });
    var count = r ? r.count : 0;
    var pct = max > 0 ? Math.round((count / max) * 100) : 0;
    var stars = i === 0 ? 'Unrated' : '';
    for (var s = 0; s < i; s++) stars += '\u2605';
    html += '<div class="bar-row rating-bar">' +
      '<span class="bar-label">' + stars + '</span>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
      '<span class="bar-value">' + count.toLocaleString() + '</span>' +
    '</div>';
  }
  container.innerHTML = html;
}

function renderFlags(flags) {
  var container = document.getElementById('flagStats');
  var html = '';
  flags.forEach(function(f) {
    var color = f.flag === 'flagged' ? '#24E5CA' : f.flag === 'rejected' ? '#e74c3c' : '#888';
    html += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #0E2A3D;">' +
      '<span style="color:' + color + ';font-size:14px;font-weight:600;text-transform:capitalize;">' + f.flag + '</span>' +
      '<span style="margin-left:auto;font-size:14px;color:#B0CCCC;font-variant-numeric:tabular-nums;">' + f.count.toLocaleString() + '</span>' +
    '</div>';
  });
  container.innerHTML = html;
}

function escapeHtml(str) {
  if (str == null) return '';
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(String(str)));
  return div.innerHTML;
}

function formatBytes(bytes) {
  if (bytes === 0) return '0 B';
  var k = 1024;
  var sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
  var i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

async function loadStoragePanel() {
  try {
    var resp = await fetch('/api/storage');
    var s = await resp.json();

    document.getElementById('storageTotalSize').textContent = formatBytes(s.total);

    var categories = [
      {name: 'Database', size: s.database.size, color: '#24E5CA', type: null},
      {name: 'Thumbnails', size: s.thumbnails.size, color: '#12C3B5', count: s.thumbnails.count, type: 'thumbnails'},
      {name: 'Previews', size: s.previews.size, color: '#038A96', count: s.previews.count, type: 'previews'},
      {name: 'Embeddings', size: s.embeddings.size, color: '#0D5B79', count: s.embeddings.count, type: 'embeddings'},
      {name: 'Models', size: s.models.size, color: '#0A2F4D', type: null},
      {name: 'HF Cache', size: s.hf_cache.size, color: '#14374E', type: null},
    ];

    var maxSize = Math.max.apply(null, categories.map(function(c) { return c.size; })) || 1;
    var chartHtml = '';
    categories.forEach(function(c) {
      if (c.size === 0 && !c.type) return;
      var pct = Math.max(1, Math.round((c.size / maxSize) * 100));
      chartHtml += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px;">' +
        '<span style="width:80px;color:var(--text-muted,#a0a0a0);text-align:right;">' + c.name + '</span>' +
        '<div style="flex:1;height:16px;background:var(--bg-primary,#0A1F2E);border-radius:3px;overflow:hidden;">' +
          '<div style="height:100%;width:' + pct + '%;background:' + c.color + ';border-radius:3px;transition:width 0.3s;"></div>' +
        '</div>' +
        '<span style="width:70px;color:var(--text-secondary,#B0CCCC);font-variant-numeric:tabular-nums;">' + formatBytes(c.size) + '</span>' +
      '</div>';
    });
    document.getElementById('storageChart').innerHTML = chartHtml;

    var rowsHtml = '';
    categories.forEach(function(c) {
      if (c.size === 0 && !c.type) return;
      rowsHtml += '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border-subtle,#0E2A3D);font-size:12px;">' +
        '<div><span style="color:var(--text-primary,#E0F0F0);">' + c.name + '</span>' +
          (c.count != null ? ' <span style="color:var(--text-dim,#888);">(' + c.count.toLocaleString() + ' files)</span>' : '') +
        '</div><div style="display:flex;align-items:center;gap:8px;">' +
          '<span style="color:var(--text-secondary,#B0CCCC);font-variant-numeric:tabular-nums;">' + formatBytes(c.size) + '</span>';
      if (c.type) {
        rowsHtml += '<button onclick="clearStorageCache(\'' + c.type + '\')" ' +
          'style="background:none;color:var(--danger,#e74c3c);border:1px solid var(--danger,#e74c3c);border-radius:3px;padding:2px 8px;font-size:11px;cursor:pointer;"' +
          (c.size === 0 ? ' disabled style="opacity:0.3;"' : '') + '>Clear</button>';
      }
      rowsHtml += '</div></div>';
    });
    document.getElementById('storageRows').innerHTML = rowsHtml;
  } catch(e) {
    document.getElementById('storageChart').innerHTML = '<span style="color:var(--danger,#e74c3c);font-size:12px;">Failed to load storage info</span>';
  }
}

async function clearStorageCache(type) {
  var labels = {thumbnails: 'thumbnails', previews: 'previews', embeddings: 'label embeddings'};
  if (!confirm('Clear all cached ' + (labels[type] || type) + '? They will be regenerated as needed.')) return;
  await fetch('/api/storage/clear', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({type: type}),
  });
  loadStoragePanel();
}
</script>
</body>
</html>
