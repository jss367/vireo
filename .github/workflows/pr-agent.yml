name: PR Agent

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ═══════════════════════════════════════════════════════════
  #  ACTIVATE — /claude-fix comment on a PR
  # ═══════════════════════════════════════════════════════════
  activate:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request
      && contains(github.event.comment.body, '/claude-fix')
    runs-on: ubuntu-latest
    steps:
      - name: Add claude-agent label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --add-label claude-agent

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install test dependencies
        run: pip install flask Pillow pytest imagehash

      - name: Address review comments
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a PR fix agent for the Vireo repository.

            PR #${{ github.event.issue.number }} has review comments that need to be addressed.

            ## Steps

            1. Read the PR and all review comments:
               gh pr view ${{ github.event.issue.number }} --json title,body,headRefName,baseRefName,reviews,comments
               gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}/comments

            2. Read the PR diff to understand current changes:
               gh pr diff ${{ github.event.issue.number }}

            3. Create a new branch from the PR's head:
               HEAD=$(gh pr view ${{ github.event.issue.number }} --json headRefName -q .headRefName)
               git checkout $HEAD
               git checkout -b ${HEAD}-fix-${{ github.run_number }}

            4. Make ALL changes requested in the review comments.

            5. Run tests:
               python -m pytest tests/test_workspaces.py vireo/tests/test_db.py vireo/tests/test_app.py vireo/tests/test_photos_api.py vireo/tests/test_edits_api.py vireo/tests/test_jobs_api.py vireo/tests/test_darktable_api.py vireo/tests/test_config.py -v

            6. Commit with a descriptive message.

            7. Push and create a new PR:
               git push -u origin ${HEAD}-fix-${{ github.run_number }}
               gh pr create \
                 --base $HEAD \
                 --title "fix: address review on #${{ github.event.issue.number }}" \
                 --body "Parent PR: #${{ github.event.issue.number }}

               Addresses review feedback from #${{ github.event.issue.number }}.

               ---
               Generated by PR Agent"

            8. Add label to the new PR:
               NEW_PR=$(gh pr view --json number -q .number)
               gh pr edit $NEW_PR --add-label claude-agent

            ## Rules
            - Create a NEW branch and NEW PR. Never push to the existing branch.
            - Target the new PR at the current PR's HEAD branch, not main.
            - Run tests before committing. Fix any failures.
            - Include "Parent PR: #N" on its own line in the PR body.
