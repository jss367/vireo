name: PR Agent

# Forwards PR events to the Vireo PR Fix Agent Claude Code routine
# (claude.ai/code/routines). The LLM work runs there, not here; this
# workflow classifies events and fires the routine with a text payload.
# See docs/pr-agent-routine.md for setup.
#
# Pure-bash merge jobs run here because they do not need an LLM.

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  push:
    branches: [main]
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: pr-agent-${{ github.event.pull_request.number || github.event.issue.number || github.sha }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  pull-requests: write
  issues: write

env:
  TRUSTED_ACTORS: "jss367 chatgpt-codex-connector[bot]"
  AGENT_LABEL: claude-agent

jobs:
  # Activate on /claude-fix comment on a PR.
  activate:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request
      && contains(github.event.comment.body, '/claude-fix')
      && (github.event.comment.author_association == 'OWNER'
          || github.event.comment.author_association == 'COLLABORATOR'
          || github.actor == 'chatgpt-codex-connector[bot]')
    runs-on: ubuntu-latest
    steps:
      - name: Add agent label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.issue.number }}
        run: |
          gh label create "$AGENT_LABEL" \
            --repo "$REPO" \
            --color 5319e7 \
            --description "PRs handled by the Claude PR agent" \
            || true
          gh pr edit "$PR" --repo "$REPO" --add-label "$AGENT_LABEL"

      - uses: actions/checkout@v4

      - name: Fire routine
        uses: ./.github/actions/fire-routine
        with:
          url: ${{ secrets.CLAUDE_ROUTINE_URL }}
          token: ${{ secrets.CLAUDE_ROUTINE_TOKEN }}
          allow-missing: "true"
          payload: |
            Task: address-review
            PR: ${{ github.event.issue.number }}
            Review author: ${{ github.event.comment.user.login }}
            Review body:
            Reviewer invoked /claude-fix. Read every outstanding review
            and comment on the PR and address all of them.

  # Route regular trusted comments on agent PRs back to the routine.
  fix-comment-feedback:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request
      && github.event.issue.state == 'open'
      && contains(github.event.issue.labels.*.name, 'claude-agent')
      && !contains(github.event.comment.body, '/claude-fix')
      && github.event.comment.body != '+1'
      && github.event.comment.body != '👍'
      && (github.event.comment.author_association == 'OWNER'
          || github.event.comment.author_association == 'COLLABORATOR'
          || github.actor == 'chatgpt-codex-connector[bot]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fire routine
        uses: ./.github/actions/fire-routine
        with:
          url: ${{ secrets.CLAUDE_ROUTINE_URL }}
          token: ${{ secrets.CLAUDE_ROUTINE_TOKEN }}
          allow-missing: "true"
          payload: |
            Task: address-comment
            PR: ${{ github.event.issue.number }}
            Comment author: ${{ github.event.comment.user.login }}
            Comment body:
            ${{ github.event.comment.body }}

  # Route non-approval reviews on agent PRs back to the routine.
  fix-comments:
    if: >-
      github.event_name == 'pull_request_review'
      && github.event.review.state != 'approved'
      && contains(github.event.pull_request.labels.*.name, 'claude-agent')
      && (github.event.review.author_association == 'OWNER'
          || github.event.review.author_association == 'COLLABORATOR'
          || github.actor == 'chatgpt-codex-connector[bot]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for open review threads
        id: threads
        uses: ./.github/actions/has-open-threads
        with:
          repo: ${{ github.repository }}
          pr: ${{ github.event.pull_request.number }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # A non-empty review body from a human reviewer carries actionable
      # feedback even when no inline threads exist, so fire on body in that
      # case. Codex's review body is always the stock template and carries
      # no signal — its findings come as inline comments handled by the
      # thread gate — so skip body-firing when the actor is the Codex bot.
      - name: Check for actionable review body
        id: body
        env:
          REVIEW_BODY: ${{ github.event.review.body }}
          REVIEW_ACTOR: ${{ github.actor }}
        shell: bash
        run: |
          if [[ -n "$REVIEW_BODY" && "$REVIEW_ACTOR" != "chatgpt-codex-connector[bot]" ]]; then
            echo "has_actionable_body=true" >> "$GITHUB_OUTPUT"
            echo "Review by ${REVIEW_ACTOR} has a non-empty body; will fire routine."
          else
            echo "has_actionable_body=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fire routine
        if: steps.threads.outputs.needs_response == 'true' || steps.body.outputs.has_actionable_body == 'true'
        uses: ./.github/actions/fire-routine
        with:
          url: ${{ secrets.CLAUDE_ROUTINE_URL }}
          token: ${{ secrets.CLAUDE_ROUTINE_TOKEN }}
          allow-missing: "true"
          payload: |
            Task: address-review
            PR: ${{ github.event.pull_request.number }}
            Review author: ${{ github.event.review.user.login }}
            Review state: ${{ github.event.review.state }}
            Review body:
            ${{ github.event.review.body }}

  # Route Codex connector reviews on non-agent PRs to the routine, then
  # the routine labels the PR so follow-up comments keep routing back.
  codex-review:
    if: >-
      github.event_name == 'pull_request_review'
      && github.event.review.state != 'approved'
      && github.actor == 'chatgpt-codex-connector[bot]'
      && !contains(github.event.pull_request.labels.*.name, 'claude-agent')
    runs-on: ubuntu-latest
    steps:
      - name: Skip fork PRs
        id: fork-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          pr_repo=$(gh pr view "$PR" \
            --repo "$REPO" \
            --json headRepositoryOwner,headRepository \
            --jq '.headRepositoryOwner.login + "/" + .headRepository.name')

          if [[ "$pr_repo" != "$REPO" ]]; then
            echo "PR is from fork ${pr_repo}; skipping."
            echo "is_fork=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.fork-check.outputs.is_fork == 'false'

      - name: Check for open review threads
        id: threads
        if: steps.fork-check.outputs.is_fork == 'false'
        uses: ./.github/actions/has-open-threads
        with:
          repo: ${{ github.repository }}
          pr: ${{ github.event.pull_request.number }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fire routine
        if: steps.fork-check.outputs.is_fork == 'false' && steps.threads.outputs.needs_response == 'true'
        uses: ./.github/actions/fire-routine
        with:
          url: ${{ secrets.CLAUDE_ROUTINE_URL }}
          token: ${{ secrets.CLAUDE_ROUTINE_TOKEN }}
          allow-missing: "true"
          payload: |
            Task: address-codex-review
            PR: ${{ github.event.pull_request.number }}
            Review state: ${{ github.event.review.state }}
            Review body:
            ${{ github.event.review.body }}

  # Auto-fix when the Tests workflow fails on a PR.
  fix-ci:
    if: >-
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'failure'
      && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Get PR number and check for loops
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_PULL_REQUESTS: ${{ toJson(github.event.workflow_run.pull_requests) }}
        run: |
          pr_number=$(jq -r '.[0].number // empty' <<< "$WORKFLOW_RUN_PULL_REQUESTS")

          if [[ -z "$pr_number" ]]; then
            echo "No triggering PR found in workflow_run payload."
            echo "should_fix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_repo=$(gh pr view "$pr_number" --repo "${{ github.repository }}" \
            --json headRepositoryOwner,headRepository \
            --jq '.headRepositoryOwner.login + "/" + .headRepository.name')

          if [[ "$pr_repo" != "${{ github.repository }}" ]]; then
            echo "PR #${pr_number} is from fork ${pr_repo}; skipping."
            echo "should_fix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          head_sha=$(gh pr view "$pr_number" --repo "${{ github.repository }}" \
            --json headRefOid \
            --jq '.headRefOid')
          commit=$(gh api "repos/${{ github.repository }}/commits/${head_sha}")
          commit_msg=$(jq -r '.commit.message' <<< "$commit")

          if grep -Fq "[pr-agent-fix-ci:${pr_number}]" <<< "$commit_msg"; then
            echo "PR head commit was already a CI fix attempt; not retrying."
            echo "should_fix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Will attempt to fix CI for PR #${pr_number}"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "should_fix=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.pr.outputs.should_fix == 'true'

      - name: Fire routine
        if: steps.pr.outputs.should_fix == 'true'
        uses: ./.github/actions/fire-routine
        with:
          url: ${{ secrets.CLAUDE_ROUTINE_URL }}
          token: ${{ secrets.CLAUDE_ROUTINE_TOKEN }}
          allow-missing: "true"
          payload: |
            Task: fix-ci
            PR: ${{ steps.pr.outputs.pr_number }}
            Workflow run: ${{ github.event.workflow_run.id }}

  # Ask the routine to resolve conflicts after main moves.
  resolve-conflicts:
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Find conflicting agent PRs
        id: conflicts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prs=$(gh pr list \
            --repo "${{ github.repository }}" \
            --label "$AGENT_LABEL" \
            --state open \
            --limit 1000 \
            --json number \
            --jq '.[].number')

          conflicting_prs=""
          for pr in $prs; do
            mergeable="UNKNOWN"
            for attempt in 1 2 3 4 5 6; do
              mergeable=$(gh pr view "$pr" \
                --repo "${{ github.repository }}" \
                --json mergeable \
                --jq '.mergeable')

              if [[ "$mergeable" != "UNKNOWN" ]]; then
                break
              fi

              echo "PR #${pr}: mergeability UNKNOWN on attempt ${attempt}; waiting."
              sleep 10
            done

            if [[ "$mergeable" == "CONFLICTING" || "$mergeable" == "UNKNOWN" ]]; then
              echo "PR #${pr}: mergeability ${mergeable}; sending to routine."
              conflicting_prs="${conflicting_prs} ${pr}"
            fi
          done

          prs=$(echo "$conflicting_prs" | xargs)

          if [[ -z "$prs" ]]; then
            echo "No conflicting PRs found."
            echo "has_conflicts=false" >> "$GITHUB_OUTPUT"
          else
            pr_csv=$(echo "$prs" | tr ' ' ',')
            echo "Conflicting PRs: $pr_csv"
            echo "has_conflicts=true" >> "$GITHUB_OUTPUT"
            echo "pr_csv=$pr_csv" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.conflicts.outputs.has_conflicts == 'true'

      - name: Fire routine
        if: steps.conflicts.outputs.has_conflicts == 'true'
        uses: ./.github/actions/fire-routine
        with:
          url: ${{ secrets.CLAUDE_ROUTINE_URL }}
          token: ${{ secrets.CLAUDE_ROUTINE_TOKEN }}
          allow-missing: "true"
          payload: |
            Task: resolve-conflicts
            PRs: ${{ steps.conflicts.outputs.pr_csv }}

  # Enable squash auto-merge after an approving review on an agent PR.
  merge-on-approval:
    if: >-
      github.event_name == 'pull_request_review'
      && github.event.review.state == 'approved'
      && contains(github.event.pull_request.labels.*.name, 'claude-agent')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Squash-merge approved PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REVIEW_AUTHOR: ${{ github.event.review.user.login }}
        run: |
          if [[ " $TRUSTED_ACTORS " != *" $REVIEW_AUTHOR "* ]]; then
            echo "PR #${PR}: approval from ${REVIEW_AUTHOR} is not in TRUSTED_ACTORS; skipping auto-merge."
            exit 0
          fi

          base=$(gh pr view "$PR" --repo "$REPO" --json baseRefName -q .baseRefName)
          head=$(gh pr view "$PR" --repo "$REPO" --json headRefName -q .headRefName)
          pr_repo=$(gh pr view "$PR" --repo "$REPO" \
            --json headRepositoryOwner,headRepository \
            --jq '.headRepositoryOwner.login + "/" + .headRepository.name')

          if [[ "$pr_repo" != "$REPO" ]]; then
            echo "PR #${PR}: from fork ${pr_repo}; skipping auto-merge."
            exit 0
          fi

          if [[ "$base" != "main" ]]; then
            gh pr comment "$PR" --repo "$REPO" --body "Auto-merge skipped: PR targets \`$base\` instead of \`main\`. Stacked PRs must be merged manually from leaf to root."
            exit 0
          fi

          children=$(gh pr list --repo "$REPO" --base "$head" --state open --json number -q 'length')
          if [[ "$children" -gt 0 ]]; then
            gh pr comment "$PR" --repo "$REPO" --body "Auto-merge skipped: open child PRs still target \`$head\`. Resolve or close children first, then re-approve."
            exit 0
          fi

          title=$(gh pr view "$PR" --repo "$REPO" --json title -q .title)
          gh pr merge "$PR" --repo "$REPO" --squash --auto --delete-branch \
            --match-head-commit "$HEAD_SHA" \
            --subject "${title} (#${PR})"
          echo "Auto-merge enabled on PR #${PR}. GitHub will merge when CI passes."

  # Enable squash auto-merge after a trusted thumbs-up comment on an agent PR.
  merge-on-thumbsup:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request
      && (github.event.comment.body == '+1'
          || github.event.comment.body == '👍')
      && contains(github.event.issue.labels.*.name, 'claude-agent')
      && (github.event.comment.author_association == 'OWNER'
          || github.event.comment.author_association == 'COLLABORATOR'
          || github.actor == 'chatgpt-codex-connector[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Squash-merge approved PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.issue.number }}
        run: |
          base=$(gh pr view "$PR" --repo "$REPO" --json baseRefName -q .baseRefName)
          head=$(gh pr view "$PR" --repo "$REPO" --json headRefName -q .headRefName)
          head_sha=$(gh pr view "$PR" --repo "$REPO" --json headRefOid -q .headRefOid)
          pr_repo=$(gh pr view "$PR" --repo "$REPO" \
            --json headRepositoryOwner,headRepository \
            --jq '.headRepositoryOwner.login + "/" + .headRepository.name')

          if [[ "$pr_repo" != "$REPO" ]]; then
            echo "PR #${PR}: from fork ${pr_repo}; skipping auto-merge."
            exit 0
          fi

          if [[ "$base" != "main" ]]; then
            gh pr comment "$PR" --repo "$REPO" --body "Auto-merge skipped: PR targets \`$base\` instead of \`main\`. Stacked PRs must be merged manually from leaf to root."
            exit 0
          fi

          children=$(gh pr list --repo "$REPO" --base "$head" --state open --json number -q 'length')
          if [[ "$children" -gt 0 ]]; then
            gh pr comment "$PR" --repo "$REPO" --body "Auto-merge skipped: open child PRs still target \`$head\`. Resolve or close children first, then re-approve."
            exit 0
          fi

          title=$(gh pr view "$PR" --repo "$REPO" --json title -q .title)
          gh pr merge "$PR" --repo "$REPO" --squash --auto --delete-branch \
            --match-head-commit "$head_sha" \
            --subject "${title} (#${PR})"
          echo "Auto-merge enabled on PR #${PR}. GitHub will merge when CI passes."

  # Poll for +1 reactions from trusted actors. This catches reaction events
  # because GitHub Actions does not expose an issue reaction trigger.
  merge-on-reaction:
    if: >-
      github.event_name == 'schedule'
      || github.event_name == 'workflow_dispatch'
      || (github.event_name == 'workflow_run'
          && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Find approved open PRs
        id: approved
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prs=$(gh pr list --repo "${{ github.repository }}" \
            --state open \
            --label "$AGENT_LABEL" \
            --limit 1000 \
            --json number -q '.[].number')

          if [[ -z "$prs" ]]; then
            echo "No open PRs."
            echo "has_approved=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          approved_prs=""
          for pr in $prs; do
            latest_pr_update=$(gh pr view "$pr" --repo "${{ github.repository }}" \
              --json updatedAt --jq '.updatedAt')

            reaction_match=$(gh api --paginate "repos/${{ github.repository }}/issues/${pr}/reactions" \
              | jq -s --arg cutoff "$latest_pr_update" \
                '[.[][] | select(.content == "+1" and .created_at > $cutoff) | .user.login]')

            for actor in $TRUSTED_ACTORS; do
              if echo "$reaction_match" | jq -e "index(\"$actor\")" > /dev/null 2>&1; then
                echo "PR #${pr} has +1 from ${actor} after latest PR update (${latest_pr_update})"
                approved_prs="${approved_prs} ${pr}"
                break
              fi
            done
          done

          approved_prs=$(echo "$approved_prs" | xargs)
          if [[ -z "$approved_prs" ]]; then
            echo "No PRs with trusted +1 reactions."
            echo "has_approved=false" >> "$GITHUB_OUTPUT"
          else
            echo "Approved PRs: $approved_prs"
            echo "has_approved=true" >> "$GITHUB_OUTPUT"
            echo "pr_numbers=$approved_prs" >> "$GITHUB_OUTPUT"
          fi

      - name: Squash-merge each approved PR
        if: steps.approved.outputs.has_approved == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          for pr in ${{ steps.approved.outputs.pr_numbers }}; do
            echo "=== Processing PR #${pr} ==="
            base=$(gh pr view "$pr" --repo "$REPO" --json baseRefName -q .baseRefName)
            head=$(gh pr view "$pr" --repo "$REPO" --json headRefName -q .headRefName)
            head_sha=$(gh pr view "$pr" --repo "$REPO" --json headRefOid -q .headRefOid)
            pr_repo=$(gh pr view "$pr" --repo "$REPO" \
              --json headRepositoryOwner,headRepository \
              --jq '.headRepositoryOwner.login + "/" + .headRepository.name')

            if [[ "$pr_repo" != "$REPO" ]]; then
              echo "PR #${pr}: from fork ${pr_repo}; skipping auto-merge."
              continue
            fi

            if [[ "$base" != "main" ]]; then
              echo "PR #${pr}: targets '${base}' not 'main'; skipping."
              continue
            fi

            children=$(gh pr list --repo "$REPO" --base "$head" --state open --json number -q 'length')
            if [[ "$children" -gt 0 ]]; then
              echo "PR #${pr}: ${children} open child PR(s) target '${head}'; skipping."
              continue
            fi

            title=$(gh pr view "$pr" --repo "$REPO" --json title -q .title)
            gh pr merge "$pr" --repo "$REPO" --squash --auto --delete-branch \
              --match-head-commit "$head_sha" \
              --subject "${title} (#${pr})" \
              || echo "WARNING: Auto-merge failed for PR #${pr}"
          done
