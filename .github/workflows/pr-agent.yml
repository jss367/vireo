name: PR Agent

# Forwards PR events to the "Vireo PR Fix Agent" Claude Code routine
# (claude.ai/code/routines). The LLM work runs there, not here — this
# workflow only classifies events and fires the routine with a text
# payload. See docs/pr-agent-routine.md for setup.
#
# Pure-bash merge jobs (merge-on-approval, merge-on-thumbsup,
# merge-on-reaction) still run here because they don't need an LLM.

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  push:
    branches: [main]
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: pr-agent-${{ github.event.pull_request.number || github.event.issue.number || github.sha }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ═══════════════════════════════════════════════════════════
  #  ACTIVATE — /claude-fix comment on a PR
  # ═══════════════════════════════════════════════════════════
  activate:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request
      && contains(github.event.comment.body, '/claude-fix')
      && (github.event.comment.author_association == 'OWNER'
          || github.event.comment.author_association == 'COLLABORATOR'
          || github.actor == 'chatgpt-codex-connector[bot]')
    runs-on: ubuntu-latest
    steps:
      - name: Add claude-agent label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --add-label claude-agent

      - uses: actions/checkout@v4
      - name: Fire routine
        uses: ./.github/actions/fire-routine
        with:
          url: ${{ secrets.CLAUDE_ROUTINE_URL }}
          token: ${{ secrets.CLAUDE_ROUTINE_TOKEN }}
          payload: |
            Task: address-review
            PR: ${{ github.event.issue.number }}
            Review author: ${{ github.event.comment.user.login }}
            Review body:
            Reviewer invoked /claude-fix. Read every outstanding review
            and comment on the PR and address all of them.

  # ═══════════════════════════════════════════════════════════
  #  FIX COMMENT FEEDBACK — regular comment on a claude-agent PR
  # ═══════════════════════════════════════════════════════════
  fix-comment-feedback:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request
      && github.event.issue.state == 'open'
      && contains(github.event.issue.labels.*.name, 'claude-agent')
      && !contains(github.event.comment.body, '/claude-fix')
      && !contains(github.event.comment.body, '👍')
      && (github.event.comment.author_association == 'OWNER'
          || github.event.comment.author_association == 'COLLABORATOR'
          || github.actor == 'chatgpt-codex-connector[bot]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fire routine
        uses: ./.github/actions/fire-routine
        with:
          url: ${{ secrets.CLAUDE_ROUTINE_URL }}
          token: ${{ secrets.CLAUDE_ROUTINE_TOKEN }}
          payload: |
            Task: address-comment
            PR: ${{ github.event.issue.number }}
            Comment author: ${{ github.event.comment.user.login }}
            Comment body:
            ${{ github.event.comment.body }}

  # ═══════════════════════════════════════════════════════════
  #  FIX COMMENTS — review submitted on a claude-agent PR
  # ═══════════════════════════════════════════════════════════
  fix-comments:
    if: >-
      github.event_name == 'pull_request_review'
      && github.event.review.state != 'approved'
      && contains(github.event.pull_request.labels.*.name, 'claude-agent')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fire routine
        uses: ./.github/actions/fire-routine
        with:
          url: ${{ secrets.CLAUDE_ROUTINE_URL }}
          token: ${{ secrets.CLAUDE_ROUTINE_TOKEN }}
          payload: |
            Task: address-review
            PR: ${{ github.event.pull_request.number }}
            Review author: ${{ github.event.review.user.login }}
            Review state: ${{ github.event.review.state }}
            Review body:
            ${{ github.event.review.body }}

  # ═══════════════════════════════════════════════════════════
  #  CODEX REVIEW — codex connect reviews on non-agent PRs
  # ═══════════════════════════════════════════════════════════
  codex-review:
    if: >-
      github.event_name == 'pull_request_review'
      && github.event.review.state != 'approved'
      && github.actor == 'chatgpt-codex-connector[bot]'
      && !contains(github.event.pull_request.labels.*.name, 'claude-agent')
    runs-on: ubuntu-latest
    steps:
      - name: Skip fork PRs
        id: fork-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_repo=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo "${{ github.repository }}" \
            --json headRepositoryOwner,headRepository \
            --jq '.headRepositoryOwner.login + "/" + .headRepository.name')

          if [[ "$pr_repo" != "${{ github.repository }}" ]]; then
            echo "PR is from fork ${pr_repo} — skipping."
            echo "is_fork=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.fork-check.outputs.is_fork == 'false'

      - name: Fire routine
        if: steps.fork-check.outputs.is_fork == 'false'
        uses: ./.github/actions/fire-routine
        with:
          url: ${{ secrets.CLAUDE_ROUTINE_URL }}
          token: ${{ secrets.CLAUDE_ROUTINE_TOKEN }}
          payload: |
            Task: address-codex-review
            PR: ${{ github.event.pull_request.number }}
            Review state: ${{ github.event.review.state }}
            Review body:
            ${{ github.event.review.body }}

  # ═══════════════════════════════════════════════════════════
  #  FIX CI — auto-fix when Tests workflow fails on a PR
  # ═══════════════════════════════════════════════════════════
  fix-ci:
    if: >-
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'failure'
      && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Get PR number and check for loops
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" \
            --jq '.[0].number // empty')

          if [[ -z "$pr_number" ]]; then
            echo "No PR found for this workflow run."
            echo "should_fix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_repo=$(gh pr view "$pr_number" --repo "${{ github.repository }}" \
            --json headRepositoryOwner,headRepository \
            --jq '.headRepositoryOwner.login + "/" + .headRepository.name')

          if [[ "$pr_repo" != "${{ github.repository }}" ]]; then
            echo "PR #${pr_number} is from fork ${pr_repo} — skipping."
            echo "should_fix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          last_msg=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}" \
            --jq '.commit.message' | head -1)

          if [[ "$last_msg" == "fix: resolve CI failures"* ]]; then
            echo "Last commit was already a CI fix attempt — not retrying."
            echo "should_fix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Will attempt to fix CI for PR #${pr_number}"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "should_fix=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.pr.outputs.should_fix == 'true'

      - name: Fire routine
        if: steps.pr.outputs.should_fix == 'true'
        uses: ./.github/actions/fire-routine
        with:
          url: ${{ secrets.CLAUDE_ROUTINE_URL }}
          token: ${{ secrets.CLAUDE_ROUTINE_TOKEN }}
          payload: |
            Task: fix-ci
            PR: ${{ steps.pr.outputs.pr_number }}
            Workflow run: ${{ github.event.workflow_run.id }}

  # ═══════════════════════════════════════════════════════════
  #  CONFLICT DETECTION — push to main
  # ═══════════════════════════════════════════════════════════
  resolve-conflicts:
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Find conflicting claude-agent PRs
        id: conflicts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prs=$(gh pr list \
            --repo ${{ github.repository }} \
            --label claude-agent \
            --state open \
            --json number,headRefName,mergeable \
            --jq '.[] | select(.mergeable == "CONFLICTING") | .number')

          if [[ -z "$prs" ]]; then
            echo "No conflicting PRs found."
            echo "has_conflicts=false" >> "$GITHUB_OUTPUT"
          else
            pr_csv=$(echo "$prs" | paste -sd, -)
            echo "Conflicting PRs: $pr_csv"
            echo "has_conflicts=true" >> "$GITHUB_OUTPUT"
            echo "pr_csv=$pr_csv" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.conflicts.outputs.has_conflicts == 'true'

      - name: Fire routine
        if: steps.conflicts.outputs.has_conflicts == 'true'
        uses: ./.github/actions/fire-routine
        with:
          url: ${{ secrets.CLAUDE_ROUTINE_URL }}
          token: ${{ secrets.CLAUDE_ROUTINE_TOKEN }}
          payload: |
            Task: resolve-conflicts
            PRs: ${{ steps.conflicts.outputs.pr_csv }}

  # ═══════════════════════════════════════════════════════════
  #  MERGE — approval or 👍 on a claude-agent PR
  # ═══════════════════════════════════════════════════════════
  merge-on-approval:
    if: >-
      github.event_name == 'pull_request_review'
      && github.event.review.state == 'approved'
      && contains(github.event.pull_request.labels.*.name, 'claude-agent')
    runs-on: ubuntu-latest
    steps:
      - name: Squash-merge approved PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          base=$(gh pr view "$PR" --repo "$REPO" --json baseRefName -q .baseRefName)
          head=$(gh pr view "$PR" --repo "$REPO" --json headRefName -q .headRefName)

          if [[ "$base" != "main" ]]; then
            gh pr comment "$PR" --repo "$REPO" --body "🤖 Auto-merge skipped: PR targets \`$base\` instead of \`main\`. Legacy stacked PRs must be merged manually from leaf to root."
            exit 0
          fi

          children=$(gh pr list --repo "$REPO" --base "$head" --label claude-agent --state open --json number -q 'length')
          if [[ "$children" -gt 0 ]]; then
            gh pr comment "$PR" --repo "$REPO" --body "🤖 Auto-merge skipped: open child PRs still target \`$head\`. Resolve or close children first, then re-approve."
            exit 0
          fi

          title=$(gh pr view "$PR" --repo "$REPO" --json title -q .title)
          gh pr merge "$PR" --repo "$REPO" --squash --auto --delete-branch \
            --subject "${title} (#${PR})"
          echo "Auto-merge enabled on PR #${PR}. GitHub will merge when CI passes."

  merge-on-thumbsup:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request
      && contains(github.event.comment.body, '👍')
      && contains(github.event.issue.labels.*.name, 'claude-agent')
      && (github.event.comment.author_association == 'OWNER'
          || github.event.comment.author_association == 'COLLABORATOR'
          || github.actor == 'chatgpt-codex-connector[bot]')
    runs-on: ubuntu-latest
    steps:
      - name: Squash-merge approved PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.issue.number }}
        run: |
          base=$(gh pr view "$PR" --repo "$REPO" --json baseRefName -q .baseRefName)
          head=$(gh pr view "$PR" --repo "$REPO" --json headRefName -q .headRefName)

          if [[ "$base" != "main" ]]; then
            gh pr comment "$PR" --repo "$REPO" --body "🤖 Auto-merge skipped: PR targets \`$base\` instead of \`main\`. Legacy stacked PRs must be merged manually from leaf to root."
            exit 0
          fi

          children=$(gh pr list --repo "$REPO" --base "$head" --label claude-agent --state open --json number -q 'length')
          if [[ "$children" -gt 0 ]]; then
            gh pr comment "$PR" --repo "$REPO" --body "🤖 Auto-merge skipped: open child PRs still target \`$head\`. Resolve or close children first, then re-approve."
            exit 0
          fi

          title=$(gh pr view "$PR" --repo "$REPO" --json title -q .title)
          gh pr merge "$PR" --repo "$REPO" --squash --auto --delete-branch \
            --subject "${title} (#${PR})"
          echo "Auto-merge enabled on PR #${PR}. GitHub will merge when CI passes."

  # ═══════════════════════════════════════════════════════════
  #  MERGE ON REACTION — poll for +1 reactions from trusted actors
  # ═══════════════════════════════════════════════════════════
  merge-on-reaction:
    if: >-
      github.event_name == 'schedule'
      || github.event_name == 'workflow_dispatch'
      || (github.event_name == 'workflow_run'
          && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Find approved open PRs
        id: approved
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TRUSTED_ACTORS="jss367 chatgpt-codex-connector[bot]"

          prs=$(gh pr list --repo "${{ github.repository }}" \
            --state open \
            --json number -q '.[].number')

          if [[ -z "$prs" ]]; then
            echo "No open PRs."
            echo "has_approved=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          approved_prs=""
          for pr in $prs; do
            last_push=$(gh pr view "$pr" --repo "${{ github.repository }}" \
              --json commits --jq '.commits[-1].committedDate')

            reaction_match=$(gh api "repos/${{ github.repository }}/issues/${pr}/reactions" \
              | jq --arg cutoff "$last_push" \
                '[.[] | select(.content == "+1" and .created_at > $cutoff) | .user.login]')

            for actor in $TRUSTED_ACTORS; do
              if echo "$reaction_match" | jq -e "index(\"$actor\")" > /dev/null 2>&1; then
                echo "PR #${pr} has +1 from ${actor} after latest push (${last_push})"
                approved_prs="${approved_prs} ${pr}"
                break
              fi
            done
          done

          approved_prs=$(echo "$approved_prs" | xargs)
          if [[ -z "$approved_prs" ]]; then
            echo "No PRs with trusted +1 reactions."
            echo "has_approved=false" >> "$GITHUB_OUTPUT"
          else
            echo "Approved PRs: $approved_prs"
            echo "has_approved=true" >> "$GITHUB_OUTPUT"
            echo "pr_numbers=$approved_prs" >> "$GITHUB_OUTPUT"
          fi

      - name: Squash-merge each approved PR
        if: steps.approved.outputs.has_approved == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          for pr in ${{ steps.approved.outputs.pr_numbers }}; do
            echo "=== Processing PR #${pr} ==="
            base=$(gh pr view "$pr" --repo "$REPO" --json baseRefName -q .baseRefName)
            head=$(gh pr view "$pr" --repo "$REPO" --json headRefName -q .headRefName)

            if [[ "$base" != "main" ]]; then
              echo "PR #${pr}: targets '${base}' not 'main' — skipping (no comment posted by scheduled poll)."
              continue
            fi

            children=$(gh pr list --repo "$REPO" --base "$head" --state open --json number -q 'length')
            if [[ "$children" -gt 0 ]]; then
              echo "PR #${pr}: ${children} open child PR(s) target '${head}' — skipping (no comment posted by scheduled poll)."
              continue
            fi

            title=$(gh pr view "$pr" --repo "$REPO" --json title -q .title)
            gh pr merge "$pr" --repo "$REPO" --squash --auto --delete-branch \
              --subject "${title} (#${pr})" \
              || echo "WARNING: Auto-merge failed for PR #${pr}"
          done
