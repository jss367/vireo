name: Build and Release

on:
  push:
    tags:
      - "v*"

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      # --- Install the Apple signing certificate ---
      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain without prompting
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add the keychain to the search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Verify the certificate is available
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      # --- Set up Python for the sidecar build ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: |
          pip install pyinstaller flask Pillow imagehash

      # --- Build and sign the sidecar ---
      - name: Build and sign sidecar
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          python scripts/build_sidecar.py

      # --- Set up Rust and Tauri ---
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      # --- Build the Tauri app (signing happens automatically) ---
      # Only pass APPLE_SIGNING_IDENTITY so Tauri signs but does not notarize.
      # The separate "Notarize DMG" step handles notarization via xcrun notarytool.
      - name: Build Tauri app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cargo tauri build

      # --- Notarize the DMG ---
      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          echo "Notarizing: $DMG_PATH"

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"

      # --- Verify ---
      - name: Verify signature and notarization
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/Vireo.app"
          DMG_PATH=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)

          echo "=== App signature ==="
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          echo ""
          echo "=== DMG notarization ==="
          spctl --assess --type open --context context:primary-signature --verbose=2 "$DMG_PATH"

          echo ""
          echo "=== Staple validation ==="
          xcrun stapler validate "$DMG_PATH"

      # --- Upload artifacts ---
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Vireo-macOS-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg

      # --- Create GitHub Release (only on tag push) ---
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG_PATH=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          TAG="${GITHUB_REF#refs/tags/}"

          gh release create "$TAG" \
            --title "Vireo $TAG" \
            --generate-notes \
            "$DMG_PATH"

      # --- Clean up keychain ---
      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
