name: Large Library Performance

on:
  schedule:
    - cron: "17 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  million-photo-library:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install Vireo
        run: pip install -e .
      - name: Enforce million-photo interactive budgets
        run: python scripts/benchmark_library.py --photos 1000000 --enforce
