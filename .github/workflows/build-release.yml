name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v0.1.0). Leave blank for artifact-only build."
        required: false
        type: string
      sign_windows_candidate:
        description: "Sign and verify Windows artifacts without publishing a release."
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: write

env:
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "20"
  # Limit parallel Rust compilation to avoid OOM on 7GB GitHub runners
  CARGO_BUILD_JOBS: "3"

jobs:
  full-e2e:
    uses: ./.github/workflows/e2e-full.yml

  build:
    needs: full-e2e
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            label: macos-arm64
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            label: windows-x86_64
          - os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            label: linux-x86_64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Version sync ──────────────────────────────────────
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v') || inputs.tag_name != ''
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ inputs.tag_name }}"
          fi
          python scripts/sync_version.py "$TAG"

      # ── Python & sidecar ──────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Windows: PyInstaller --onefile DLL loading bug with 3.14
          python-version: ${{ runner.os == 'Windows' && '3.13' || env.PYTHON_VERSION }}
          cache: pip

      - name: Install PyTorch (CPU only)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            # Default PyPI serves CPU-only builds for Mac arm64
            pip install torch torchvision
          else
            pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          fi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[dev]"

      - name: Check macOS signing environment
        if: runner.os == 'macOS'
        run: |
          echo "::group::Signing environment"
          echo "APPLE_CERTIFICATE set: ${{ secrets.APPLE_CERTIFICATE != '' }}"
          echo "APPLE_SIGNING_IDENTITY set: ${{ secrets.APPLE_SIGNING_IDENTITY != '' }}"
          echo "APPLE_ID set: ${{ secrets.APPLE_ID != '' }}"
          echo "APPLE_PASSWORD set: ${{ secrets.APPLE_PASSWORD != '' }}"
          echo "APPLE_TEAM_ID set: ${{ secrets.APPLE_TEAM_ID != '' }}"
          echo "macOS version: $(sw_vers -productVersion)"
          echo "Xcode path: $(xcode-select -p)"
          echo "codesign version: $(codesign --version 2>&1 || true)"
          echo "::endgroup::"

      - name: Build sidecar binary
        run: python scripts/build_sidecar.py --ci

      - name: Check sidecar signing status
        if: runner.os == 'macOS'
        shell: bash
        run: |
          TRIPLE=$(rustc --print host-tuple)
          SIDECAR="src-tauri/binaries/vireo-server-${TRIPLE}"
          echo "::group::Sidecar signature"
          echo "Sidecar: $SIDECAR ($(du -h "$SIDECAR" | cut -f1))"
          codesign --display --verbose=2 "$SIDECAR" 2>&1 || echo "Not signed (expected — Tauri will sign during bundling)"
          echo "::endgroup::"

      - name: Smoke-test bundled ExifTool
        if: runner.os == 'macOS' || runner.os == 'Windows'
        shell: bash
        run: |
          TRIPLE=$(rustc --print host-tuple)
          SIDECAR="src-tauri/binaries/vireo-server-${TRIPLE}"
          if [ "$RUNNER_OS" = "Windows" ]; then SIDECAR="${SIDECAR}.exe"; fi
          VERSION_OUTPUT=$("$SIDECAR" --check-exiftool)
          echo "Bundled ExifTool: $VERSION_OUTPUT"
          test "$VERSION_OUTPUT" = "13.59"

      - name: Smoke-test sidecar binary
        shell: bash
        run: |
          TRIPLE=$(rustc --print host-tuple)
          if [ "$RUNNER_OS" = "Windows" ]; then
            SIDECAR="src-tauri/binaries/vireo-server-${TRIPLE}.exe"
          else
            SIDECAR="src-tauri/binaries/vireo-server-${TRIPLE}"
          fi

          echo "Testing sidecar: $SIDECAR"
          ls -lh "$SIDECAR"

          # Start the sidecar on a random port
          PORT=18937
          "$SIDECAR" --port $PORT --no-browser --db ":memory:" &
          PID=$!

          # Wait for it to be ready (up to 30s)
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:${PORT}/api/health" > /dev/null 2>&1; then
              echo "Sidecar is healthy after ${i}s"
              kill $PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done

          echo "ERROR: Sidecar did not become healthy within 30s"
          kill $PID 2>/dev/null || true
          exit 1

      # ── Static HTML frontend ──────────────────────────────
      - name: Build static frontend
        run: python scripts/build_static.py

      # ── Node.js (for Tauri CLI) ───────────────────────────
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      # ── Rust toolchain ────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.label }}

      # ── Platform-specific system deps (Linux) ─────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # ── Swap & resource monitor (Linux only) ────────────────
      # Keep enough virtual memory for smaller runners without consuming the
      # disk space that Cargo and linuxdeploy need for AppImage staging.
      - name: Ensure bounded swap capacity
        if: runner.os == 'Linux'
        shell: bash
        run: |
          target_swap_kib=$((4 * 1024 * 1024))
          minimum_free_disk_kib=$((8 * 1024 * 1024))
          current_swap_kib=$(free -k | awk '/^Swap:/ { print $2 }')
          available_disk_kib=$(df --output=avail -k / | tail -1)

          needed_swap_kib=$((target_swap_kib - current_swap_kib))
          allocatable_disk_kib=$((available_disk_kib - minimum_free_disk_kib))

          if (( needed_swap_kib > 0 && allocatable_disk_kib >= 1024 * 1024 )); then
            swap_size_kib=$needed_swap_kib
            if (( swap_size_kib > allocatable_disk_kib )); then
              swap_size_kib=$allocatable_disk_kib
            fi

            sudo fallocate -l "${swap_size_kib}K" /swapfile-vireo
            sudo chmod 600 /swapfile-vireo
            sudo mkswap /swapfile-vireo
            sudo swapon /swapfile-vireo
          else
            echo "Runner-provided swap is sufficient, or disk space is too constrained for supplemental swap."
          fi

          echo "Swap configuration:"
          swapon --show
          free -h
          echo "Disk available after swap configuration:"
          df -h /

      - name: Start resource monitor
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "=== System info ==="
          nproc && free -h && df -h /
          # Log memory/CPU every 30s in background
          while true; do
            echo "--- $(date -u '+%H:%M:%S') ---"
            free -h | grep Mem
            free -h | grep Swap
            df -h / | tail -1
            ps -eo pid,pcpu,pmem,rss,comm --sort=-rss | head -6
            echo ""
            sleep 30
          done > /tmp/resource-monitor.log 2>&1 &
          echo $! > /tmp/resource-monitor.pid

      # ── Tauri build ───────────────────────────────────────
      # macOS: Build with signing. No fallback — if signing fails, the
      # build fails. Shipping unsigned builds causes the "damaged" error.
      - name: Build Tauri app (macOS, signed)
        if: runner.os == 'macOS'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Intentionally omitting APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID
          # so Tauri does NOT attempt notarization. We notarize the DMG
          # explicitly in the next step (Tauri only notarizes the .app,
          # which isn't sufficient for Gatekeeper on downloaded DMGs).
        with:
          tauriScript: npx tauri
          args: --target ${{ matrix.rust-target }}

      # Log what Tauri produced and how it was signed, so we have
      # full diagnostics if notarization fails or the app is "damaged".
      - name: Inspect signing after Tauri build
        if: runner.os == 'macOS'
        run: |
          APP="src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos/Vireo.app"
          DMG_DIR="src-tauri/target/${{ matrix.rust-target }}/release/bundle/dmg"
          DMG=$(find "$DMG_DIR" -name "*.dmg" 2>/dev/null | head -1 || true)

          echo "::group::Build artifacts"
          echo "--- .app bundle ---"
          if [ -d "$APP" ]; then
            echo "  Size: $(du -sh "$APP" | cut -f1)"
            echo "  Sidecar: $(ls -lh "$APP/Contents/MacOS/vireo-server" 2>/dev/null | awk '{print $5}' || echo 'NOT FOUND')"
          else
            echo "  ::error::.app not found at $APP"
          fi
          echo ""
          echo "--- DMG ---"
          if [ -n "$DMG" ]; then
            echo "  Path: $DMG"
            echo "  Size: $(du -h "$DMG" | cut -f1)"
          else
            echo "  ::error::No DMG found"
          fi
          echo "::endgroup::"

          echo "::group::.app code signature"
          codesign --display --verbose=2 "$APP" 2>&1
          echo ""
          echo "--- Deep verification ---"
          codesign --verify --deep --strict --verbose=2 "$APP" 2>&1 && echo "PASS" || echo "::warning::FAIL"
          echo "::endgroup::"

          echo "::group::Sidecar signature (inside bundle)"
          codesign --display --verbose=2 "$APP/Contents/MacOS/vireo-server" 2>&1
          echo "::endgroup::"

          echo "::group::Entitlements"
          codesign --display --entitlements - "$APP" 2>&1
          echo "::endgroup::"

      # Notarize the DMG itself (not just the .app inside it).
      # Gatekeeper checks the downloaded DMG — an unnotarized DMG
      # triggers "damaged and can't be opened" even if the .app is fine.
      - name: Notarize and staple DMG
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_DIR="src-tauri/target/${{ matrix.rust-target }}/release/bundle/dmg"
          DMG=$(find "$DMG_DIR" -name "*.dmg" 2>/dev/null | head -1 || true)
          if [ -z "$DMG" ]; then
            echo "::error::No DMG found in $DMG_DIR"
            exit 1
          fi
          echo "Submitting for notarization: $DMG"
          echo "  File: $DMG"
          echo "  Size: $(du -h "$DMG" | cut -f1)"
          echo "  SHA-256: $(shasum -a 256 "$DMG" | cut -d' ' -f1)"
          echo ""
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --verbose
          echo ""
          echo "Stapling notarization ticket to DMG..."
          xcrun stapler staple "$DMG"
          echo ""
          echo "Stapler validation:"
          xcrun stapler validate "$DMG"

      - name: Verify macOS code signing
        if: runner.os == 'macOS'
        run: |
          DMG_DIR="src-tauri/target/${{ matrix.rust-target }}/release/bundle/dmg"
          DMG=$(find "$DMG_DIR" -name "*.dmg" 2>/dev/null | head -1 || true)
          APP="src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos/Vireo.app"

          echo "::group::Final .app verification"
          codesign --verify --deep --strict --verbose=2 "$APP" 2>&1
          echo "::endgroup::"

          echo "::group::DMG Gatekeeper assessment"
          spctl --assess --type open --context context:primary-signature --verbose=2 "$DMG" 2>&1
          echo "::endgroup::"

          echo "::group::Artifact checksums (compare with release downloads)"
          echo "DMG SHA-256: $(shasum -a 256 "$DMG")"
          echo "::endgroup::"

          echo ""
          echo "=== All verifications passed ==="

      # Linux: build directly so cargo output streams to logs in real time.
      # The tauri-action is a black box — if it hangs we get no diagnostics.
      # Skip RPM — the Tauri RPM bundler hangs indefinitely on large sidecar
      # binaries (PyInstaller + PyTorch). deb + AppImage cover Linux users.
      - name: Build Tauri app (Linux direct)
        if: runner.os == 'Linux'
        shell: bash
        env:
          # Override global CARGO_BUILD_JOBS — Linux runners have only 7GB RAM
          # and linking Tauri with 3 parallel jobs can OOM even with swap.
          CARGO_BUILD_JOBS: "2"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          echo "=== Starting Tauri build at $(date -u) ==="
          cd src-tauri
          report_disk_usage() {
            echo "=== Linux build disk usage at $(date -u) ==="
            df -h /
            du -sh target 2>/dev/null || true
          }
          trap report_disk_usage EXIT
          report_disk_usage
          npx tauri build --verbose --target ${{ matrix.rust-target }} --bundles deb,appimage 2>&1
          echo "=== Tauri build finished at $(date -u) ==="

      # Decide whether this Windows build is signed. A tagged release or an
      # explicitly requested candidate is a "release build" that we sign — but
      # only when every SignPath value is present. Missing config downgrades to
      # an unsigned build (with a warning) instead of failing the release.
      - name: Determine Windows signing mode
        id: win_signing
        if: runner.os == 'Windows'
        shell: bash
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_POLICY_SLUG: ${{ vars.SIGNPATH_POLICY_SLUG }}
          SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          WINDOWS_SIGNING_PUBLISHER: ${{ vars.WINDOWS_SIGNING_PUBLISHER }}
        run: |
          # A tagged release or requested candidate is a signable release build.
          release_build=false
          if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ] || [ -n "${{ inputs.tag_name }}" ] || [ "${{ inputs.sign_windows_candidate }}" = "true" ]; then
            release_build=true
          fi

          # Signed release candidates may only be built from protected main.
          if [ "${{ inputs.sign_windows_candidate }}" = "true" ] && [ -z "${{ inputs.tag_name }}" ] && [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Signed Windows release candidates may only be built from the protected main branch"
            exit 1
          fi

          # Signing is available only when every SignPath value is present.
          signing_configured=true
          for name in SIGNPATH_API_TOKEN SIGNPATH_ORGANIZATION_ID SIGNPATH_PROJECT_SLUG SIGNPATH_POLICY_SLUG SIGNPATH_ARTIFACT_CONFIGURATION_SLUG WINDOWS_SIGNING_PUBLISHER; do
            if [ -z "${!name}" ]; then
              signing_configured=false
            fi
          done

          if [ "$release_build" = "true" ] && [ "$signing_configured" = "true" ]; then
            echo "should_sign=true" >> "$GITHUB_OUTPUT"
            echo "Windows release build: SignPath is configured — producing a SIGNED build."
          elif [ "$release_build" = "true" ]; then
            echo "should_sign=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SignPath is not configured; producing an UNSIGNED Windows release. Windows will show an 'unknown publisher' warning. Populate the SIGNPATH_* secret/variables to enable signing."
          else
            echo "should_sign=false" >> "$GITHUB_OUTPUT"
            echo "Non-release Windows build — producing an unsigned internal artifact."
          fi

      # Windows signing is best-effort: a tagged release or requested candidate
      # is signed via the split build/sign/bundle flow below ONLY when SignPath
      # is configured (see "Determine Windows signing mode"). When it isn't, the
      # release falls back to this unsigned internal-artifact path so releases
      # are never blocked on signing config — Windows just shows an "unknown
      # publisher" warning until SignPath secrets/variables are populated.
      - name: Build Tauri app (Windows internal artifact)
        id: build_windows
        if: runner.os == 'Windows' && steps.win_signing.outputs.should_sign != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npx tauri
          args: --target ${{ matrix.rust-target }}

      - name: Build Windows application binaries for signing
        if: runner.os == 'Windows' && steps.win_signing.outputs.should_sign == 'true'
        shell: bash
        run: |
          cd src-tauri
          npx tauri build --target ${{ matrix.rust-target }} --no-bundle

      - name: Stage unsigned Windows application binaries
        if: runner.os == 'Windows' && steps.win_signing.outputs.should_sign == 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force windows-binaries-unsigned | Out-Null
          Copy-Item "src-tauri/target/${{ matrix.rust-target }}/release/vireo.exe" windows-binaries-unsigned
          Copy-Item "src-tauri/binaries/vireo-server-${{ matrix.rust-target }}.exe" windows-binaries-unsigned

      - name: Upload Windows application binaries for signing
        id: upload_windows_binaries
        if: runner.os == 'Windows' && steps.win_signing.outputs.should_sign == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vireo-windows-binaries-unsigned
          path: windows-binaries-unsigned/*
          retention-days: 1

      - name: Sign Windows application binaries with SignPath
        if: runner.os == 'Windows' && steps.win_signing.outputs.should_sign == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload_windows_binaries.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: windows-binaries-signed

      - name: Install and verify signed Windows application binaries
        if: runner.os == 'Windows' && steps.win_signing.outputs.should_sign == 'true'
        shell: pwsh
        run: |
          ./scripts/verify_windows_signatures.ps1 -Root windows-binaries-signed -ExpectedPublisher '${{ vars.WINDOWS_SIGNING_PUBLISHER }}'
          $app = Get-ChildItem windows-binaries-signed -Recurse -Filter "vireo.exe" | Select-Object -First 1 -ExpandProperty FullName
          $sidecar = Get-ChildItem windows-binaries-signed -Recurse -Filter "vireo-server-${{ matrix.rust-target }}.exe" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $app -or -not $sidecar) { throw "SignPath output is missing an application binary" }
          Copy-Item $app "src-tauri/target/${{ matrix.rust-target }}/release/vireo.exe" -Force
          Copy-Item $sidecar "src-tauri/binaries/vireo-server-${{ matrix.rust-target }}.exe" -Force

      - name: Bundle signed Windows application
        if: runner.os == 'Windows' && steps.win_signing.outputs.should_sign == 'true'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd src-tauri
          npx tauri bundle --target ${{ matrix.rust-target }} --bundles nsis,msi

      # Fail loudly if the Windows build produced no installer.
      - name: Verify Windows installers
        if: runner.os == 'Windows'
        shell: bash
        env:
          BUNDLE_DIR: src-tauri/target/${{ matrix.rust-target }}/release/bundle
        run: |
          echo "Searching for installers under: $BUNDLE_DIR"

          if [[ ! -d "$BUNDLE_DIR" ]]; then
            echo "::error::Windows build produced no bundle directory ($BUNDLE_DIR). The Tauri build failed before bundling."
            exit 1
          fi

          mapfile -t INSTALLERS < <(find "$BUNDLE_DIR" \( -name '*.msi' -o -name '*.exe' \) -type f 2>/dev/null)

          if [[ ${#INSTALLERS[@]} -eq 0 ]]; then
            echo "::error::Windows build produced no .msi or .exe installer under $BUNDLE_DIR. Tauri exited but bundled nothing — refusing to ship a broken Windows release."
            echo "Bundle directory contents for diagnosis:"
            find "$BUNDLE_DIR" -type f 2>/dev/null || echo "(empty)"
            exit 1
          fi

          echo "Found ${#INSTALLERS[@]} Windows installer(s):"
          for f in "${INSTALLERS[@]}"; do
            echo "  $f ($(du -h "$f" | cut -f1))"
          done

      - name: Smoke-test unsigned Windows internal artifact
        if: runner.os == 'Windows' && steps.win_signing.outputs.should_sign != 'true'
        shell: pwsh
        run: |
          $installer = Get-ChildItem "src-tauri/target/${{ matrix.rust-target }}/release/bundle" -Recurse -Filter "*-setup.exe" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $installer) { throw "NSIS setup executable not found" }
          ./scripts/windows_package_smoke.ps1 -Installer $installer

      - name: Stage unsigned Windows installers
        if: runner.os == 'Windows' && steps.win_signing.outputs.should_sign == 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force windows-installers-unsigned | Out-Null
          Get-ChildItem "src-tauri/target/${{ matrix.rust-target }}/release/bundle" -Recurse -File |
            Where-Object { $_.Extension -in '.exe', '.msi' } |
            Copy-Item -Destination windows-installers-unsigned

      - name: Upload unsigned Windows signing input
        id: upload_windows_installers
        if: runner.os == 'Windows' && steps.win_signing.outputs.should_sign == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vireo-windows-installers-unsigned
          path: windows-installers-unsigned/*
          retention-days: 1

      - name: Sign Windows installers with SignPath
        if: runner.os == 'Windows' && steps.win_signing.outputs.should_sign == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload_windows_installers.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-windows

      - name: Verify signed Windows artifacts
        if: runner.os == 'Windows' && steps.win_signing.outputs.should_sign == 'true'
        shell: pwsh
        run: |
          ./scripts/verify_windows_signatures.ps1 -Root signed-windows -ExpectedPublisher '${{ vars.WINDOWS_SIGNING_PUBLISHER }}'

      # Authenticode changes the installer bytes, invalidating the updater
      # signatures Tauri created before SignPath. Sign the final bytes again.
      - name: Sign final Windows updater artifacts
        if: runner.os == 'Windows' && steps.win_signing.outputs.should_sign == 'true'
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) { throw "TAURI_SIGNING_PRIVATE_KEY is required" }
          Get-ChildItem signed-windows -Recurse -File |
            Where-Object { $_.Extension -in '.exe', '.msi' } |
            ForEach-Object {
              Remove-Item "$($_.FullName).sig" -ErrorAction SilentlyContinue
              npx tauri signer sign $_.FullName
              if ($LASTEXITCODE -ne 0 -or -not (Test-Path "$($_.FullName).sig")) {
                throw "Failed to create updater signature for $($_.Name)"
              }
            }

      - name: Smoke-test signed Windows artifact
        if: runner.os == 'Windows' && steps.win_signing.outputs.should_sign == 'true'
        shell: pwsh
        run: |
          $installer = Get-ChildItem signed-windows -Recurse -Filter "*-setup.exe" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $installer) { throw "Signed NSIS setup executable not found" }
          ./scripts/windows_package_smoke.ps1 -Installer $installer -RequireSignature

      # ── Dump resource monitor (Linux only) ─────────────────
      - name: Dump resource monitor log
        if: always() && runner.os == 'Linux'
        shell: bash
        run: |
          kill "$(cat /tmp/resource-monitor.pid)" 2>/dev/null || true
          echo "=== Resource usage during build ==="
          cat /tmp/resource-monitor.log

      # ── Upload artifacts ──────────────────────────────────
      - name: Upload build artifacts
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: vireo-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.tar.gz
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.tar.gz.sig
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.exe.sig
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.msi.sig
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.AppImage.sig
          if-no-files-found: warn
          retention-days: 7

      - name: Upload unsigned Windows CI artifacts
        if: runner.os == 'Windows' && steps.win_signing.outputs.should_sign != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vireo-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.exe.sig
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.msi.sig
          if-no-files-found: error
          retention-days: 7

      - name: Upload signed Windows artifacts
        if: runner.os == 'Windows' && steps.win_signing.outputs.should_sign == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.sign_windows_candidate && inputs.tag_name == '' && 'vireo-windows-x86_64-signed-candidate' || 'vireo-windows-x86_64' }}
          path: signed-windows/**/*
          if-no-files-found: error
          retention-days: 30

  # ── Release job ─────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    # Every platform, including signed Windows artifacts, must succeed.
    if: needs.build.result == 'success' && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag_name != '')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect release files
        run: |
          mkdir -p release-files
          # Drop every unsigned Windows signing-input artifact so it can't be
          # scooped into the release. The unsigned installers share filenames
          # with the SignPath-signed outputs and would otherwise overwrite them
          # (or leave signed .sig sidecars paired with unsigned installer
          # bytes); the unsigned raw binaries (vireo.exe, vireo-server-*.exe)
          # would ship alongside the signed installers.
          rm -rf artifacts/vireo-windows-installers-unsigned
          rm -rf artifacts/vireo-windows-binaries-unsigned
          # Regular installers (unique names across platforms)
          find artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.msi" -o \
            -name "*.exe" -o \
            -name "*.AppImage" -o \
            -name "*.deb" \
          \) -exec cp {} release-files/ \;

          # Updater signatures — Windows and Linux (Tauri v2 createUpdaterArtifacts mode)
          # Windows: installer .exe/.msi already copied above; copy their .sig sidecars.
          # Linux: .AppImage already copied above; copy its .sig sidecar.
          find artifacts -type f \( \
            -name "*.exe.sig" -o \
            -name "*.msi.sig" -o \
            -name "*.AppImage.sig" \
          \) -exec cp {} release-files/ \;

          # Updater artifacts — macOS (wrap in .tar.gz, rename to include arch)
          for spec in "vireo-macos-arm64:aarch64"; do
            label="${spec%%:*}"
            arch="${spec##*:}"
            src=$(find "artifacts/${label}" -name "*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
            if [ -n "$src" ]; then
              cp "$src" "release-files/Vireo_${arch}.app.tar.gz"
              cp "${src}.sig" "release-files/Vireo_${arch}.app.tar.gz.sig" 2>/dev/null || true
            fi
          done

          ls -lh release-files/

          (cd release-files && sha256sum $(find . -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' -printf '%f\n' | sort) > SHA256SUMS.txt)

      - name: Generate update manifest
        run: python3 scripts/generate_update_manifest.py "${{ steps.tag.outputs.tag }}" release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Vireo ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Update website download links ───────────────────────
  # Updates only the platforms that successfully built and produced artifacts.
  update-website:
    needs: [build, release]
    runs-on: ubuntu-latest
    if: "!cancelled() && needs.release.result == 'success' && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag_name != '')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.WEBSITE_PR_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "ver=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "ver=${{ github.event.inputs.tag_name }}" | sed 's/^v//' >> "$GITHUB_OUTPUT"
          fi

      - name: Update download links for successful platforms
        run: |
          VER="${{ steps.version.outputs.ver }}"
          # Check which artifacts exist (only uploaded by successful builds)
          ARTIFACTS=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --jq '.artifacts[].name' 2>/dev/null || true)
          echo "Available artifacts: $ARTIFACTS"
          UPDATED=false
          for artifact in $ARTIFACTS; do
            case "$artifact" in
              vireo-macos-arm64)    python scripts/sync_version.py "$VER" --platform macos-arm64 && UPDATED=true ;;
              vireo-windows-x86_64) python scripts/sync_version.py "$VER" --platform windows-x86_64 && UPDATED=true ;;
              vireo-linux-x86_64)   python scripts/sync_version.py "$VER" --platform linux-x86_64 && UPDATED=true ;;
            esac
          done
          if ! $UPDATED; then
            echo "No successful platform builds — skipping website update"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Branch protection on `main` requires the `test` check to pass, so we
      # can't push directly. Open a PR with a PAT (GITHUB_TOKEN-created PRs
      # don't trigger workflows) and enable auto-merge; deploy-website.yml
      # fires automatically on the resulting push-to-main.
      - name: Open website update PR
        run: |
          VER="${{ steps.version.outputs.ver }}"
          BRANCH="website/update-download-links-v${VER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/src/pages/download.astro
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git checkout -b "$BRANCH"
          git commit -m "website: update download links for v${VER}"
          git push -u origin "$BRANCH"
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "website: update download links for v${VER}" \
            --body "Automated update of download links following the v${VER} release. Auto-merges once required checks pass; deploy-website.yml runs on the resulting push to main.")
          gh pr merge --auto --squash --delete-branch "$PR_URL" \
            || echo "Auto-merge unavailable — PR left open for manual review: $PR_URL"
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_PR_TOKEN }}
