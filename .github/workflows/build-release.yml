name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v0.1.0). Leave blank for artifact-only build."
        required: false
        type: string

permissions:
  contents: write
  actions: write

env:
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "20"
  # Limit parallel Rust compilation to avoid OOM on 7GB GitHub runners
  CARGO_BUILD_JOBS: "3"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-15-intel
            rust-target: x86_64-apple-darwin
            label: macos-x86_64
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            label: windows-x86_64
          # - os: ubuntu-22.04
          #   rust-target: x86_64-unknown-linux-gnu
          #   label: linux-x86_64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Version sync ──────────────────────────────────────
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v') || inputs.tag_name != ''
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ inputs.tag_name }}"
          fi
          python scripts/sync_version.py "$TAG"

      # ── Python & sidecar ──────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Windows: PyInstaller --onefile DLL loading bug with 3.14
          # macOS x86: last PyTorch x86_64 macOS wheel (2.2.2) requires Python <=3.12
          python-version: ${{ matrix.label == 'macos-x86_64' && '3.12' || (runner.os == 'Windows' && '3.13' || env.PYTHON_VERSION) }}
          cache: pip

      - name: Install PyTorch (CPU only)
        shell: bash
        run: |
          if [ "${{ matrix.label }}" = "macos-x86_64" ]; then
            # PyTorch dropped macOS x86_64 after 2.2.2 — pin to last available wheels
            pip install torch==2.2.2 torchvision==0.17.2
          elif [ "$RUNNER_OS" = "macOS" ]; then
            # Default PyPI serves CPU-only builds for Mac arm64
            pip install torch torchvision
          else
            pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          fi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[dev]"

      - name: Build sidecar binary
        run: python scripts/build_sidecar.py --ci

      - name: Smoke-test sidecar binary
        shell: bash
        run: |
          TRIPLE=$(rustc --print host-tuple)
          if [ "$RUNNER_OS" = "Windows" ]; then
            SIDECAR="src-tauri/binaries/vireo-server-${TRIPLE}.exe"
          else
            SIDECAR="src-tauri/binaries/vireo-server-${TRIPLE}"
          fi

          echo "Testing sidecar: $SIDECAR"
          ls -lh "$SIDECAR"

          # Start the sidecar on a random port
          PORT=18937
          "$SIDECAR" --port $PORT --no-browser --db ":memory:" &
          PID=$!

          # Wait for it to be ready (up to 30s)
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:${PORT}/api/health" > /dev/null 2>&1; then
              echo "Sidecar is healthy after ${i}s"
              kill $PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done

          echo "ERROR: Sidecar did not become healthy within 30s"
          kill $PID 2>/dev/null || true
          exit 1

      # ── Static HTML frontend ──────────────────────────────
      - name: Build static frontend
        run: python scripts/build_static.py

      # ── Node.js (for Tauri CLI) ───────────────────────────
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      # ── Rust toolchain ────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.label }}

      # ── Platform-specific system deps (Linux) ─────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # ── Tauri build ───────────────────────────────────────
      # Try with Apple signing on macOS. If it fails, fall back to unsigned.
      - name: Build Tauri app (with signing)
        id: tauri-signed
        if: runner.os == 'macOS'
        continue-on-error: true
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tauriScript: npx tauri
          args: --target ${{ matrix.rust-target }}

      - name: Warn if signing failed
        if: steps.tauri-signed.outcome == 'failure'
        run: echo "::warning::macOS code signing failed — building unsigned. Users will need to right-click > Open on first launch."

      - name: Build Tauri app (unsigned fallback)
        id: tauri-unsigned
        if: steps.tauri-signed.outcome == 'failure' || steps.tauri-signed.outcome == 'skipped'
        continue-on-error: true
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npx tauri
          args: --target ${{ matrix.rust-target }}

      # Verify that the main artifacts were produced even if updater
      # signing failed (DMG/MSI/AppImage/deb are built before signing).
      - name: Verify build artifacts exist
        if: steps.tauri-unsigned.outcome == 'failure'
        shell: bash
        run: |
          echo "::warning::Tauri build exited non-zero (likely updater signing failure). Checking if main artifacts were still produced..."
          FOUND=$(find src-tauri/target/${{ matrix.rust-target }}/release/bundle -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.AppImage" -o -name "*.deb" \) 2>/dev/null | head -5)
          if [ -z "$FOUND" ]; then
            echo "::error::No build artifacts found — build genuinely failed."
            exit 1
          fi
          echo "Artifacts found despite build error (updater signing likely failed):"
          echo "$FOUND"

      # ── Upload artifacts ──────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vireo-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.deb
          if-no-files-found: warn
          retention-days: 7

  # ── Release job ─────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    # Run even if some builds failed — release whatever succeeded
    if: always() && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag_name != '')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.msi" -o \
            -name "*.exe" -o \
            -name "*.AppImage" -o \
            -name "*.deb" \
          \) -exec cp {} release-files/ \;
          ls -lh release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Vireo ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Update website download links ───────────────────────
  # Updates only the platforms that successfully built and produced artifacts.
  update-website:
    needs: [build, release]
    runs-on: ubuntu-latest
    if: needs.release.result == 'success' && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag_name != '')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "ver=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "ver=${{ github.event.inputs.tag_name }}" | sed 's/^v//' >> "$GITHUB_OUTPUT"
          fi

      - name: Update download links for successful platforms
        run: |
          VER="${{ steps.version.outputs.ver }}"
          # Check which artifacts exist (only uploaded by successful builds)
          ARTIFACTS=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --jq '.artifacts[].name' 2>/dev/null || true)
          echo "Available artifacts: $ARTIFACTS"
          UPDATED=false
          for artifact in $ARTIFACTS; do
            case "$artifact" in
              vireo-macos-arm64)    python scripts/sync_version.py "$VER" --platform macos-arm64 && UPDATED=true ;;
              vireo-macos-x86_64)   python scripts/sync_version.py "$VER" --platform macos-x86_64 && UPDATED=true ;;
              vireo-windows-x86_64) python scripts/sync_version.py "$VER" --platform windows-x86_64 && UPDATED=true ;;
              vireo-linux-x86_64)   python scripts/sync_version.py "$VER" --platform linux-x86_64 && UPDATED=true ;;
            esac
          done
          if ! $UPDATED; then
            echo "No successful platform builds — skipping website update"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        id: push-website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/src/pages/download.astro
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "website: update download links for v${{ steps.version.outputs.ver }}"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger website deploy
        if: steps.push-website.outputs.pushed == 'true'
        run: gh workflow run deploy-website.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
