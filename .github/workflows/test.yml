name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pytest-timeout pytest-xdist
          pip install -e .

      # Linux is the canonical full run and enforces the coverage threshold.
      - name: Run tests with coverage (Linux)
        if: runner.os == 'Linux'
        run: python -m pytest tests/ vireo/tests/ -n auto -v --tb=short --cov=vireo --cov-report=term-missing --cov-fail-under=40

      # macOS/Windows verify platform-specific code paths. The coverage gate is
      # skipped here because POSIX-only tests don't run on Windows, which would
      # otherwise push coverage below the threshold for reasons unrelated to the change.
      # These runners are smaller/slower, so cap xdist workers at 2 to avoid OOM
      # worker crashes on the heavier ML tests.
      - name: Run tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: python -m pytest tests/ vireo/tests/ -n 2 -v --tb=short

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check vireo/ tests/
