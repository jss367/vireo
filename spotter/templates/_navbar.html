<style>
.navbar {
  background: #16213e;
  padding: 0 24px;
  display: flex;
  align-items: center;
  border-bottom: 1px solid #0f3460;
  position: sticky;
  top: 0;
  z-index: 200;
  height: 48px;
}
.navbar .brand { font-size: 16px; font-weight: 700; color: #4ecca3; margin-right: 32px; text-decoration: none; }
.navbar a {
  color: #a0a0a0;
  text-decoration: none;
  padding: 13px 14px;
  font-size: 13px;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.navbar a:hover { color: #fff; }
.navbar a.active { color: #fff; border-bottom-color: #4ecca3; }
.navbar .nav-spacer { flex: 1; }
.navbar .nav-icon {
  color: #555;
  text-decoration: none;
  font-size: 16px;
  padding: 8px;
  cursor: pointer;
  transition: color 0.15s;
  position: relative;
}
.navbar .nav-icon:hover { color: #fff; }

/* Activity indicator */
.activity-dot {
  display: none;
  position: absolute;
  top: 6px;
  right: 4px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #4ecca3;
  animation: pulse 1.5s ease-in-out infinite;
}
.activity-dot.active { display: block; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ---------- Bottom Panel ---------- */
.bottom-toggle {
  background: #0d1b2a;
  border-top: 1px solid #0f3460;
  padding: 4px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 300;
  height: 28px;
  user-select: none;
}
.bottom-toggle span { font-size: 11px; color: #555; }
.bottom-toggle:hover span { color: #888; }
.bottom-toggle .toggle-arrow {
  font-size: 10px; color: #555; transition: transform 0.2s; cursor: pointer;
}
.bottom-toggle.open .toggle-arrow { transform: rotate(180deg); }
.bottom-toggle .job-summary {
  font-size: 11px; color: #4ecca3; margin-left: 8px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
}
.bottom-toggle .job-summary.idle { color: #444; }

.bottom-panel {
  position: fixed;
  bottom: 28px;
  left: 0;
  right: 0;
  height: 0;
  background: #0d1b2a;
  border-top: 1px solid #0f3460;
  z-index: 299;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.bottom-panel.open { height: 240px; }
.bottom-panel.animating { transition: height 0.2s ease; }

/* Drag handle */
.bp-drag-handle {
  height: 4px;
  cursor: ns-resize;
  background: transparent;
  flex-shrink: 0;
  position: relative;
}
.bp-drag-handle:hover, .bp-drag-handle.dragging {
  background: #4ecca3;
}
.bp-drag-handle::before {
  content: '';
  position: absolute;
  top: -4px;
  bottom: -4px;
  left: 0;
  right: 0;
}

/* Tabs */
.bp-tabs {
  display: flex;
  border-bottom: 1px solid #0f3460;
  flex-shrink: 0;
}
.bp-tab {
  padding: 5px 16px;
  font-size: 11px;
  color: #666;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  user-select: none;
}
.bp-tab:hover { color: #ccc; }
.bp-tab.active { color: #e0e0e0; border-bottom-color: #4ecca3; }
.bp-tab .bp-tab-badge {
  margin-left: 5px; font-size: 10px; background: #0f3460;
  padding: 1px 5px; border-radius: 8px; font-variant-numeric: tabular-nums;
}

/* Tab content */
.bp-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.bp-pane { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.bp-pane.active { display: flex; }

/* Jobs tab */
.bp-jobs-toolbar {
  padding: 4px 12px; display: flex; gap: 8px; align-items: center;
  flex-shrink: 0;
}
.bp-jobs-toolbar span { font-size: 11px; color: #444; }
.bp-jobs-list {
  flex: 1; overflow-y: auto; padding: 4px 12px;
}
.bp-job {
  padding: 6px 0; border-bottom: 1px solid #0a1a35; font-size: 12px;
}
.bp-job:last-child { border-bottom: none; }
.bp-job-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
}
.bp-job-type { color: #c0c0c0; font-weight: 600; text-transform: capitalize; }
.bp-job-status { font-size: 11px; }
.bp-job-status.running { color: #4ecca3; }
.bp-job-status.completed { color: #555; }
.bp-job-status.failed { color: #e74c3c; }
.bp-job-elapsed { font-size: 11px; color: #444; margin-left: auto; font-variant-numeric: tabular-nums; }
.bp-job-progress {
  height: 3px; background: #0f3460; border-radius: 2px; overflow: hidden; margin-bottom: 3px;
}
.bp-job-progress-fill {
  height: 100%; background: #4ecca3; border-radius: 2px; transition: width 0.3s;
}
.bp-job-detail {
  font-size: 11px; color: #666;
  font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.bp-job-detail .rate { color: #4ecca3; margin-left: 8px; }
.bp-jobs-empty { font-size: 12px; color: #444; padding: 16px 0; text-align: center; }

/* Logs tab */
.bp-logs-toolbar {
  padding: 4px 12px; display: flex; gap: 8px; align-items: center;
  border-bottom: 1px solid #0f3460; flex-shrink: 0;
}
.bp-logs-toolbar select {
  background: #0f3460; color: #c0c0c0; border: 1px solid #1a3a6e;
  border-radius: 3px; padding: 2px 6px; font-size: 11px; outline: none;
}
.bp-logs-toolbar label {
  font-size: 11px; color: #555; display: flex; align-items: center; gap: 3px; cursor: pointer;
}
.bp-logs-toolbar .lp-count { font-size: 11px; color: #444; margin-left: auto; }
.bp-logs-content {
  flex: 1; overflow-y: auto; padding: 4px 12px;
  font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
  font-size: 11px; line-height: 1.5;
}
.lp-line { white-space: pre-wrap; word-break: break-all; padding: 0; }
.lp-line .lp-time { color: #444; margin-right: 6px; }
.lp-line .lp-level { margin-right: 6px; font-weight: 600; }
.lp-line.lp-DEBUG .lp-level { color: #555; }
.lp-line.lp-INFO .lp-level { color: #888; }
.lp-line.lp-WARNING .lp-level { color: #f0c040; }
.lp-line.lp-ERROR .lp-level { color: #e74c3c; }
</style>

<nav class="navbar">
  <a class="brand" href="/browse">Spotter</a>
  <a href="/browse" {% if active_page == 'browse' %}class="active"{% endif %}>Browse</a>
  <a href="/classify" {% if active_page == 'classify' %}class="active"{% endif %}>Classify</a>
  <a href="/review" {% if active_page == 'review' %}class="active"{% endif %}>Review</a>
  <a href="/import" {% if active_page == 'import' %}class="active"{% endif %}>Import</a>
  <a href="/audit" {% if active_page == 'audit' %}class="active"{% endif %}>Audit</a>
  <a href="/stats" {% if active_page == 'stats' %}class="active"{% endif %}>Stats</a>
  <a href="/settings" {% if active_page == 'settings' %}class="active"{% endif %}>Settings</a>
  <span class="nav-spacer"></span>
  <span class="nav-icon" onclick="toggleBottomPanel()" title="Toggle panel">
    &#9638;
    <span class="activity-dot" id="navActivityDot"></span>
  </span>
  <a class="nav-icon" href="/logs" title="Full log viewer">&#9776;</a>
</nav>

<!-- Bottom Panel -->
<div class="bottom-panel" id="bottomPanel">
  <div class="bp-drag-handle" id="bpDragHandle"></div>
  <div class="bp-tabs">
    <div class="bp-tab active" onclick="switchBpTab('jobs')">Jobs <span class="bp-tab-badge" id="jobsBadge">0</span></div>
    <div class="bp-tab" onclick="switchBpTab('logs')">Logs <span class="bp-tab-badge" id="logsBadge">0</span></div>
  </div>
  <div class="bp-content">
    <!-- Jobs Pane -->
    <div class="bp-pane active" id="bpJobs">
      <div class="bp-jobs-list" id="bpJobsList">
        <div class="bp-jobs-empty">No jobs running</div>
      </div>
    </div>
    <!-- Logs Pane -->
    <div class="bp-pane" id="bpLogs">
      <div class="bp-logs-toolbar">
        <select id="lpLevelFilter" onchange="lpApplyFilter()">
          <option value="DEBUG">DEBUG+</option>
          <option value="INFO" selected>INFO+</option>
          <option value="WARNING">WARNING+</option>
          <option value="ERROR">ERROR+</option>
        </select>
        <label>
          <input type="checkbox" id="lpAutoScroll" checked style="accent-color:#4ecca3;"> Auto-scroll
        </label>
        <span class="lp-count" id="lpCount">0</span>
      </div>
      <div class="bp-logs-content" id="lpContent"></div>
    </div>
  </div>
</div>
<div class="bottom-toggle" id="bottomToggle">
  <span class="toggle-arrow" id="bpArrow" onclick="toggleBottomPanel()">&#9650;</span>
  <span class="job-summary idle" id="jobSummary">No active jobs</span>
</div>

<script>
/* ---------- Bottom Panel ---------- */
(function() {
  var LEVEL_ORDER = { 'DEBUG': 0, 'INFO': 1, 'WARNING': 2, 'ERROR': 3, 'CRITICAL': 4 };
  var lpLines = [];
  var lpSource = null;
  var lpMaxLines = 200;
  var activeJobs = [];
  var currentBpTab = 'jobs';

  function init() {
    // Restore panel state and height
    if (localStorage.getItem('spotter_panel_open') === 'true') {
      var savedH = parseInt(localStorage.getItem('spotter_panel_height')) || 240;
      var panel = document.getElementById('bottomPanel');
      panel.classList.add('open');
      panel.style.height = savedH + 'px';
      document.getElementById('bottomToggle').classList.add('open');
      document.body.style.paddingBottom = (savedH + 28) + 'px';
    }
    var savedTab = localStorage.getItem('spotter_panel_tab') || 'jobs';
    switchBpTab(savedTab);

    // SSE for logs
    lpSource = new EventSource('/api/logs/stream');
    lpSource.addEventListener('log', function(e) {
      addLpLine(JSON.parse(e.data));
    });
    // Track internal navigation so we don't warn on same-site clicks
    var isInternalNav = false;
    document.addEventListener('click', function(e) {
      var link = e.target.closest('a[href]');
      if (link && link.hostname === location.hostname) {
        isInternalNav = true;
      }
    });

    window.addEventListener('beforeunload', function(e) {
      // Save logs to sessionStorage so they persist across page navigations
      try {
        sessionStorage.setItem('spotter_logs', JSON.stringify(lpLines.slice(-lpMaxLines)));
      } catch(ex) {}
      if (lpSource) { lpSource.close(); lpSource = null; }
      // Only warn on actual tab close, not internal navigation
      if (isInternalNav) { isInternalNav = false; return; }
      var running = activeJobs.filter(function(j) { return j.status === 'running'; });
      if (running.length > 0) {
        e.preventDefault();
        e.returnValue = '';
      }
    });

    // Restore logs from sessionStorage (persisted across page navigations)
    var savedLogs = [];
    try {
      var raw = sessionStorage.getItem('spotter_logs');
      if (raw) savedLogs = JSON.parse(raw);
    } catch(ex) {}

    if (savedLogs.length > 0) {
      // Use saved logs and merge with any newer server logs
      savedLogs.forEach(function(l) { addLpLine(l, true); });
      var lastTime = savedLogs[savedLogs.length - 1].time || 0;
      fetch('/api/logs/recent?count=50')
        .then(function(r) { return r.json(); })
        .then(function(logs) {
          logs.forEach(function(l) {
            if (l.time > lastTime) addLpLine(l, true);
          });
          lpApplyFilter();
        });
    } else {
      fetch('/api/logs/recent?count=50')
        .then(function(r) { return r.json(); })
        .then(function(logs) {
          logs.forEach(function(l) { addLpLine(l, true); });
          lpApplyFilter();
        });
    }

    // Poll jobs
    pollJobs();
    setInterval(pollJobs, 2000);
  }

  /* ---------- Tab switching ---------- */
  window.switchBpTab = function(tab) {
    currentBpTab = tab;
    document.querySelectorAll('.bp-tab').forEach(function(t, i) {
      t.classList.toggle('active', ['jobs', 'logs'][i] === tab);
    });
    document.querySelectorAll('.bp-pane').forEach(function(p) {
      p.classList.toggle('active', p.id === (tab === 'jobs' ? 'bpJobs' : 'bpLogs'));
    });
    localStorage.setItem('spotter_panel_tab', tab);
  };

  window.toggleBottomPanel = function() {
    var panel = document.getElementById('bottomPanel');
    var toggle = document.getElementById('bottomToggle');
    panel.classList.add('animating');
    panel.classList.toggle('open');
    toggle.classList.toggle('open');
    var isOpen = panel.classList.contains('open');
    localStorage.setItem('spotter_panel_open', isOpen);
    var h = isOpen ? (parseInt(localStorage.getItem('spotter_panel_height')) || 240) : 0;
    if (isOpen) panel.style.height = h + 'px';
    document.body.style.paddingBottom = isOpen ? (h + 28) + 'px' : '28px';
    setTimeout(function() { panel.classList.remove('animating'); }, 200);
  };

  /* ---------- Panel drag resize ---------- */
  (function() {
    var handle = document.getElementById('bpDragHandle');
    var panel = document.getElementById('bottomPanel');
    var dragging = false;
    var startY, startH;

    handle.addEventListener('mousedown', function(e) {
      dragging = true;
      startY = e.clientY;
      startH = panel.offsetHeight;
      handle.classList.add('dragging');
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
      if (!dragging) return;
      var newH = Math.max(100, Math.min(window.innerHeight - 100, startH + (startY - e.clientY)));
      panel.style.height = newH + 'px';
      document.body.style.paddingBottom = (newH + 28) + 'px';
    });

    document.addEventListener('mouseup', function() {
      if (!dragging) return;
      dragging = false;
      handle.classList.remove('dragging');
      document.body.style.userSelect = '';
      localStorage.setItem('spotter_panel_height', panel.offsetHeight);
    });
  })();

  /* ---------- Jobs polling ---------- */
  function pollJobs() {
    fetch('/api/jobs')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        activeJobs = data.active || [];
        renderJobs();
        updateSummary();
        updateActivityDot();
      })
      .catch(function() {});
  }

  function renderJobs() {
    var container = document.getElementById('bpJobsList');
    var running = activeJobs.filter(function(j) { return j.status === 'running'; });
    var recent = activeJobs.filter(function(j) { return j.status !== 'running'; }).slice(0, 5);
    var all = running.concat(recent);

    document.getElementById('jobsBadge').textContent = running.length;

    if (all.length === 0) {
      container.innerHTML = '<div class="bp-jobs-empty">No jobs running</div>';
      return;
    }

    var html = '';
    all.forEach(function(j) {
      var pct = j.progress && j.progress.total > 0 ? Math.round((j.progress.current / j.progress.total) * 100) : 0;
      var statusClass = j.status;
      var elapsed = '';
      if (j.started_at) {
        var secs = (Date.now() - new Date(j.started_at).getTime()) / 1000;
        if (j.finished_at) secs = (new Date(j.finished_at).getTime() - new Date(j.started_at).getTime()) / 1000;
        elapsed = formatElapsed(secs);
      }

      html += '<div class="bp-job">';
      html += '<div class="bp-job-header">';
      html += '<span class="bp-job-type">' + bpEscape(j.type) + '</span>';
      html += '<span class="bp-job-status ' + statusClass + '">' + j.status + '</span>';
      html += '<span class="bp-job-elapsed">' + elapsed + '</span>';
      html += '</div>';

      if (j.status === 'running') {
        html += '<div class="bp-job-progress"><div class="bp-job-progress-fill" style="width:' + pct + '%"></div></div>';
        var detail = '';
        if (j.progress && j.progress.current > 0) {
          detail = j.progress.current.toLocaleString();
          if (j.progress.total > 0) detail += ' / ' + j.progress.total.toLocaleString();
        }
        if (j.progress && j.progress.current_file) {
          detail += ' ' + bpEscape(j.progress.current_file);
        }
        html += '<div class="bp-job-detail">' + detail + '</div>';
      } else if (j.status === 'completed' && j.result) {
        var parts = [];
        for (var k in j.result) {
          var v = j.result[k];
          if (v && typeof v === 'object') {
            var sub = [];
            for (var sk in v) sub.push(sk + ': ' + v[sk]);
            parts.push(k + ' (' + sub.join(', ') + ')');
          } else {
            parts.push(k + ': ' + v);
          }
        }
        html += '<div class="bp-job-detail">' + bpEscape(parts.join(', ')) + '</div>';
      } else if (j.status === 'failed' && j.errors && j.errors.length > 0) {
        html += '<div class="bp-job-detail" style="color:#e74c3c;">' + bpEscape(j.errors[0]) + '</div>';
      }

      html += '</div>';
    });
    container.innerHTML = html;
  }

  function updateSummary() {
    var summary = document.getElementById('jobSummary');
    var running = activeJobs.filter(function(j) { return j.status === 'running'; });

    if (running.length === 0) {
      summary.textContent = 'No active jobs';
      summary.classList.add('idle');
      summary.classList.remove('active');
      return;
    }

    summary.classList.remove('idle');
    var j = running[0];
    var text = j.type;
    if (j.progress && j.progress.total > 0) {
      var pct = Math.round((j.progress.current / j.progress.total) * 100);
      text += ' ' + j.progress.current.toLocaleString() + ' / ' + j.progress.total.toLocaleString() + ' (' + pct + '%)';
    } else if (j.progress && j.progress.current_file) {
      text += ' — ' + j.progress.current_file;
    }
    if (running.length > 1) {
      text += ' + ' + (running.length - 1) + ' more';
    }
    summary.textContent = text;
  }

  function updateActivityDot() {
    var running = activeJobs.filter(function(j) { return j.status === 'running'; });
    var dot = document.getElementById('navActivityDot');
    if (dot) dot.classList.toggle('active', running.length > 0);
  }

  function formatElapsed(secs) {
    if (secs < 60) return Math.round(secs) + 's';
    if (secs < 3600) return Math.floor(secs / 60) + 'm ' + Math.round(secs % 60) + 's';
    return Math.floor(secs / 3600) + 'h ' + Math.floor((secs % 3600) / 60) + 'm';
  }

  /* ---------- Log lines ---------- */
  window.addLpLine = function(record, bulk) {
    if (lpLines.length >= lpMaxLines) {
      lpLines.shift();
      var first = document.getElementById('lpContent').firstChild;
      if (first) first.remove();
    }
    lpLines.push(record);
    var container = document.getElementById('lpContent');
    var time = new Date(record.time * 1000);
    var timeStr = time.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    var div = document.createElement('div');
    div.className = 'lp-line lp-' + record.level;
    div.dataset.level = record.level;
    div.innerHTML = '<span class="lp-time">' + timeStr + '</span>' +
      '<span class="lp-level">' + record.level + '</span>' +
      bpEscape(record.message || '');
    container.appendChild(div);
    if (!bulk) {
      var autoScroll = document.getElementById('lpAutoScroll');
      if (autoScroll && autoScroll.checked) {
        container.scrollTop = container.scrollHeight;
      }
      lpApplyFilter();
    }
    document.getElementById('lpCount').textContent = lpLines.length;
    document.getElementById('logsBadge').textContent = lpLines.length;
  };

  window.lpApplyFilter = function() {
    var minLevel = document.getElementById('lpLevelFilter').value;
    var minOrder = LEVEL_ORDER[minLevel] || 0;
    document.querySelectorAll('#lpContent .lp-line').forEach(function(el) {
      var ok = (LEVEL_ORDER[el.dataset.level] || 0) >= minOrder;
      el.style.display = ok ? '' : 'none';
    });
  };

  function bpEscape(str) {
    if (str == null) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(String(str)));
    return div.innerHTML;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
