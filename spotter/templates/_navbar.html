<style>
.navbar {
  background: #16213e;
  padding: 0 24px;
  display: flex;
  align-items: center;
  border-bottom: 1px solid #0f3460;
  position: sticky;
  top: 0;
  z-index: 200;
  height: 48px;
}
.navbar .brand { font-size: 16px; font-weight: 700; color: #4ecca3; margin-right: 32px; text-decoration: none; }
.navbar a {
  color: #a0a0a0;
  text-decoration: none;
  padding: 13px 14px;
  font-size: 13px;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.navbar a:hover { color: #fff; }
.navbar a.active { color: #fff; border-bottom-color: #4ecca3; }
.navbar .nav-spacer { flex: 1; }
.navbar .nav-icon {
  color: #555;
  text-decoration: none;
  font-size: 16px;
  padding: 8px;
  cursor: pointer;
  transition: color 0.15s;
  position: relative;
}
.navbar .nav-icon:hover { color: #fff; }

/* Activity indicator */
.activity-dot {
  display: none;
  position: absolute;
  top: 6px;
  right: 4px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #4ecca3;
  animation: pulse 1.5s ease-in-out infinite;
}
.activity-dot.active { display: block; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ---------- Log Panel (slide-out) ---------- */
.log-panel-toggle {
  background: #0d1b2a;
  border-top: 1px solid #0f3460;
  padding: 4px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 300;
  height: 28px;
  user-select: none;
}
.log-panel-toggle span { font-size: 11px; color: #555; }
.log-panel-toggle:hover span { color: #888; }
.log-panel-toggle .toggle-arrow { font-size: 10px; color: #555; transition: transform 0.2s; }
.log-panel-toggle.open .toggle-arrow { transform: rotate(180deg); }

.log-panel {
  position: fixed;
  bottom: 28px;
  left: 0;
  right: 0;
  height: 0;
  background: #0d1b2a;
  border-top: 1px solid #0f3460;
  z-index: 299;
  overflow: hidden;
  transition: height 0.2s ease;
  display: flex;
  flex-direction: column;
}
.log-panel.open { height: 220px; }
.log-panel-toolbar {
  padding: 4px 12px;
  display: flex;
  gap: 8px;
  align-items: center;
  border-bottom: 1px solid #0f3460;
  flex-shrink: 0;
}
.log-panel-toolbar select {
  background: #0f3460; color: #c0c0c0; border: 1px solid #1a3a6e;
  border-radius: 3px; padding: 2px 6px; font-size: 11px; outline: none;
}
.log-panel-toolbar .lp-count { font-size: 11px; color: #444; margin-left: auto; }
.log-panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 4px 12px;
  font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
  font-size: 11px;
  line-height: 1.5;
}
.lp-line { white-space: pre-wrap; word-break: break-all; padding: 0; }
.lp-line .lp-time { color: #444; margin-right: 6px; }
.lp-line .lp-level { margin-right: 6px; font-weight: 600; }
.lp-line.lp-DEBUG .lp-level { color: #555; }
.lp-line.lp-INFO .lp-level { color: #888; }
.lp-line.lp-WARNING .lp-level { color: #f0c040; }
.lp-line.lp-ERROR .lp-level { color: #e74c3c; }
</style>

<nav class="navbar">
  <a class="brand" href="/browse">Spotter</a>
  <a href="/browse" {% if active_page == 'browse' %}class="active"{% endif %}>Browse</a>
  <a href="/classify" {% if active_page == 'classify' %}class="active"{% endif %}>Classify</a>
  <a href="/import" {% if active_page == 'import' %}class="active"{% endif %}>Import</a>
  <a href="/audit" {% if active_page == 'audit' %}class="active"{% endif %}>Audit</a>
  <a href="/settings" {% if active_page == 'settings' %}class="active"{% endif %}>Settings</a>
  <span class="nav-spacer"></span>
  <span class="nav-icon" onclick="toggleLogPanel()" title="Toggle log panel">
    &#9638;
    <span class="activity-dot" id="navActivityDot"></span>
  </span>
  <a class="nav-icon" href="/logs" title="Full log viewer">&#9776;</a>
</nav>

<!-- Log Panel -->
<div class="log-panel" id="logPanel">
  <div class="log-panel-toolbar">
    <select id="lpLevelFilter" onchange="lpApplyFilter()">
      <option value="DEBUG">DEBUG+</option>
      <option value="INFO" selected>INFO+</option>
      <option value="WARNING">WARNING+</option>
      <option value="ERROR">ERROR+</option>
    </select>
    <span class="lp-count" id="lpCount">0</span>
  </div>
  <div class="log-panel-content" id="lpContent"></div>
</div>
<div class="log-panel-toggle" id="logPanelToggle" onclick="toggleLogPanel()">
  <span class="toggle-arrow" id="lpArrow">&#9650;</span>
  <span id="lpToggleLabel">Logs</span>
</div>

<script>
/* ---------- Log Panel ---------- */
(function() {
  var LEVEL_ORDER = { 'DEBUG': 0, 'INFO': 1, 'WARNING': 2, 'ERROR': 3, 'CRITICAL': 4 };
  var lpLines = [];
  var lpSource = null;
  var lpMaxLines = 200;

  function initLogPanel() {
    lpSource = new EventSource('/api/logs/stream');
    lpSource.addEventListener('log', function(e) {
      var record = JSON.parse(e.data);
      addLpLine(record);
    });
    // Load recent
    fetch('/api/logs/recent?count=50')
      .then(function(r) { return r.json(); })
      .then(function(logs) {
        logs.forEach(function(l) { addLpLine(l, true); });
        lpApplyFilter();
      });
    // Poll for active jobs to show activity dot
    checkActivity();
    setInterval(checkActivity, 3000);
  }

  window.addLpLine = function(record, bulk) {
    if (lpLines.length >= lpMaxLines) {
      lpLines.shift();
      var first = document.getElementById('lpContent').firstChild;
      if (first) first.remove();
    }
    lpLines.push(record);
    var container = document.getElementById('lpContent');
    var time = new Date(record.time * 1000);
    var timeStr = time.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    var div = document.createElement('div');
    div.className = 'lp-line lp-' + record.level;
    div.dataset.level = record.level;
    div.innerHTML = '<span class="lp-time">' + timeStr + '</span>' +
      '<span class="lp-level">' + record.level + '</span>' +
      lpEscape(record.message || '');
    container.appendChild(div);
    if (!bulk) {
      container.scrollTop = container.scrollHeight;
      lpApplyFilter();
    }
    document.getElementById('lpCount').textContent = lpLines.length;
  };

  window.toggleLogPanel = function() {
    var panel = document.getElementById('logPanel');
    var toggle = document.getElementById('logPanelToggle');
    panel.classList.toggle('open');
    toggle.classList.toggle('open');
  };

  window.lpApplyFilter = function() {
    var minLevel = document.getElementById('lpLevelFilter').value;
    var minOrder = LEVEL_ORDER[minLevel] || 0;
    document.querySelectorAll('#lpContent .lp-line').forEach(function(el) {
      var ok = (LEVEL_ORDER[el.dataset.level] || 0) >= minOrder;
      el.style.display = ok ? '' : 'none';
    });
  };

  window.checkActivity = function() {
    fetch('/api/jobs')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var running = (data.active || []).filter(function(j) { return j.status === 'running'; });
        var dot = document.getElementById('navActivityDot');
        if (dot) {
          dot.classList.toggle('active', running.length > 0);
        }
        var label = document.getElementById('lpToggleLabel');
        if (label) {
          label.textContent = running.length > 0 ? 'Logs (' + running.length + ' running)' : 'Logs';
        }
      })
      .catch(function() {});
  };

  function lpEscape(str) {
    if (str == null) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(String(str)));
    return div.innerHTML;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initLogPanel);
  } else {
    initLogPanel();
  }
})();
</script>
