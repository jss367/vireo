<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotter - Settings</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    padding-bottom: 36px;
  }
  .content { max-width: 800px; margin: 0 auto; padding: 32px 24px; }
  .section {
    background: #16213e; border: 1px solid #0f3460;
    border-radius: 8px; padding: 24px; margin-bottom: 24px;
  }
  .section-title {
    font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #fff;
    padding-bottom: 8px; border-bottom: 1px solid #0f3460;
  }
  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid #0a1a35;
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { font-size: 14px; color: #c0c0c0; flex: 1; }
  .setting-label small { display: block; font-size: 12px; color: #666; margin-top: 2px; }
  .setting-value { font-size: 13px; color: #888; font-variant-numeric: tabular-nums; }

  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px; margin-bottom: 16px;
  }
  .stat-card {
    background: #0f3460; border-radius: 6px; padding: 14px 16px; text-align: center;
  }
  .stat-number {
    font-size: 24px; font-weight: 700; color: #4ecca3; font-variant-numeric: tabular-nums;
  }
  .stat-label { font-size: 11px; color: #888; margin-top: 4px; }

  .history-table {
    width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 12px;
  }
  .history-table th {
    text-align: left; padding: 6px 10px; color: #666;
    font-weight: 500; border-bottom: 1px solid #0f3460;
  }
  .history-table td {
    padding: 6px 10px; border-bottom: 1px solid #0a1a35; color: #999;
  }
  .history-table .status-completed { color: #4ecca3; }
  .history-table .status-failed { color: #e74c3c; }
</style>
</head>
<body>

{% set active_page = 'settings' %}
{% include '_navbar.html' %}

<div class="content">

  <!-- Dashboard -->
  <div class="section">
    <div class="section-title">Dashboard</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="photoCount">-</div>
        <div class="stat-label">Photos</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="folderCount">-</div>
        <div class="stat-label">Folders</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="keywordCount">-</div>
        <div class="stat-label">Keywords</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="pendingCount">-</div>
        <div class="stat-label">Pending Sync</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="dbSize">-</div>
        <div class="stat-label">DB Size</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="thumbSize">-</div>
        <div class="stat-label">Thumb Cache</div>
      </div>
    </div>
  </div>

  <!-- Recent Jobs -->
  <div class="section">
    <div class="section-title">Recent Jobs</div>
    <div id="historyContent"><span style="color:#555;font-size:13px;">Loading...</span></div>
  </div>

  <!-- Database Info -->
  <div class="section">
    <div class="section-title">Storage</div>
    <div class="setting-row">
      <div class="setting-label">
        Database
        <small>~/.spotter/spotter.db</small>
      </div>
      <span class="setting-value" id="dbSizeDetail">-</span>
    </div>
    <div class="setting-row">
      <div class="setting-label">
        Thumbnail cache
        <small>~/.spotter/thumbnails/</small>
      </div>
      <span class="setting-value" id="thumbSizeDetail">-</span>
    </div>
  </div>

</div>

<script>
loadDashboard();
loadHistory();

async function loadDashboard() {
  try {
    var resp = await fetch('/api/scan/status');
    if (!resp.ok) return;
    var d = await resp.json();
    document.getElementById('photoCount').textContent = d.photo_count.toLocaleString();
    document.getElementById('folderCount').textContent = d.folder_count.toLocaleString();
    document.getElementById('keywordCount').textContent = d.keyword_count.toLocaleString();
    document.getElementById('pendingCount').textContent = d.pending_changes.toLocaleString();
    document.getElementById('dbSize').textContent = formatBytes(d.db_size);
    document.getElementById('thumbSize').textContent = formatBytes(d.thumb_cache_size);
    document.getElementById('dbSizeDetail').textContent = formatBytes(d.db_size);
    document.getElementById('thumbSizeDetail').textContent = formatBytes(d.thumb_cache_size);
  } catch(e) {}
}

function formatBytes(b) {
  if (b == null || b === 0) return '0';
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return Math.round(b / 1024) + ' KB';
  if (b < 1024 * 1024 * 1024) return (b / (1024 * 1024)).toFixed(1) + ' MB';
  return (b / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
}

async function loadHistory() {
  try {
    var resp = await fetch('/api/jobs/history?limit=10');
    var rows = await resp.json();
    if (rows.length === 0) {
      document.getElementById('historyContent').innerHTML = '<span style="color:#555;font-size:13px;">No jobs have run yet.</span>';
      return;
    }
    var html = '<table class="history-table"><thead><tr><th>Type</th><th>Status</th><th>Started</th><th>Duration</th><th>Result</th></tr></thead><tbody>';
    rows.forEach(function(r) {
      var cls = r.status === 'completed' ? 'status-completed' : r.status === 'failed' ? 'status-failed' : '';
      var started = r.started_at ? new Date(r.started_at).toLocaleString() : '-';
      var duration = r.duration != null ? r.duration.toFixed(1) + 's' : '-';
      var result = '-';
      if (r.result) {
        try {
          var parsed = typeof r.result === 'string' ? JSON.parse(r.result) : r.result;
          var parts = [];
          for (var k in parsed) parts.push(k + ': ' + parsed[k]);
          result = parts.join(', ');
        } catch(e) { result = String(r.result); }
      }
      if (r.error_count > 0) result += ' (' + r.error_count + ' errors)';
      html += '<tr><td>' + escapeHtml(r.type) + '</td><td class="' + cls + '">' + r.status + '</td>' +
        '<td>' + started + '</td><td>' + duration + '</td><td>' + escapeHtml(result) + '</td></tr>';
    });
    html += '</tbody></table>';
    document.getElementById('historyContent').innerHTML = html;
  } catch(e) {
    document.getElementById('historyContent').innerHTML = '<span style="color:#e74c3c;font-size:13px;">Failed to load</span>';
  }
}

function escapeHtml(str) {
  if (str == null) return '';
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(String(str)));
  return div.innerHTML;
}
</script>
</body>
</html>
