<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotter - Classify</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
  }

  /* ---------- Header ---------- */
  .header {
    background: #16213e;
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #0f3460;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 18px; font-weight: 600; white-space: nowrap; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .stats { font-size: 13px; color: #a0a0a0; display: flex; gap: 14px; }
  .stats .stat { white-space: nowrap; }
  .stats .new-count { color: #4ecca3; }
  .stats .ref-count { color: #f0c040; }
  .stats .dis-count { color: #e74c3c; }
  .stats .accepted-count { color: #7ec8e3; }

  /* Model selector */
  .model-selector {
    background: #0f3460;
    color: #e0e0e0;
    border: 1px solid #1a3a6e;
    border-radius: 4px;
    padding: 5px 10px;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }
  .model-selector:hover { border-color: #4ecca3; }
  .model-selector:focus { border-color: #4ecca3; }

  /* Gear icon links to /settings */
  .gear-link {
    color: #a0a0a0;
    font-size: 22px;
    padding: 4px 8px;
    line-height: 1;
    transition: color 0.15s;
    text-decoration: none;
  }
  .gear-link:hover { color: #fff; }

  /* ---------- Settings Panel (inline quick settings) ---------- */
  .settings-panel {
    display: none;
    background: #16213e;
    padding: 14px 24px;
    border-bottom: 1px solid #0f3460;
  }
  .settings-panel.open {
    display: flex;
    gap: 40px;
    align-items: center;
    flex-wrap: wrap;
  }
  .setting-group { display: flex; align-items: center; gap: 8px; }
  .setting-group label { font-size: 13px; color: #a0a0a0; white-space: nowrap; }
  .setting-group input[type=range] {
    width: 180px;
    accent-color: #4ecca3;
    cursor: pointer;
  }
  .setting-group .value {
    font-size: 13px;
    min-width: 48px;
    color: #e0e0e0;
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Category Tabs ---------- */
  .tabs {
    display: flex;
    background: #16213e;
    padding: 0 24px;
    border-bottom: 1px solid #0f3460;
    overflow-x: auto;
  }
  .tab {
    padding: 11px 18px;
    cursor: pointer;
    font-size: 13px;
    color: #a0a0a0;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .tab:hover { color: #fff; }
  .tab.active { color: #fff; border-bottom-color: #4ecca3; }
  .tab .count {
    margin-left: 6px;
    font-size: 11px;
    background: #0f3460;
    padding: 2px 7px;
    border-radius: 10px;
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Batch Action Bar ---------- */
  .batch-bar {
    padding: 10px 24px;
    background: #1a1a2e;
    border-bottom: 1px solid #0f3460;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .batch-bar button {
    padding: 6px 18px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn-batch-accept { background: #4ecca3; color: #1a1a2e; }
  .btn-batch-accept:hover { background: #3db890; }
  .btn-batch-accept:disabled { background: #2a5a4a; color: #555; cursor: default; }
  .batch-info { font-size: 13px; color: #a0a0a0; }

  /* ---------- Photo Grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--card-width, 420px), 1fr));
    gap: 16px;
    padding: 24px;
  }

  /* ---------- Photo Card ---------- */
  .card {
    background: #16213e;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #0f3460;
    transition: opacity 0.25s, transform 0.15s;
  }
  .card:hover { transform: translateY(-2px); }
  .card.accepted { opacity: 0.45; }
  .card.skipped { opacity: 0.25; }
  .card img {
    width: 100%;
    aspect-ratio: 3/2;
    object-fit: cover;
    display: block;
    background: #0f3460;
  }
  .card-body { padding: 12px 14px; }
  .card-filename {
    font-size: 12px;
    color: #777;
    margin-bottom: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Category badge */
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    margin-bottom: 8px;
    text-transform: capitalize;
  }
  .badge-new { background: #4ecca3; color: #1a1a2e; }
  .badge-refinement { background: #f0c040; color: #1a1a2e; }
  .badge-disagreement { background: #e74c3c; color: #fff; }

  /* Group badge */
  .badge-group {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    margin-bottom: 8px;
    margin-left: 6px;
    background: #0f3460;
    color: #7ec8e3;
  }

  /* Existing keywords */
  .card-existing {
    font-size: 13px;
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .card-existing .label-prefix { color: #777; }
  .card-existing .label-value { color: #c0c0c0; }

  /* Arrow for refinement */
  .refinement-arrow {
    color: #f0c040;
    margin: 0 6px;
    font-size: 14px;
  }

  /* Prediction */
  .card-prediction {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #fff;
  }

  /* Confidence bar */
  .confidence-bar {
    height: 4px;
    background: #0f3460;
    border-radius: 2px;
    margin-bottom: 4px;
    overflow: hidden;
  }
  .confidence-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }
  .card-confidence {
    font-size: 12px;
    color: #777;
    margin-bottom: 10px;
    font-variant-numeric: tabular-nums;
  }

  /* Card action buttons */
  .card-actions { display: flex; gap: 8px; }
  .card-actions button {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn-accept { background: #4ecca3; color: #1a1a2e; }
  .btn-accept:hover { background: #3db890; }
  .btn-skip { background: #2a2a3e; color: #a0a0a0; }
  .btn-skip:hover { background: #3a3a4e; }
  .btn-done {
    background: #0f3460;
    color: #4ecca3;
    cursor: default;
    text-transform: capitalize;
  }
  .btn-done.skipped-btn { color: #777; }

  /* Expand / collapse for group cards */
  .group-expand-btn {
    background: #0f3460;
    color: #7ec8e3;
    border: none;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    margin-bottom: 8px;
    transition: background 0.15s;
  }
  .group-expand-btn:hover { background: #1a4a7e; }
  .group-members {
    display: none;
    margin-top: 8px;
    border-top: 1px solid #0f3460;
    padding-top: 8px;
  }
  .group-members.open { display: block; }
  .group-member-thumb {
    display: inline-block;
    width: 80px;
    height: 54px;
    object-fit: cover;
    border-radius: 4px;
    margin: 2px;
    border: 1px solid #0f3460;
  }
  .group-member-list {
    font-size: 12px;
    color: #777;
    margin-top: 4px;
    line-height: 1.6;
  }
  .group-member-list span {
    display: inline-block;
    background: #0f3460;
    padding: 1px 6px;
    border-radius: 3px;
    margin: 2px;
  }

  /* Individual predictions breakdown for groups */
  .individual-preds {
    font-size: 12px;
    color: #888;
    margin-bottom: 6px;
  }
  .individual-preds span {
    margin-right: 10px;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 80px 24px;
    color: #555;
    font-size: 15px;
  }

  /* Loading spinner */
  .loading {
    text-align: center;
    padding: 80px 24px;
    color: #555;
    font-size: 15px;
  }

  /* Keyboard shortcut hint */
  .kbd-hint {
    font-size: 11px;
    color: #555;
    margin-left: auto;
    white-space: nowrap;
  }
</style>
</head>
<body>

<!-- Nav Bar -->
<nav class="navbar" style="background:#16213e;padding:0 24px;display:flex;align-items:center;border-bottom:1px solid #0f3460;position:sticky;top:0;z-index:200;height:48px;">
  <a class="brand" href="/browse" style="font-size:16px;font-weight:700;color:#4ecca3;margin-right:32px;text-decoration:none;">Spotter</a>
  <a href="/browse" style="color:#a0a0a0;text-decoration:none;padding:13px 14px;font-size:13px;border-bottom:2px solid transparent;">Browse</a>
  <a href="/classify" style="color:#fff;text-decoration:none;padding:13px 14px;font-size:13px;border-bottom:2px solid #4ecca3;">Classify</a>
  <a href="/import" style="color:#a0a0a0;text-decoration:none;padding:13px 14px;font-size:13px;border-bottom:2px solid transparent;">Import</a>
  <a href="/audit" style="color:#a0a0a0;text-decoration:none;padding:13px 14px;font-size:13px;border-bottom:2px solid transparent;">Audit</a>
  <a href="/settings" style="color:#a0a0a0;text-decoration:none;padding:13px 14px;font-size:13px;border-bottom:2px solid transparent;">Settings</a>
</nav>

<!-- Review Header -->
<div class="header">
  <div class="header-left">
    <h1 id="title">Classify</h1>
    <select class="model-selector" id="modelSelector" onchange="switchModel(this.value)" style="display:none;"></select>
  </div>
  <div class="header-right">
    <div class="stats" id="stats"></div>
  </div>
</div>

<!-- Inline Quick Settings Panel -->
<div class="settings-panel open" id="settingsPanel">
  <div class="setting-group">
    <label for="thumbSize">Thumbnail size:</label>
    <input type="range" id="thumbSize" min="200" max="800" step="20" value="400"
           oninput="updateThumbSize(this.value)">
    <span class="value" id="thumbSizeVal">400px</span>
  </div>
  <div class="setting-group">
    <label for="confThreshold">Min confidence:</label>
    <input type="range" id="confThreshold" min="0" max="100" step="5" value="0"
           oninput="updateConfThreshold(this.value)">
    <span class="value" id="confThresholdVal">0%</span>
  </div>
</div>

<!-- Category Tabs -->
<div class="tabs" id="tabs"></div>

<!-- Batch Actions -->
<div class="batch-bar" id="batchBar">
  <button class="btn-batch-accept" id="batchAcceptBtn" onclick="acceptAllVisible()">
    Accept All Visible
  </button>
  <span class="batch-info" id="batchStatus"></span>
  <span class="kbd-hint">Keyboard: A = accept focused, S = skip focused</span>
</div>

<!-- Photo Grid -->
<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none;">No photos to review in this category.</div>
<div class="loading" id="loading">Loading photos...</div>

<script>
/* ---------- State ---------- */
var allData = { photos: [], stats: {}, folder: '', settings: {}, models: {} };
var currentTab = 'new';
var currentModel = '';
var thumbSize = 400;
var confThreshold = 0; // 0-100 scale for display, 0-1 for filtering

/* ---------- Bootstrap ---------- */
loadPhotos();

/* ---------- Data Loading ---------- */
async function loadPhotos() {
  try {
    var resp = await fetch('/api/photos');
    if (!resp.ok) throw new Error('Failed to load photos');
    allData = await resp.json();

    // Set page title from folder name
    var folderName = (allData.folder || '').split('/').filter(Boolean).pop() || 'Photos';
    document.getElementById('title').textContent = 'Classify: ' + folderName;
    document.title = 'Spotter - Classify: ' + folderName;

    // Initialize model selector
    initModelSelector();

    document.getElementById('loading').style.display = 'none';
    renderAll();
  } catch (err) {
    document.getElementById('loading').textContent = 'Error loading photos: ' + err.message;
  }
}

/* ---------- Model Selector ---------- */
function initModelSelector() {
  var models = allData.models || {};
  var modelNames = Object.keys(models);
  var sel = document.getElementById('modelSelector');

  if (modelNames.length <= 1) {
    // Single model or no models: hide selector, set default
    sel.style.display = 'none';
    currentModel = modelNames.length === 1 ? modelNames[0] : '';
    return;
  }

  // Multiple models: show selector
  sel.style.display = '';
  sel.innerHTML = modelNames.map(function(name) {
    return '<option value="' + escapeAttr(name) + '">' + escapeHtml(name) + '</option>';
  }).join('');

  // Default to first model if not yet set
  if (!currentModel || modelNames.indexOf(currentModel) === -1) {
    currentModel = modelNames[0];
  }
  sel.value = currentModel;
}

function switchModel(model) {
  currentModel = model;
  renderAll();
}

/* ---------- Prediction Helpers ---------- */
function getPhotoPrediction(photo) {
  // For groups: read from consensus[currentModel]
  if (photo.group_id && photo.consensus) {
    var cons = photo.consensus;
    if (currentModel && cons[currentModel]) {
      return cons[currentModel];
    }
    // Fallback to first model
    var firstKey = Object.keys(cons)[0];
    return firstKey ? cons[firstKey] : null;
  }

  // For individual photos: read from predictions[currentModel]
  var preds = photo.predictions || {};
  if (currentModel && preds[currentModel]) {
    return preds[currentModel];
  }
  // Fallback to first model
  var firstKey = Object.keys(preds)[0];
  return firstKey ? preds[firstKey] : null;
}

function getPhotoCategory(photo) {
  // Groups have top-level category
  if (photo.group_id) {
    return photo.category || 'new';
  }
  // Individual photos: category is inside the prediction for the current model
  var pred = getPhotoPrediction(photo);
  return pred ? (pred.category || 'new') : 'new';
}

function getPhotoConfidence(photo) {
  var pred = getPhotoPrediction(photo);
  return pred ? pred.confidence : 0;
}

function getPhotoPredictionText(photo) {
  var pred = getPhotoPrediction(photo);
  return pred ? pred.prediction : 'Unknown';
}

/* ---------- Render Helpers ---------- */
function renderAll() {
  renderStats();
  renderTabs();
  renderBatchBar();
  renderGrid();
}

function countByCategory(cat) {
  return allData.photos.filter(function(p) {
    return getPhotoCategory(p) === cat && p.status === 'pending';
  }).length;
}

function countPending() {
  return allData.photos.filter(function(p) { return p.status === 'pending'; }).length;
}

function countAccepted() {
  return allData.photos.filter(function(p) { return p.status === 'accepted'; }).length;
}

function renderStats() {
  var el = document.getElementById('stats');
  var nNew = countByCategory('new');
  var nRef = countByCategory('refinement');
  var nDis = countByCategory('disagreement');
  var nAcc = countAccepted();
  el.innerHTML =
    '<span class="stat new-count">' + nNew + ' New</span>' +
    '<span class="stat ref-count">' + nRef + ' Refinements</span>' +
    '<span class="stat dis-count">' + nDis + ' Disagreements</span>' +
    '<span class="stat accepted-count">' + nAcc + ' Accepted</span>';
}

function renderTabs() {
  var tabs = [
    { id: 'new', label: 'New' },
    { id: 'refinement', label: 'Refinement' },
    { id: 'disagreement', label: 'Disagreement' },
    { id: 'accepted', label: 'Accepted' },
    { id: 'all', label: 'All' },
  ];
  var el = document.getElementById('tabs');
  el.innerHTML = tabs.map(function(t) {
    var count;
    if (t.id === 'accepted') {
      count = countAccepted();
    } else if (t.id === 'all') {
      count = allData.photos.length;
    } else {
      count = countByCategory(t.id);
    }
    var cls = currentTab === t.id ? 'tab active' : 'tab';
    return '<div class="' + cls + '" onclick="switchTab(\'' + t.id + '\')">' +
      t.label + '<span class="count">' + count + '</span></div>';
  }).join('');
}

function switchTab(tab) {
  currentTab = tab;
  renderTabs();
  renderBatchBar();
  renderGrid();
}

/* ---------- Filtering ---------- */
function getVisiblePhotos() {
  var threshold = confThreshold / 100;
  return allData.photos.filter(function(p) {
    var cat = getPhotoCategory(p);
    var conf = getPhotoConfidence(p);
    // Tab filter
    if (currentTab === 'accepted') return p.status === 'accepted';
    if (currentTab === 'all') return true;
    if (cat !== currentTab) return false;
    if (p.status !== 'pending') return false;
    // Confidence threshold filter
    if (conf < threshold) return false;
    return true;
  });
}

function getPendingVisible() {
  return getVisiblePhotos().filter(function(p) { return p.status === 'pending'; });
}

/* ---------- Batch Bar ---------- */
function renderBatchBar() {
  var pending = getPendingVisible();
  var btn = document.getElementById('batchAcceptBtn');
  var label;
  if (currentTab === 'accepted') {
    btn.style.display = 'none';
    return;
  }
  btn.style.display = '';

  if (currentTab === 'all') {
    label = 'Accept All Visible (' + pending.length + ')';
  } else {
    // Capitalize category name
    var catName = currentTab.charAt(0).toUpperCase() + currentTab.slice(1);
    label = 'Accept All ' + catName + ' (' + pending.length + ')';
  }
  btn.textContent = label;
  btn.disabled = pending.length === 0;
}

/* ---------- Grid Rendering ---------- */
function renderGrid() {
  var photos = getVisiblePhotos();
  var grid = document.getElementById('grid');
  var empty = document.getElementById('empty');

  if (photos.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.style.setProperty('--card-width', thumbSize + 20 + 'px');

  grid.innerHTML = photos.map(function(p) {
    if (p.group_id) {
      return renderGroupCard(p);
    }
    return renderPhotoCard(p);
  }).join('');
}

function renderPhotoCard(p) {
  var prediction = getPhotoPredictionText(p);
  var confidence = getPhotoConfidence(p);
  var category = getPhotoCategory(p);
  var confPct = Math.round(confidence * 100);
  var confColor = confPct >= 70 ? '#4ecca3' : confPct >= 50 ? '#f0c040' : '#e74c3c';
  var cardClass = 'card';
  if (p.status === 'accepted') cardClass += ' accepted';
  if (p.status === 'skipped') cardClass += ' skipped';

  // Thumbnail filename: stem + .jpg
  var thumbName = p.filename.replace(/\.[^.]+$/, '.jpg');
  var thumbUrl = '/thumbnails/' + encodeURIComponent(thumbName);

  // Category badge
  var badgeHtml = '<span class="badge badge-' + category + '">' + category + '</span>';

  // Existing species display
  var existingHtml = '';
  if (p.existing_species && p.existing_species.length > 0) {
    if (category === 'refinement') {
      existingHtml =
        '<div class="card-existing">' +
          '<span class="label-value">' + escapeHtml(p.existing_species.join(', ')) + '</span>' +
          '<span class="refinement-arrow">&#x2192;</span>' +
          '<span class="label-value" style="color:#f0c040;font-weight:600;">' + escapeHtml(prediction) + '</span>' +
        '</div>';
    } else {
      existingHtml =
        '<div class="card-existing">' +
          '<span class="label-prefix">Current: </span>' +
          '<span class="label-value">' + escapeHtml(p.existing_species.join(', ')) + '</span>' +
        '</div>';
    }
  }

  // Prediction line
  var predictionHtml = '<div class="card-prediction">' + escapeHtml(prediction) + '</div>';

  // Action buttons
  var actionsHtml;
  if (p.status === 'accepted') {
    actionsHtml = '<div class="card-actions"><button class="btn-done">accepted</button></div>';
  } else if (p.status === 'skipped') {
    actionsHtml = '<div class="card-actions"><button class="btn-done skipped-btn">skipped</button></div>';
  } else {
    actionsHtml =
      '<div class="card-actions">' +
        '<button class="btn-accept" onclick="acceptPhoto(\'' + escapeAttr(p.filename) + '\')">Accept</button>' +
        '<button class="btn-skip" onclick="skipPhoto(\'' + escapeAttr(p.filename) + '\')">Skip</button>' +
      '</div>';
  }

  return '<div class="' + cardClass + '" data-filename="' + escapeAttr(p.filename) + '">' +
    '<img src="' + thumbUrl + '" loading="lazy" alt="' + escapeAttr(p.filename) + '">' +
    '<div class="card-body">' +
      '<div class="card-filename" title="' + escapeAttr(p.filename) + '">' + escapeHtml(p.filename) + '</div>' +
      badgeHtml +
      existingHtml +
      predictionHtml +
      '<div class="confidence-bar"><div class="confidence-fill" style="width:' + confPct + '%;background:' + confColor + '"></div></div>' +
      '<div class="card-confidence">' + confPct + '% confidence</div>' +
      actionsHtml +
    '</div>' +
  '</div>';
}

function renderGroupCard(p) {
  var prediction = getPhotoPredictionText(p);
  var confidence = getPhotoConfidence(p);
  var category = getPhotoCategory(p);
  var confPct = Math.round(confidence * 100);
  var confColor = confPct >= 70 ? '#4ecca3' : confPct >= 50 ? '#f0c040' : '#e74c3c';
  var cardClass = 'card';
  if (p.status === 'accepted') cardClass += ' accepted';
  if (p.status === 'skipped') cardClass += ' skipped';

  var members = p.members || [];
  var memberCount = members.length;
  var representative = p.representative || (members.length > 0 ? members[0] : p.filename || '');

  // Thumbnail for the representative image
  var thumbName = representative.replace(/\.[^.]+$/, '.jpg');
  var thumbUrl = '/thumbnails/' + encodeURIComponent(thumbName);

  // Category badge + group badge
  var badgeHtml = '<span class="badge badge-' + category + '">' + category + '</span>';
  badgeHtml += '<span class="badge-group">' + memberCount + ' photos</span>';

  // Existing species display
  var existingHtml = '';
  if (p.existing_species && p.existing_species.length > 0) {
    if (category === 'refinement') {
      existingHtml =
        '<div class="card-existing">' +
          '<span class="label-value">' + escapeHtml(p.existing_species.join(', ')) + '</span>' +
          '<span class="refinement-arrow">&#x2192;</span>' +
          '<span class="label-value" style="color:#f0c040;font-weight:600;">' + escapeHtml(prediction) + '</span>' +
        '</div>';
    } else if (p.existing_species.length > 0) {
      existingHtml =
        '<div class="card-existing">' +
          '<span class="label-prefix">Current: </span>' +
          '<span class="label-value">' + escapeHtml(p.existing_species.join(', ')) + '</span>' +
        '</div>';
    }
  }

  // Consensus prediction
  var predictionHtml = '<div class="card-prediction">' + escapeHtml(prediction) + '</div>';

  // Individual predictions breakdown (if available)
  var individualHtml = '';
  var pred = getPhotoPrediction(p);
  if (pred && pred.individual_predictions) {
    var parts = [];
    var ipreds = pred.individual_predictions;
    var keys = Object.keys(ipreds).sort(function(a, b) { return ipreds[b] - ipreds[a]; });
    keys.forEach(function(k) {
      parts.push('<span>' + escapeHtml(k) + ': ' + ipreds[k] + '/' + memberCount + '</span>');
    });
    individualHtml = '<div class="individual-preds">' + parts.join('') + '</div>';
  }

  // Expand/collapse button
  var expandBtnHtml = '<button class="group-expand-btn" onclick="toggleGroupMembers(\'' + escapeAttr(p.group_id) + '\')">Show members</button>';

  // Member thumbnails (collapsed by default)
  var memberThumbsHtml = '<div class="group-members" id="group-' + escapeAttr(p.group_id) + '">';
  members.forEach(function(m) {
    var mThumbName = m.replace(/\.[^.]+$/, '.jpg');
    var mThumbUrl = '/thumbnails/' + encodeURIComponent(mThumbName);
    memberThumbsHtml += '<img class="group-member-thumb" src="' + mThumbUrl + '" loading="lazy" alt="' + escapeAttr(m) + '" title="' + escapeAttr(m) + '">';
  });
  memberThumbsHtml += '<div class="group-member-list">';
  members.forEach(function(m) {
    memberThumbsHtml += '<span>' + escapeHtml(m) + '</span>';
  });
  memberThumbsHtml += '</div></div>';

  // Action buttons
  var actionsHtml;
  if (p.status === 'accepted') {
    actionsHtml = '<div class="card-actions"><button class="btn-done">accepted</button></div>';
  } else if (p.status === 'skipped') {
    actionsHtml = '<div class="card-actions"><button class="btn-done skipped-btn">skipped</button></div>';
  } else {
    actionsHtml =
      '<div class="card-actions">' +
        '<button class="btn-accept" onclick="acceptGroup(\'' + escapeAttr(p.group_id) + '\')">Accept Group</button>' +
        '<button class="btn-skip" onclick="skipGroup(\'' + escapeAttr(p.group_id) + '\')">Skip</button>' +
      '</div>';
  }

  return '<div class="' + cardClass + '" data-group-id="' + escapeAttr(p.group_id) + '">' +
    '<img src="' + thumbUrl + '" loading="lazy" alt="Group: ' + escapeAttr(representative) + '">' +
    '<div class="card-body">' +
      '<div class="card-filename" title="Group: ' + escapeAttr(p.group_id) + '">' + escapeHtml(representative) + '</div>' +
      badgeHtml +
      existingHtml +
      predictionHtml +
      individualHtml +
      '<div class="confidence-bar"><div class="confidence-fill" style="width:' + confPct + '%;background:' + confColor + '"></div></div>' +
      '<div class="card-confidence">' + confPct + '% confidence (consensus)</div>' +
      expandBtnHtml +
      memberThumbsHtml +
      actionsHtml +
    '</div>' +
  '</div>';
}

function toggleGroupMembers(groupId) {
  var el = document.getElementById('group-' + groupId);
  if (!el) return;
  var isOpen = el.classList.toggle('open');
  // Update button text
  var card = el.closest('.card');
  if (card) {
    var btn = card.querySelector('.group-expand-btn');
    if (btn) btn.textContent = isOpen ? 'Hide members' : 'Show members';
  }
}

/* ---------- Actions ---------- */
async function acceptPhoto(filename) {
  var resp = await fetch('/api/accept/' + encodeURIComponent(filename), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: currentModel }),
  });
  if (!resp.ok) {
    alert('Failed to accept: ' + filename);
    return;
  }
  var photo = allData.photos.find(function(p) { return p.filename === filename; });
  if (photo) photo.status = 'accepted';
  renderAll();
}

async function skipPhoto(filename) {
  var resp = await fetch('/api/skip/' + encodeURIComponent(filename), { method: 'POST' });
  if (!resp.ok) {
    alert('Failed to skip: ' + filename);
    return;
  }
  var photo = allData.photos.find(function(p) { return p.filename === filename; });
  if (photo) photo.status = 'skipped';
  renderAll();
}

async function acceptGroup(groupId) {
  var resp = await fetch('/api/accept-group/' + encodeURIComponent(groupId), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: currentModel }),
  });
  if (!resp.ok) {
    alert('Failed to accept group: ' + groupId);
    return;
  }
  var photo = allData.photos.find(function(p) { return p.group_id === groupId; });
  if (photo) photo.status = 'accepted';
  renderAll();
}

async function skipGroup(groupId) {
  var resp = await fetch('/api/skip-group/' + encodeURIComponent(groupId), { method: 'POST' });
  if (resp.ok) {
    var photo = allData.photos.find(function(p) { return p.group_id === groupId; });
    if (photo) {
      photo.status = 'skipped';
      renderAll();
    }
  }
}

async function acceptAllVisible() {
  var pending = getPendingVisible();
  if (pending.length === 0) return;

  var category = (currentTab !== 'all') ? currentTab : undefined;
  var minConf = confThreshold / 100;

  var btn = document.getElementById('batchAcceptBtn');
  btn.disabled = true;
  btn.textContent = 'Accepting...';
  document.getElementById('batchStatus').textContent = '';

  try {
    var resp = await fetch('/api/accept-batch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ category: category, min_confidence: minConf, model: currentModel }),
    });
    if (!resp.ok) throw new Error('Batch accept failed');
    var result = await resp.json();
    document.getElementById('batchStatus').textContent =
      'Accepted ' + result.accepted + ' photo' + (result.accepted !== 1 ? 's' : '');

    // Reload to get fresh state from server
    await loadPhotos();
  } catch (err) {
    document.getElementById('batchStatus').textContent = 'Error: ' + err.message;
    btn.disabled = false;
    renderBatchBar();
  }
}

/* ---------- Settings ---------- */
function updateThumbSize(val) {
  thumbSize = parseInt(val, 10);
  document.getElementById('thumbSizeVal').textContent = val + 'px';
  renderGrid();
}

function updateConfThreshold(val) {
  confThreshold = parseInt(val, 10);
  document.getElementById('confThresholdVal').textContent = val + '%';
  renderAll();
}

/* ---------- Keyboard Shortcuts ---------- */
document.addEventListener('keydown', function(e) {
  // Don't capture if user is in an input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

  var pending = getPendingVisible();
  if (pending.length === 0) return;

  // A = accept first pending card, S = skip first pending card
  if (e.key === 'a' || e.key === 'A') {
    e.preventDefault();
    var p = pending[0];
    if (p.group_id) {
      acceptGroup(p.group_id);
    } else {
      acceptPhoto(p.filename);
    }
  } else if (e.key === 's' || e.key === 'S') {
    e.preventDefault();
    var p = pending[0];
    if (p.group_id) {
      skipGroup(p.group_id);
    } else {
      skipPhoto(p.filename);
    }
  }
});

/* ---------- Utilities ---------- */
function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function escapeAttr(str) {
  return str.replace(/&/g, '&amp;').replace(/'/g, '&#39;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
