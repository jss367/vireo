<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotter - Classify</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
  }

  /* ---------- Header ---------- */
  .header {
    background: #16213e;
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #0f3460;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 18px; font-weight: 600; white-space: nowrap; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .stats { font-size: 13px; color: #a0a0a0; display: flex; gap: 14px; }
  .stats .stat { white-space: nowrap; }
  .stats .new-count { color: #4ecca3; }
  .stats .ref-count { color: #f0c040; }
  .stats .dis-count { color: #e74c3c; }
  .stats .accepted-count { color: #7ec8e3; }

  /* Model selector */
  .model-selector {
    background: #0f3460;
    color: #e0e0e0;
    border: 1px solid #1a3a6e;
    border-radius: 4px;
    padding: 5px 10px;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }
  .model-selector:hover { border-color: #4ecca3; }
  .model-selector:focus { border-color: #4ecca3; }

  /* Gear icon links to /settings */
  .gear-link {
    color: #a0a0a0;
    font-size: 22px;
    padding: 4px 8px;
    line-height: 1;
    transition: color 0.15s;
    text-decoration: none;
  }
  .gear-link:hover { color: #fff; }

  /* ---------- Settings Panel (inline quick settings) ---------- */
  .settings-panel {
    display: none;
    background: #16213e;
    padding: 14px 24px;
    border-bottom: 1px solid #0f3460;
  }
  .settings-panel.open {
    display: flex;
    gap: 40px;
    align-items: center;
    flex-wrap: wrap;
  }
  .setting-group { display: flex; align-items: center; gap: 8px; }
  .setting-group label { font-size: 13px; color: #a0a0a0; white-space: nowrap; }
  .setting-group input[type=range] {
    width: 180px;
    accent-color: #4ecca3;
    cursor: pointer;
  }
  .setting-group .value {
    font-size: 13px;
    min-width: 48px;
    color: #e0e0e0;
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Category Tabs ---------- */
  .tabs {
    display: flex;
    background: #16213e;
    padding: 0 24px;
    border-bottom: 1px solid #0f3460;
    overflow-x: auto;
  }
  .tab {
    padding: 11px 18px;
    cursor: pointer;
    font-size: 13px;
    color: #a0a0a0;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .tab:hover { color: #fff; }
  .tab.active { color: #fff; border-bottom-color: #4ecca3; }
  .tab .count {
    margin-left: 6px;
    font-size: 11px;
    background: #0f3460;
    padding: 2px 7px;
    border-radius: 10px;
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Batch Action Bar ---------- */
  .batch-bar {
    padding: 10px 24px;
    background: #1a1a2e;
    border-bottom: 1px solid #0f3460;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .batch-bar button {
    padding: 6px 18px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn-batch-accept { background: #4ecca3; color: #1a1a2e; }
  .btn-batch-accept:hover { background: #3db890; }
  .btn-batch-accept:disabled { background: #2a5a4a; color: #555; cursor: default; }
  .batch-info { font-size: 13px; color: #a0a0a0; }

  /* ---------- Photo Grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--card-width, 420px), 1fr));
    gap: 16px;
    padding: 24px;
  }

  /* ---------- Photo Card ---------- */
  .card {
    background: #16213e;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #0f3460;
    transition: opacity 0.25s, transform 0.15s;
  }
  .card:hover { transform: translateY(-2px); }
  .card.accepted { opacity: 0.45; }
  .card.skipped { opacity: 0.25; }
  .card img {
    width: 100%;
    aspect-ratio: 3/2;
    object-fit: cover;
    display: block;
    background: #0f3460;
  }
  .card-body { padding: 12px 14px; }
  .card-filename {
    font-size: 12px;
    color: #777;
    margin-bottom: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Category badge */
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    margin-bottom: 8px;
    text-transform: capitalize;
  }
  .badge-new { background: #4ecca3; color: #1a1a2e; }
  .badge-refinement { background: #f0c040; color: #1a1a2e; }
  .badge-disagreement { background: #e74c3c; color: #fff; }

  /* Group badge */
  .badge-group {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    margin-bottom: 8px;
    margin-left: 6px;
    background: #0f3460;
    color: #7ec8e3;
  }

  /* Existing keywords */
  .card-existing {
    font-size: 13px;
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .card-existing .label-prefix { color: #777; }
  .card-existing .label-value { color: #c0c0c0; }

  /* Arrow for refinement */
  .refinement-arrow {
    color: #f0c040;
    margin: 0 6px;
    font-size: 14px;
  }

  /* Prediction */
  .card-prediction {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #fff;
  }

  /* Confidence bar */
  .confidence-bar {
    height: 4px;
    background: #0f3460;
    border-radius: 2px;
    margin-bottom: 4px;
    overflow: hidden;
  }
  .confidence-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }
  .card-confidence {
    font-size: 12px;
    color: #777;
    margin-bottom: 10px;
    font-variant-numeric: tabular-nums;
  }

  /* Card action buttons */
  .card-actions { display: flex; gap: 8px; }
  .card-actions button {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn-accept { background: #4ecca3; color: #1a1a2e; }
  .btn-accept:hover { background: #3db890; }
  .btn-skip { background: #2a2a3e; color: #a0a0a0; }
  .btn-skip:hover { background: #3a3a4e; }
  .btn-done {
    background: #0f3460;
    color: #4ecca3;
    cursor: default;
    text-transform: capitalize;
  }
  .btn-done.skipped-btn { color: #777; }

  /* Expand / collapse for group cards */
  .group-expand-btn {
    background: #0f3460;
    color: #7ec8e3;
    border: none;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    margin-bottom: 8px;
    transition: background 0.15s;
  }
  .group-expand-btn:hover { background: #1a4a7e; }
  .group-members {
    display: none;
    margin-top: 8px;
    border-top: 1px solid #0f3460;
    padding-top: 8px;
  }
  .group-members.open { display: block; }
  .group-member-thumb {
    display: inline-block;
    width: 80px;
    height: 54px;
    object-fit: cover;
    border-radius: 4px;
    margin: 2px;
    border: 1px solid #0f3460;
  }
  .group-member-list {
    font-size: 12px;
    color: #777;
    margin-top: 4px;
    line-height: 1.6;
  }
  .group-member-list span {
    display: inline-block;
    background: #0f3460;
    padding: 1px 6px;
    border-radius: 3px;
    margin: 2px;
  }

  /* Individual predictions breakdown for groups */
  .individual-preds {
    font-size: 12px;
    color: #888;
    margin-bottom: 6px;
  }
  .individual-preds span {
    margin-right: 10px;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 80px 24px;
    color: #555;
    font-size: 15px;
  }

  /* Loading spinner */
  .loading {
    text-align: center;
    padding: 80px 24px;
    color: #555;
    font-size: 15px;
  }

  /* Keyboard shortcut hint */
  .kbd-hint {
    font-size: 11px;
    color: #555;
    margin-left: auto;
    white-space: nowrap;
  }
</style>
</head>
<body>

{% set active_page = 'review' %}
{% include '_navbar.html' %}

<!-- Review Header -->
<div class="header">
  <div class="header-left">
    <h1 id="title">Review Predictions</h1>
  </div>
  <div class="header-right">
    <div class="stats" id="stats"></div>
  </div>
</div>

<!-- Action Bar -->
<div class="settings-panel open" id="reviewBar">
  <div class="setting-group">
    <button class="btn-batch-accept" id="acceptAllBtn" onclick="acceptAllPending()" style="display:none;">Accept All</button>
  </div>
  <span class="kbd-hint">Keyboard: A = accept, S = skip</span>
  <span style="margin-left:auto;">
    <a href="/classify" style="color:#555;font-size:12px;text-decoration:none;">Back to Classify</a>
  </span>
</div>

<!-- Category Tabs -->
<div class="tabs" id="tabs"></div>

<!-- Photo Grid -->
<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none;">
  Select a collection above to load photos.
</div>
<div class="loading" id="loading" style="display:none;">Loading photos...</div>

<script>
/* ---------- State ---------- */
var predictions = [];
var currentTab = 'all';
var thumbSize = 400;
var mode = 'review';

/* ---------- Bootstrap ---------- */
loadPredictions();

async function loadPredictions() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('empty').style.display = 'none';

  try {
    var resp = await fetch('/api/predictions?status=pending');
    var pending = await resp.json();

    // Also load accepted/rejected for tab counts
    var allResp = await fetch('/api/predictions');
    predictions = await allResp.json();

    mode = predictions.length > 0 ? 'review' : 'browse';

    document.getElementById('title').textContent =
      'Review Predictions (' + pending.length + ' pending)';
    document.title = 'Spotter - Review (' + pending.length + ' pending)';

    document.getElementById('loading').style.display = 'none';
    renderAll();
  } catch(err) {
    document.getElementById('loading').textContent = 'Error: ' + err.message;
  }
}

/* ---------- Render ---------- */
function renderAll() {
  renderStats();
  renderTabs();
  renderButtons();
  renderGrid();
}

function renderStats() {
  var el = document.getElementById('stats');
  if (mode === 'review') {
    var pending = predictions.filter(function(p) { return p.status === 'pending'; }).length;
    var accepted = predictions.filter(function(p) { return p.status === 'accepted'; }).length;
    el.innerHTML =
      '<span class="stat new-count">' + pending + ' Pending</span>' +
      '<span class="stat accepted-count">' + accepted + ' Accepted</span>' +
      '<span class="stat">' + predictions.length + ' Total</span>';
  } else {
    el.innerHTML = '<span class="stat">' + allData.photos.length + ' photos</span>';
  }
}

function renderTabs() {
  var tabsEl = document.getElementById('tabs');
  if (mode !== 'review') {
    tabsEl.innerHTML = '';
    return;
  }
  var counts = { all: predictions.length };
  counts.pending = predictions.filter(function(p) { return p.status === 'pending'; }).length;
  counts.accepted = predictions.filter(function(p) { return p.status === 'accepted'; }).length;
  counts.rejected = predictions.filter(function(p) { return p.status === 'rejected'; }).length;

  var tabs = [
    { id: 'all', label: 'All' },
    { id: 'pending', label: 'Pending' },
    { id: 'accepted', label: 'Accepted' },
    { id: 'rejected', label: 'Rejected' },
  ];
  tabsEl.innerHTML = tabs.map(function(t) {
    var cls = currentTab === t.id ? 'tab active' : 'tab';
    return '<div class="' + cls + '" onclick="switchTab(\'' + t.id + '\')">' +
      t.label + '<span class="count">' + (counts[t.id] || 0) + '</span></div>';
  }).join('');
}

function switchTab(tab) {
  currentTab = tab;
  renderAll();
}

function renderButtons() {
  var acceptAllBtn = document.getElementById('acceptAllBtn');
  var pending = predictions.filter(function(p) { return p.status === 'pending'; }).length;
  if (pending > 0) {
    acceptAllBtn.style.display = '';
    acceptAllBtn.textContent = 'Accept All (' + pending + ')';
  } else {
    acceptAllBtn.style.display = 'none';
  }
}

/* ---------- Grid Rendering ---------- */
function getVisibleItems() {
  var filtered = predictions;
  if (currentTab !== 'all') {
    filtered = predictions.filter(function(p) { return p.status === currentTab; });
  }
  // Deduplicate groups — show only the first photo per group
  var seenGroups = {};
  return filtered.filter(function(p) {
    if (!p.group_id) return true;
    if (seenGroups[p.group_id]) return false;
    seenGroups[p.group_id] = true;
    return true;
  });
}

function renderGrid() {
  var items = getVisibleItems();
  var grid = document.getElementById('grid');
  var empty = document.getElementById('empty');

  if (items.length === 0) {
    grid.innerHTML = '';
    if (predictions.length === 0) {
      empty.textContent = 'No predictions to review. Run classification on the Classify page first.';
    } else {
      empty.textContent = 'No predictions in this category.';
    }
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.style.setProperty('--card-width', thumbSize + 20 + 'px');

  grid.innerHTML = items.map(function(p) { return renderPredictionCard(p); }).join('');
}

function renderPredictionCard(pred) {
  var thumbUrl = '/thumbnails/' + pred.photo_id + '.jpg';
  var confPct = Math.round(pred.confidence * 100);
  var confColor = confPct >= 70 ? '#4ecca3' : confPct >= 50 ? '#f0c040' : '#e74c3c';
  var cardClass = 'card';
  if (pred.status === 'accepted') cardClass += ' accepted';
  if (pred.status === 'rejected') cardClass += ' skipped';

  // Category badge
  var badgeHtml = '';
  if (pred.category && pred.category !== 'match') {
    var badgeClass = pred.category === 'new' ? 'badge-new' : pred.category === 'refinement' ? 'badge-refinement' : 'badge-disagreement';
    badgeHtml = '<span class="badge ' + badgeClass + '">' + pred.category + '</span>';
  }

  // Group badge
  var groupHtml = '';
  if (pred.group_id && pred.total_votes > 1) {
    groupHtml = '<span class="badge-group">' + pred.vote_count + '/' + pred.total_votes + ' votes</span>';
  }

  // Individual vote breakdown
  var voteHtml = '';
  if (pred.individual) {
    try {
      var votes = typeof pred.individual === 'string' ? JSON.parse(pred.individual) : pred.individual;
      var parts = [];
      var keys = Object.keys(votes).sort(function(a, b) { return votes[b] - votes[a]; });
      keys.forEach(function(k) {
        parts.push('<span>' + escapeHtml(k) + ': ' + votes[k] + '</span>');
      });
      if (parts.length > 1) {
        voteHtml = '<div class="individual-preds">' + parts.join('') + '</div>';
      }
    } catch(e) {}
  }

  // Action buttons
  var actionsHtml;
  var acceptLabel = pred.group_id ? 'Accept Group' : 'Accept';
  if (pred.status === 'accepted') {
    actionsHtml = '<div class="card-actions"><button class="btn-done">accepted</button></div>';
  } else if (pred.status === 'rejected') {
    actionsHtml = '<div class="card-actions"><button class="btn-done skipped-btn">rejected</button></div>';
  } else {
    actionsHtml =
      '<div class="card-actions">' +
        '<button class="btn-accept" onclick="acceptPrediction(' + pred.id + ')">' + acceptLabel + '</button>' +
        '<button class="btn-skip" onclick="rejectPrediction(' + pred.id + ')">Reject</button>' +
      '</div>';
  }

  return '<div class="' + cardClass + '" data-pred-id="' + pred.id + '">' +
    '<img src="' + thumbUrl + '" loading="lazy" alt="' + escapeAttr(pred.filename || '') + '">' +
    '<div class="card-body">' +
      '<div class="card-filename">' + escapeHtml(pred.filename || '') + '</div>' +
      badgeHtml + groupHtml +
      '<div class="card-prediction">' + escapeHtml(pred.species) + '</div>' +
      voteHtml +
      '<div class="confidence-bar"><div class="confidence-fill" style="width:' + confPct + '%;background:' + confColor + '"></div></div>' +
      '<div class="card-confidence">' + confPct + '% confidence' + (pred.group_id ? ' (consensus)' : '') + '</div>' +
      actionsHtml +
    '</div>' +
  '</div>';
}

/* ---------- Actions ---------- */
async function acceptPrediction(predId) {
  await fetch('/api/predictions/' + predId + '/accept', { method: 'POST' });
  var pred = predictions.find(function(p) { return p.id === predId; });
  if (pred) pred.status = 'accepted';
  renderAll();
}

async function rejectPrediction(predId) {
  await fetch('/api/predictions/' + predId + '/reject', { method: 'POST' });
  var pred = predictions.find(function(p) { return p.id === predId; });
  if (pred) pred.status = 'rejected';
  renderAll();
}

async function acceptAllPending() {
  var pending = predictions.filter(function(p) { return p.status === 'pending'; });
  for (var i = 0; i < pending.length; i++) {
    await fetch('/api/predictions/' + pending[i].id + '/accept', { method: 'POST' });
    pending[i].status = 'accepted';
  }
  renderAll();
}

/* ---------- Keyboard Shortcuts ---------- */
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (mode !== 'review') return;
  var pending = predictions.filter(function(p) { return p.status === 'pending'; });
  if (pending.length === 0) return;
  if (e.key === 'a' || e.key === 'A') { e.preventDefault(); acceptPrediction(pending[0].id); }
  else if (e.key === 's' || e.key === 'S') { e.preventDefault(); rejectPrediction(pending[0].id); }
});

/* ---------- Settings ---------- */
function updateThumbSize(val) {
  thumbSize = parseInt(val, 10);
  document.getElementById('thumbSizeVal').textContent = val + 'px';
  renderGrid();
}

/* ---------- Utilities ---------- */
function escapeHtml(str) {
  if (str == null) return '';
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(String(str)));
  return div.innerHTML;
}

function escapeAttr(str) {
  if (str == null) return '';
  return String(str).replace(/&/g, '&amp;').replace(/'/g, '&#39;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
</script>
</body>
</html>
